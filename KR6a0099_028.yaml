尊告諸比丘向邪者違於法不樂於法向正者樂於法不違於法何等為向邪者違於法不樂於法謂邪見人身業如所見口業如所見若思若欲若願若為彼皆隨順一切得不愛果不念不可意果所以者何以見惡故謂邪見邪見者起邪志邪語邪業邪命邪方便邪念邪定是向邪者違於法不樂於法何等為向正者樂於法不違於法謂正見人若身業隨所見若口業若思若欲若願若為悉皆隨順得可愛可念可意果所以者何以見正故謂正見正見者能起正志正語正業正命正方便正念正定是名向正者樂於法不違於法佛説是經已諸比丘聞佛所説歡喜奉行七八八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘向邪者違於法不樂於法向正者樂於法不違於法何等為向邪者違於法不樂於法若邪見人身業如所見口業如所見若思若欲若願若為彼皆隨順一切得不愛果不念不可意果所以者何惡見謂邪見邪見者起邪志邪語邪業邪命邪方便邪念邪定譬如苦果種著地中隨時溉灌彼得地味水味火味風味一切悉苦所以者何以種苦故如是邪見人身業如所見口業如所見若思若欲若願若為悉皆隨順彼一切得不愛不念不可意果所以者何惡見者謂邪見邪見者能起邪志乃至邪定是名向邪者違於法不樂於法何等為向正者樂於法不違於法若正見人身業如所見口業如所見若思若欲若為悉皆隨順彼一切得可愛可念可意果所以者何善見謂正見正見者能起正志乃至正定譬如甘蔗稻麥蒲桃種著地中隨時溉灌彼得地味水味火味風味彼一切味悉甜美所以者何以種子甜故如是正見人身業如所見口業如所見若思若欲若願若為悉皆隨順彼一切得可愛可念可意果所以者何善見者謂正見正見者能起正志乃至正定是名向正者樂於法不違於法佛説此經已諸比丘聞佛所説歡喜奉行世間出世間亦如是説如上三經亦皆説偈言鄙法不應近放逸不應行不應習邪見增長於世間假使有世間正見增上者雖復百千生終不墮惡趣佛説此經已諸比丘聞佛所説歡喜奉行七八九如是我聞一時佛住舍衛國祇樹給孤獨園時有生聞婆羅門來詣佛所稽首佛足與世尊面相問訊慰勞已退坐一面白佛言瞿曇所謂正見者何等為正見佛告婆羅門正見有二種有正見世俗有漏有取轉向善趣有正見是聖出世間無漏不取正盡苦轉向苦邊何等為正見世俗有漏有取轉向善趣謂正見有施有説有齋乃至自知不受後有婆羅門是名正見世俗有漏有取向於善趣婆羅門何等為正見是聖出世間無漏不取正盡苦轉向苦邊謂聖弟子苦苦思惟集滅道道思惟無漏思惟相應於法選擇分別求覺巧便𭶑慧觀察是名正見是聖出世間無漏不取正盡苦轉向苦邊佛説此經已生聞婆羅門聞佛所説歡喜隨喜從座起去如正見如是正志正語正業正命正方便正念正定一一經如上説七九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有邪及邪道有正及正道諦聽善思當為汝説何等為邪謂地獄畜生餓鬼何等為邪道謂邪見乃至邪定何等為正謂人天涅槃何等為正道謂正見乃至正定佛説此經已諸比丘聞佛所説歡喜奉行七九一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有邪有邪道有正有正道諦聽善思當為汝説何等為邪謂地獄畜生餓鬼何等為邪道謂殺盜邪淫妄語兩舌惡口綺語貪恚邪見何等為正謂人天涅槃何等為正道謂不殺不盜不邪淫不妄語不兩舌不惡口不綺語無貪無恚正見佛説此經已諸比丘聞佛所説歡喜奉行七九二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上説差別者何等為惡趣道謂殺父殺母殺阿羅漢破僧惡心出佛身血餘如上説佛説此經已諸比丘聞佛所説歡喜奉行七九三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有順流道有逆流道諦聽善思當為汝説何等為順流道謂邪見乃至邪定何等為逆流道謂正見乃至正定佛説此經已諸比丘聞佛所説歡喜奉行如順流逆流如是退道勝道下道上道及三經道迹亦如上説七九四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有沙門及沙門法諦聽善思當為汝説何等為沙門法謂八聖道正見乃至正定何等為沙門若成就此法者是名沙門佛説此經已諸比丘聞佛所説歡喜奉行七九五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有沙門法沙門義何等為沙門法謂八聖道正見乃至正定何等為沙門義謂貪欲永盡瞋恚愚癡永盡一切煩惱永盡是名沙門義佛説此經已諸比丘聞佛所説歡喜奉行七九六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有沙門法及沙門果諦聽善思當為汝説何等為沙門法謂八聖道正見乃至正定何等為沙門果謂須陀洹果斯陀含果阿那含果阿羅漢果佛説此經已諸比丘聞佛所説歡喜奉行
