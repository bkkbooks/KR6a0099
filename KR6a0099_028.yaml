body:
  text: 宋天竺三藏求那跋陀羅譯七四八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如日出前相謂明相初光如是比丘正盡苦邊究竟苦邊前相者所謂正見彼正見者能起正志正語正業正命正方便正念正定起定正受故聖弟子心正解脫貪欲瞋恚愚癡如是心善解脫聖弟子得正知見我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行七四九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若無明為前相故生諸惡不善法時隨生無慚無愧無慚無愧生已隨生邪見邪見生已能起邪志邪語邪業邪命邪方便邪念邪定若起明為前相生諸善法時慚愧隨生慚愧生已能生正見正見生已起正志正語正業正命正方便正念正定次第而起正定起已聖弟子得正解脫貪欲瞋恚愚癡如是聖弟子得正解脫已得正知見我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行七五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若比丘諸惡不善法比丘一切皆以無明為根本無明集無明生無明起所以者何無明者無知於善不善法不如實知有罪無罪下法上法染污不染污分別不分別緣起非緣起不如實知不如實知故起於邪見起於邪見已能起邪志邪語邪業邪命邪方便邪念邪定若諸善法生一切皆明為根本明集明生明起明於善不善法如實知者罪無罪親近不親近卑法勝法穢污白淨有分別無分別緣起非緣起悉如實知如實知者是則正見正見者能起正志正語正業正命正方便正念正定正定起已聖弟子得正解脫貪恚癡貪恚癡解脫已是聖弟子得正智見我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行七五一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若在家若出家而起邪事者我所不説所以者何若在家出家而起邪事者則不樂正法何等為邪事謂邪見乃至邪定若在家出家而起正事我所讚歎所以者何起正事者則樂正法善於正法何等為正事謂正見乃至正定爾時世尊即説偈言在家及出家而起邪事者彼則終不樂無上之正法在家及出家而起正事者彼則常心樂無上之正法佛説此經已諸比丘聞佛所説歡喜奉行七五二如是我聞一時佛住舍衛國祇樹給孤獨園爾時迦摩比丘詣佛所稽首佛足退坐一面白佛言世尊所謂欲者云何為欲佛告迦摩欲謂五欲功德何等為五謂眼識明色可愛可意可念長養欲樂如是耳鼻舌身識觸可愛可意可念長養欲樂是名為欲然彼非欲於彼貪著者是名為欲爾時世尊即説偈言世間雜五色彼非為愛欲貪欲覺想者是則士夫欲衆色常住世行者斷心欲迦摩比丘白佛言世尊寧有道有迹斷此愛欲不佛告比丘有八正道能斷愛欲謂正見正志正語正業正命正方便正念正定佛説此經已迦摩比丘聞佛所説歡喜奉行七五三如是我聞一時佛住舍衛國祇樹給孤獨園時有比丘名阿梨瑟吒詣佛所稽首佛足退坐一面白佛言世尊所謂甘露者云何名為甘露佛告阿梨瑟吒甘露者界名説然我為有漏盡者現説此名阿梨瑟吒比丘白佛言世尊有道有迹修習多修習得甘露法不佛告比丘有所謂八聖道分謂正見乃至正定佛説此經已諸比丘聞佛所説歡喜奉行七五四如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者舍利弗詣佛所稽首佛足退坐一面白佛言世尊所謂賢聖等三昧根本衆具云何為賢聖等三昧根本衆具佛告舍利弗謂七正道分為賢聖等三昧為根本為衆具何等為七謂正見正志正語正業正命正方便正念舍利弗於此七道分為基業已得一其心是名賢聖等三昧根本衆具佛説此經已諸比丘聞佛所説歡喜奉行七五五七如上三經如是佛問諸比丘三經亦如是説七五八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘無母子畏有母子畏愚癡無聞凡夫所説而不能知無母子畏有母子畏諸比丘有三種無母子畏愚癡無聞凡夫所説何等為三諸比丘有時兵凶亂起殘害國土隨流波迸子失其母母失其子是名第一無母子畏愚癡無聞凡夫所説復次比丘有時大火卒起焚燒城邑聚落人民馳走母子相失是名第二無母子畏愚癡無聞凡夫所説復次比丘有時山中大雨洪水流出漂沒聚落人民馳走母子相失是名第三無母子畏愚癡無聞凡夫所説然此等畏是有母子畏愚癡無聞凡夫説名無母子畏彼有時兵凶亂起殘害國土隨流波迸母子相失或時於彼母子相見是名第一有母子畏愚癡無聞凡夫説名無母子畏復次大火卒起焚燒城邑聚落人民馳走母子相失或復相見是名第二有母子畏愚癡無聞凡夫説名無母子畏復次山中大雨洪水流出漂沒聚落此人馳走母子相失或尋相見是名第三有母子畏愚癡無聞凡夫説名無母子畏比丘有三種無母子畏是我自覺成三菩提之所記説何等為三若比丘子若老時無母能語子汝莫老我當代汝其母老時亦無子語母令莫老我代之老是名第一無母子畏我自覺成三菩提之所記説復次比丘有時子病母不能語子令莫病我當代汝母病之時子亦不能語母莫病我當代母是名第二無母子畏我自覺成三菩提之所記説復次子若死時無母能語子令莫死我今代汝母若死時無子能語母令莫死我當代母是名第三無母子畏我自覺成三菩提之所記説諸比丘白佛有道有迹修習多修習斷前三種有母子畏斷後三種無母子畏不佛告比丘有道有迹斷彼三畏何等為道何等為迹修習多修習斷前三種有母子畏斷後三種無母子畏謂八聖道分正見正志正語正業正命正方便正念正定佛説此經已諸比丘聞佛所説歡喜奉行七五九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有三受無常有為心所緣生何等為三謂樂受苦受不苦不樂受諸比丘白佛世尊有道有迹修習多修習斷此三受不佛告比丘有道有迹修習多修習斷此三受何等為道何等為迹修習多修習斷此三受佛告比丘謂八聖道正見正志正語正業正命正方便正念正定佛説此經已諸比丘聞佛所説歡喜奉行七六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘世有三法不可喜不可愛不可念何等為三謂老病死此三法不可喜不可愛不可念世間若無此三法不可喜不可愛不可念者無有如來應等正覺出於世間世間亦不知有如來説法教誡教授以世間有此三法不可喜不可愛不可念故如來應等正覺出於世間世間知有如來説法教誡教授諸比丘白佛有道有迹斷此三法不可喜不可愛不可念者不佛告比丘有道有迹修習多修習斷此三法不可喜不可愛不可念何等為道何等為迹修習多修習斷此三法不可喜不可愛不可念謂八聖道正見正志正語正業正命正方便正念正定佛説此經已諸比丘聞佛所説歡喜奉行七六一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我當説學及無學諦聽善思念之何等為學謂學正見成就學正志正語正業正命正方便正念正定成就是名為學何等為無學謂無學正見成就無學正志正語正業正命正方便正念正定成就是名無學佛説此經已諸比丘聞佛所説歡喜奉行如學無學如是正士如是大士亦如是説七六二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我當説聖漏盡云何為聖漏盡謂無學正見成就乃至無學正定成就是名聖漏盡佛説此經已諸比丘聞佛所説歡喜奉行七六三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當説八聖道分何等為八謂正見正志正語正業正命正方便正念正定佛説此經已諸比丘聞佛所説歡喜奉行七六四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當説修八聖道諦聽善思何等為修八聖道是比丘修正見依遠離依無欲依滅向於捨修正志正語正業正命正方便正念正定依遠離依無欲依滅向於捨是名修八聖道佛説此經已諸比丘聞佛所説歡喜奉行七六五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當説比丘過去已修八聖道未來當修八聖道乃至諸比丘聞佛所説歡喜奉行七六六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若比丘正見清淨鮮白無諸過患離諸煩惱未起不起唯除佛所調伏乃至正定亦如是説若正見清淨鮮白無諸過患離諸煩惱未起能起乃至正定亦如是説佛説此經已諸比丘聞佛所説歡喜奉行如除佛所説除善逝所説亦如上説七六七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘説不善聚者謂五蓋是為正説所以者何純一不善聚者所謂五蓋何等為五謂貪欲蓋瞋恚眠睡掉悔疑蓋説善法聚者所謂八聖道是名正説所以者何純一滿淨善聚者謂八聖道何等為八謂正見正志正語正業正命正方便正念正定佛説此經已諸比丘聞佛所説歡喜奉行七六八如是我聞一時佛住王舍城山谷精舍時尊者阿難獨一靜處作如是念半梵行者謂善知識善伴黨善隨從乃至佛告阿難純一滿淨具梵行者謂善知識所以者何我為善知識故令諸衆生修習正見依遠離依無欲依滅向於捨乃至修正定依遠離依無欲依滅向於捨佛説此經已尊者阿難聞佛所説歡喜奉行七六九如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者阿難晨朝著衣持鉢入舍衛城乞食時有生聞婆羅門乘白馬車衆多年少翼從白馬白車白控白鞭頭著白帽白傘蓋手執白拂著白衣服白瓔珞白香塗身翼從皆白出舍衛城欲至林中教授讀誦衆人見之咸言善乘善乘謂婆羅門乘時尊者阿難見婆羅門眷屬衆具一切皆白見已入城乞食還精舍舉衣鉢洗足已往詣佛所稽首禮足退坐一面白佛言世尊今日晨朝著衣持鉢入舍衛城乞食見生聞婆羅門乘白馬車眷屬衆具一切皆白衆人唱言善乘善乘謂婆羅門乘云何世尊於正法律為是世人乘為是婆羅門乘佛告阿難是世人乘非我法律婆羅門乘也阿難我正法律乘天乘婆羅門乘大乘能調伏煩惱軍者諦聽善思當為汝説阿難何等為正法律乘天乘婆羅門乘大乘能調伏煩惱軍者謂八正道正見乃至正定阿難是名正法律乘天乘梵乘大乘能調伏煩惱軍者爾時世尊即説偈言信戒為法軛慚愧為長縻正念善護持以為善御者捨三昧為轅智慧精進輪無著忍辱鎧安隱如法行直進不退還永之無憂處智士乘戰車摧伏無智怨七七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘應離邪見應斷邪見若邪見不可斷者我終不説應離斷邪見以邪見可斷故我説比丘當離邪見若不離邪見者邪見當作非義不饒益苦是故我説當離邪見如是邪志邪語邪業邪命邪方便邪念邪定亦如是説諸比丘離邪見已當修正見若不得修正見者我終不説修習正見以得修正見故我説比丘應修正見若不修正見者當作非義不饒益苦以不修正見作非義不饒益苦故是故我説當修正見以義饒益常得安樂是故比丘當修正見如是正志正語正業正命正方便正念正定亦如是説佛説此經已諸比丘聞佛所説歡喜奉行七七一如是我聞一時佛住舍衛國祇樹給孤獨園時有生聞婆羅門來詣佛所與世尊面相問訊慰勞問訊慰勞已退坐一面白佛言瞿曇謂非彼岸及彼岸瞿曇云何非彼岸云何彼岸佛告婆羅門邪見者非彼岸正見者是彼岸邪志邪語邪業邪命邪方便邪念邪定非彼岸正見是彼岸正志正語正