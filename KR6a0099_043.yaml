body:
  text: 宋天竺三藏求那跋陀羅譯一一六四如是我聞一時佛住波羅㮈國仙人住處鹿野苑中時有衆多比丘集於講堂作如是論諸尊如世尊説波羅延低舍彌德勒所問若知二邊者於中永無著説名大丈夫不顧於五欲無有煩惱鎖超出縫紩憂諸尊此有何義云何邊云何二邊云何為中云何為縫紩云何思以智知以了了智所知了所了作苦邊脫於苦有一答言六內入處是一邊六外入處是二邊受是其中愛為縫紩習於受者得彼彼因身漸轉增長出生於此即法以智知以了了智所知了所了作苦邊脫於苦復有説言過去世是一邊未來世是二邊現在世名為中愛為縫紩習近此愛彼彼所因身漸觸增長出生乃至脫苦復有説言樂受者是一邊苦受者是二邊不苦不樂是其中愛為縫紩習近此愛彼彼所得自身漸觸增長出生乃至脫苦復有説言有者是一邊集是二邊受是其中愛為縫紩如是廣説乃至脫苦復有説言身者是一邊身集是二邊愛為縫紩如是廣説乃至脫苦復有説言我等一切所説不同所謂向來種種異説要不望知云何世尊有餘之説波羅延低舍彌德勒所問經我等應往具問世尊如世尊所説我等奉持爾時衆多比丘詣世尊所稽首禮足退坐一面白佛言世尊向諸比丘集於講堂作如是言於世尊所説波羅延低舍彌德勒所問經所謂二邊乃至脫苦有人説言內六入處是説一邊外六入處是説二邊受是其中愛為縫紩如前廣説悉不決定今日故來請問世尊具問斯義我等所説誰得其義佛告諸比丘汝等所説皆是善説我今當為汝等説有餘經我為波羅延低舍彌德勒有餘經説謂觸是一邊觸集是二邊受是其中愛為縫紩習近愛已彼彼所得身緣觸增長出生於此法以智知以了了智所知了所了作苦邊脫於苦佛説此經已諸比丘聞佛所説歡喜奉行一一六五如是我聞一時尊者賓頭盧住拘睒彌國瞿師羅園時有婆蹉國王名優陀延那詣尊者賓頭盧所共相問訊問訊已退坐一面婆蹉王優陀延那白尊者賓頭盧言欲有所問寧有間暇見答已不尊者賓頭盧答言大王大王且問知者當答婆蹉王優陀延那問尊者賓頭盧何因何緣新學年少比丘於此法律出家未久極安樂住諸根欣悅顏貌清淨膚色鮮白樂靜少動任他而活野獸其心堪能盡壽修持梵行純一清淨尊者賓頭盧答言如佛所説如來應等正覺所知所見為比丘説汝諸比丘若見宿人當作母想見中間者作姊妹想見幼稚者當作女想以是因緣年少比丘於此法律出家未久安隱樂住諸根敷悅顏貌清淨膚色鮮白樂靜少動任他而活野獸其心堪能盡壽修持梵行純一清淨婆蹉王優陀延那語尊者賓頭盧言今諸世間貪求之心若見宿人而作母想見中年者作姊妹想見幼稚者而作女想當於爾時心亦隨起貪欲燒燃瞋恚燒燃愚癡燒燃要當更有勝因緣不尊者賓頭盧語婆蹉王優陀延那更有因緣如世尊説如來應等正覺所知所見為比丘説此身從足至頂骨幹肉塗覆以薄皮種種不淨充滿其中周遍觀察髮毛爪齒塵垢流唌皮肉白骨筋脈心肝肺脾腎腸肚生藏熟藏胞淚汗涕沫肪脂髓痰癊膿血腦汁屎溺大王此因此緣故年少比丘於此法律出家未久安隱樂住乃至純一滿淨婆蹉王優陀延那語尊者賓頭盧人心飄疾若觀不淨隨淨想現頗更有因緣令年少比丘於此法律出家未久安隱樂住乃至純一滿淨不尊者賓頭盧言大王有因有緣如世尊説如來應等正覺所知所見告諸比丘汝等應當守護根門善攝其心若眼見色時莫取色相莫取隨形好增上執持若於眼根不攝斂住則世間貪愛惡不善法則漏其心是故汝等當受持眼律儀耳聲鼻香舌味身觸意法亦復如是乃至受持意律儀爾時婆蹉王優陀延那語尊者賓頭盧善哉善説法乃至受持諸根律儀尊者賓頭盧我亦如是有時不守護身不持諸根律儀不一其念入於宮中其心極生貪欲熾燃瞋恚燒燃愚癡燒燃正使間房獨處亦復三毒燒燃其心況復宮中又我有時善護其身善攝諸根專一其念入於宮中貪欲恚癡不起燒燃其心於內宮中尚不燒身亦不燒心況復間獨以是之故此因此緣能令年少比丘於此法律出家未久安隱樂住乃至純一滿淨時婆蹉王優陀延那聞尊者賓頭盧所説歡喜隨喜從坐起去一一六六如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘有手故知有取捨有足故知有往來有關節故知有屈伸有腹故知有飢渴如是比丘有眼故眼觸因緣生受內覺若苦若樂不苦不樂耳鼻舌身意亦復如是諸比丘若無手則不知取捨若無足則不知往來若無關節則不知有屈伸若無腹則不知有飢渴如是諸比丘若無眼則無眼觸因緣生受內覺若苦若樂不苦不樂耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行一一六七如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘過去世時有河中草有龜於中住止時有野干飢行覓食遙見龜蟲疾來捉取龜蟲見來即便藏六野干守伺出頭足欲取食之久守龜蟲永不出頭亦不出足野干飢乏瞋恚而去諸比丘汝等今日亦復如是知魔波旬常伺汝便汝眼著於色耳聞聲鼻嗅香舌嘗味身覺觸意念法欲令出生染著六境是故比丘汝等今日常當執持眼律儀住執持眼根律儀住惡魔波旬不得其便隨出隨緣耳鼻舌身意亦復如是於其六根若出若緣不得其便猶如龜蟲野干不得其便爾時世尊即説偈言龜蟲畏野干藏六於殼內比丘善攝心密藏諸覺想不依不怖彼覆心勿言説佛説此經已諸比丘聞佛所説歡喜奉行一一六八如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘譬如麥著四衢道頭有六壯夫執杖共打須臾塵碎有第七人執杖重打諸比丘於意云何如麥聚六人共打七人重打當極碎不諸比丘白佛言如是世尊佛告諸比丘如是愚癡士夫六觸入處之所捶打何等為六謂眼觸入處常所捶打耳鼻舌身意觸入處常所捶打彼愚癡士夫為六觸入處之所捶打猶復念求當來世有如第七人重打令碎比丘若言是我是則動搖言是我所是則動搖未來當有是則動搖未來當無是則動搖當復有色是則動搖當復無色是則動搖當復有想是則動搖當復無想是則動搖當復非有想非無想是則動搖動搖故病動搖故癰動搖故刺動搖故著正觀察動搖故苦者得不動搖心多修習住繫念正知如動搖如是思量虛誑有行因愛言我是則為愛言我所是則為愛言當來有是則為愛言當來無是則為愛當有色是則為愛當無色是則為愛當有想是則為愛當無想是則為愛當非想非非想是則為愛愛故為病愛故為癰愛故為刺若善思觀察愛生苦者當多住離愛心正念正智諸比丘過去世時阿修羅興軍與帝釋鬪時天帝釋告三十三天今日諸天阿修羅苦戰若諸天勝阿修羅不如者當生執阿修羅縛以五繫送還天宮阿修羅語其衆言今阿修羅軍與諸天戰若阿修羅勝諸天不如者當生執帝釋縛以五繫還歸阿修羅宮當其戰諍諸天得勝阿修羅不如時三十三天生執毗摩質多羅阿修羅王縛以五繫還歸天宮爾時毗摩質多羅阿修羅王身被五繫置於正法殿上以種種天五欲樂而娛樂之毗摩質多羅阿修羅王作是念唯阿修羅賢善聰慧諸天雖善我今且當還歸阿修羅宮作是念時即自見身被五繫縛諸天五欲自然化沒毗摩質多羅阿修羅王復作是念諸天賢善智慧明徹阿修羅雖善我今且當住此天宮作是念時即自見身五縛得解諸天五欲自然還出毗摩質多羅阿修羅王乃至有如是微細之縛魔波旬縛轉細於是心動搖時魔即隨縛心不動搖魔即隨解是故諸比丘多住不動搖心正念正智應當學佛説此經已諸比丘聞佛所説歡喜奉行一一六九如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘若有比丘比丘尼眼色識因緣生若欲若貪若昵若念若決定著處於彼諸心善自防護所以者何此等皆是恐畏之道有礙有難此惡人所依非善人所依是故應自防護耳鼻舌身意亦復如是譬如田夫有好田苗其守田者懶惰放逸欄牛噉食愚癡凡夫亦復如是六觸入處乃至放逸亦復如是若好田苗其守田者心不放逸欄牛不暴設復入田盡驅令出所謂若心若意若識多聞聖弟子於五欲功德善自攝護盡心令滅若好田苗其守護田者不自放逸欄牛入境左手牽鼻右手執杖遍身捶打驅出其田諸比丘於意云何彼牛遭苦痛已從村至宅從宅至村復當如前過食田苗不答言不也世尊所以者何憶先入田遭捶杖苦故如是比丘若心若意若識多聞聖弟子於六觸入處極生厭離恐怖內心安住制令一意諸比丘過去世時有王聞未曾有好彈琴聲極生愛樂耽湎染著問諸大臣此何等聲甚可愛樂大臣答言此是琴聲語大臣取彼聲來大臣受教即往取琴來白言大王此是琴作好聲者王語大臣我不用琴取其先聞可愛樂聲來大臣答言如此之琴有衆多種具謂有柄有槽有麗有絃有皮巧方便人彈之得衆具因緣乃成音聲非不得衆具而有音聲前所聞聲久已過去轉亦盡滅不可持來爾時大王作是念言咄何用此虛偽物為世間琴者是虛偽物而令世人耽湎染著汝今持去片片析破棄於十方大臣受教析為百分棄於處處如是比丘若色受想思欲知此諸法無常有為心因緣生而便説言是我我所彼於異時一切悉無諸比丘應作如是平等正智如實觀察佛説此經已諸比丘聞佛所説歡喜奉行一一七如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘如癩病人四體瘡壞入茅荻中為諸刺葉針刺所傷倍增苦痛如是愚癡凡夫六觸入處受諸苦痛亦復如是如彼癩人為草葉針刺所傷膿血流出如是愚癡凡夫其性弊暴六觸入處所觸則起瞋恚惡聲流出如彼癩人所以者何愚癡無聞凡夫心如癩瘡我今當説律儀不律儀云何律儀云何不律儀愚癡無聞凡夫眼見色已於可念色而起貪著不可念色而起瞋恚於彼次第隨生衆多覺想相續不見過患復見過患不能除滅耳鼻舌身意亦復如是比丘是名不律儀云何律儀多聞聖弟子若眼見色於可念色不起欲想不可念色不起恚想次第不起衆多覺想相續住見色過患見過患已能捨離耳鼻舌身意亦復如是是名律儀佛説此經已諸比丘聞佛所説歡喜奉行一一七一如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘譬如士夫遊空宅中得六種衆生一者得狗即執其狗繫著一處次得其鳥次得毒蛇次得野干次得失收摩羅次得獼猴得斯衆生悉縛一處其狗者樂欲入村其鳥者常欲飛空其蛇者常欲入穴其野干者樂向冢間失收摩羅者長欲入海獼猴者欲入山林此六衆生悉繫一處所樂不同各各嗜欲到所安處各各不相樂於他處而繫縛故各用其力向所樂方而不能脫如是六根種種境界各各自求所樂境界不樂餘境界眼根常求可愛之色不可意色則生其厭耳根常求可意之聲不可意聲則生其厭鼻根常求可意之香不可意香則生其厭舌根常求可意之味不可意味則生其厭身根常求可意之觸不可意觸則生其厭意根常求可意之法不可意法則生其厭此六種根種種行處種種境界各各不求異根境界此六種根其有力者堪能自在隨覺境界如彼士夫繫六衆生於其堅柱正出用力隨意而去往反疲極以繩繫故終依於柱諸比丘我説此譬欲為汝等顯示其義六衆生者譬猶六根堅柱者譬身念處若善修習身念處有念不念色見可愛色則不生著不可愛色則不生厭耳聲鼻香舌味身觸意法於可意法則不求欲不可意法則不生厭是故比丘當勤修習多住身念處佛説此經已諸比丘聞佛所説歡喜奉行一一七二如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘譬如有四蚖蛇凶惡毒虐盛一篋中時有士夫聰明不愚有智慧求樂厭苦求生厭死時有一士夫語向士夫言汝今取此篋盛毒蛇摩拭洗浴恩親養食出內以時若四毒蛇脫有惱者或能殺汝或令近死汝當防護爾時士夫恐怖馳走忽有五怨拔刀隨逐要求欲殺汝當防護爾時士夫畏四毒蛇及五拔刀怨驅馳而走人復語言士夫內有六賊隨逐伺汝得便當殺汝當防護爾時士夫畏四毒蛇五拔刀怨及內六賊恐怖馳走還入空村見彼空舍危朽腐毀有諸惡物捉皆危脆無有堅固人復語言士夫是空聚落當有群賊來必奄害汝爾時士夫畏四毒蛇五拔刀賊內六惡賊空村群賊而復馳走忽爾道路臨一大河其水浚急但見此岸有諸怖畏而見彼岸安隱快樂清涼無畏無橋船可渡得至彼岸作是思惟我取諸草木縛束成筏手足方便渡至彼岸作是念已即拾草木依於岸傍縛束成筏手足方便截流橫渡如是士夫免四毒蛇五拔刀怨六內惡賊復得脫於空村群賊渡於浚流離於此岸種種怖畏得至彼岸安隱快樂我説此譬當解其義比丘篋者譬此身色麁四大四大所造精血之體穢食長養沐浴衣服無常變壞危脆之法毒蛇者譬四大地界水界火界風界地界若諍能令身死及以近死水火風諍亦復如是五拔刀怨者譬五受陰六內賊者譬六愛喜空村者譬六內入善男子觀察眼入處是無常變壞執持眼者亦是無常虛偽之法耳鼻舌身意入處亦復如是空村群賊者譬外六入處眼為可意不可意色所害耳聲鼻香舌味身觸意為可意不可意法所害浚流者譬四流欲流有流見流無明流河者譬三愛欲愛色愛無色愛此岸多恐怖者譬有身彼岸清涼安樂者譬無餘涅槃筏者譬八正道手足方便截流渡者譬精進勇猛到彼岸婆羅門住處者譬如來應等正覺如是比丘大師慈悲安慰弟子為其所作我今已作汝今亦當作其所作於空間樹下房舍清淨敷草為座露地冢間遠離邊坐精勤禪思慎莫放逸令後悔恨此則是我教授之法佛説此經已諸比丘聞佛所説歡喜奉行一一七三如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘多聞聖弟子於一切苦法集滅味患離如實知見見五欲猶如火坑如是觀察五欲已於五欲貪欲愛欲念欲著不永覆心知其欲心行處住處而自防閉行處住處逆防閉已隨其行處住處世間貪憂惡不善法不漏其心云何名為多聞聖弟子於一切苦法集滅味患離如實知見多聞聖弟子於此苦聖諦如實知此苦集此苦滅此苦滅道迹聖諦如實知是名多聞聖弟子於一切苦法集滅味患離如實知見云何多聞聖弟子見五欲如火坑乃至世間貪憂惡不善法不永覆心譬如近一聚落邊有深坑滿中盛火無有煙焰時有士夫不愚不癡聰明𭶑慧樂樂厭苦樂生惡死彼作是念此有火坑滿中盛火我若墮中必死無疑於彼生遠思遠欲遠如是多聞聖弟子見五欲如火坑乃至世間貪憂惡不善法不永覆心若行處住處逆防逆知乃至世間貪憂惡不善法不漏其心譬如聚落邊有㮈林多諸棘刺時有士夫入於林中有所營作入林中已前後左右上下盡有棘刺爾時士夫正念而行正念來去正念明目正念端視正念屈身所以者何莫令利刺傷壞身故多聞聖弟子亦復如是若依聚落城邑而住晨朝著衣持鉢入村乞食善護其身善執其心正念安住正念而行正念明目正念觀察所以者何莫令利刺傷聖法律云何利刺傷聖法律謂可意愛念之色是名利刺傷聖法律云何是可意愛念之色傷聖法律謂五欲功德眼識色生愛念長養欲樂耳識聲鼻識香舌識味身識觸生愛念長養欲樂是名可愛念色傷聖法律是名多聞聖弟子所行處所住處逆防逆知乃至不令世間貪憂不善法以漏其心或時多聞聖弟子生於正念生惡不善覺長養欲長養恚長養癡是鈍根多聞聖弟子雖起集滅以欲覆心譬如鐵丸燒令極熱以少水灑尋即乾消如是多聞聖弟子鈍根生念尋滅如是多聞聖弟子如是行如是住若王大臣若親往詣其所請以俸祿語言男子何用剃髮執持瓦器身著袈裟家家乞食為不如安慰服五欲樂行施作福云何比丘多聞聖弟子國王大臣諸親檀越請以俸祿彼當還戒退減以不答曰不也所以者何多聞聖弟子於一切苦法集滅味患離如實知見故見火坑譬五欲乃至世間貪憂惡不善法不永覆心行處住處逆防逆知乃至世間貪憂惡不善法不漏其心若復為國王大臣親族請以俸祿還戒退減無有是處佛告諸比丘善哉善哉彼多聞聖弟子其心長夜臨趣流注浚輸向於遠離向於離欲而於涅槃寂靜捨離樂於涅槃於有漏處寂滅清涼若為國王長者親族所請還戒退減者無有是處餘得大苦譬如恆河長夜臨趣流注浚輸東方多衆斷截欲令臨趣流注浚輸西方寧能得不答言不能世尊所以者何恆水長夜流注東方欲令西流未而可得彼諸大衆徒辛苦耳如是多聞聖弟子長夜臨趣流注浚輸向於遠離乃至欲令退減無有是處徒辛苦耳佛説此經已諸比丘聞佛所説歡喜奉行一一七四如是我聞一時佛住阿毗闍恆水邊時有比丘來詣佛所稽首佛足退住一面白佛言善哉世尊為我説法我聞法已獨一靜處專精思惟不放逸住所以族姓子剃除鬚髮正信非家出家學道於上增修梵行見法自知作證我生已盡梵行已立所作已作自知不受後有爾時世尊觀察水見恆水中有一大樹隨流而下語彼比丘汝見此恆水中大樹流不答言已見世尊佛告比丘此大樹不著此岸不著彼岸不沈水底不閡洲渚不入洄澓人亦不取非人不取又不腐敗當隨水流順趣流注浚輸大海不比丘白佛如是世尊佛言比丘亦復如是亦不著此岸不著彼岸不沈水底不閡洲渚不入洄澓人亦不取非人不取又不腐敗臨趣流注浚輸涅槃比丘白佛云何此岸云何彼岸云何沈沒云何洲渚云何洄澓云何人取云何非人取云何腐敗善哉世尊為我廣説我聞法已當獨一靜處專精思惟不放逸住乃至自知不受後有佛告比丘此岸者謂六入處彼岸者謂六外入處人取者猶如有一習近俗人及出家者若喜若憂若苦若樂彼彼所作悉與共同始終相隨是名人取非人取者猶如有人願修梵行我今持戒苦行修諸梵行當生在處在處天上是非人取洄澓者猶如有一還戒退轉腐敗者犯戒行惡不善法腐敗寡聞猶莠稗吹貝之聲非沙門為沙門像非梵行為梵行像如是比丘是名不著此彼岸乃至浚輸涅槃時彼比丘聞佛所説歡喜隨喜作禮而去時彼比丘獨一靜處思惟佛所説水流大樹經教乃至自知不受後有得阿羅漢時有牧牛人名難屠去佛不遠執杖牧牛比丘去已詣世尊所稽首禮足於一面住白佛言世尊我今堪能不著此岸不著彼岸不沈沒不閡洲渚非人所取不非人取不入洄澓亦不腐敗我得於世尊正法律中出家修梵行不佛告牧牛者汝送牛還主不牧牛者言諸牛中悉有犢牛自能還歸不須送也但當聽我出家學道佛告牧牛者牛雖能還家汝今已受食人衣食要當還報其家主時牧牛者聞佛教已歡喜隨喜作禮而去時尊者舍利弗在此會中牧牛者去不久白佛言世尊難屠牧牛者求欲出家世尊何故遣還歸家佛告舍利弗難屠牧牛者若還住家受五欲者無有是處牛付主人已輒自當還於此法律出家學道淨修梵行乃至自知不受後有得阿羅漢時難屠牧牛者以牛付主人已還至佛所稽首禮足退住一面白佛言世尊牛已付主聽我於正法律出家學道佛告難屠牧牛者汝得於此法律出家受具足得比丘分出家已思惟所以族姓子剃除鬚髮著袈裟衣正信非家出家學道增修梵行乃至自知不受後有成阿羅漢一一七五如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘獨處坐禪作是思惟比丘云何知云何見得見清淨作是念已詣諸比丘語諸比丘言諸尊比丘云何知云何見令見清淨比丘答言尊者於六觸入處集滅味患離如實正知比丘作如是知如是見者得見清淨是比丘聞彼比丘記説心不歡喜復詣餘比丘所問彼比丘言諸尊比丘云何知云何見得見清淨彼比丘答言於六界集滅味患離如實正知如是比丘如是知如是見得見清淨時比丘聞其記説心亦不喜復詣餘比丘作是問言比丘云何知云何見得見清淨彼比丘答言於五受陰觀察如病如癰如刺如殺無常苦空非我作如是知如是見得見清淨是比丘聞諸比丘記説心亦不喜往詣佛所稽首禮足退坐一面白佛言世尊我獨靜思惟比丘云何知云何見得見清淨作是念已詣諸比丘三處所説具白世尊我聞彼説心不歡喜來詣世尊故以此義請問世尊比丘云何知云何見得見清淨佛告比丘過去世時有一士夫未曾見緊獸往詣曾見緊獸者問曾見緊獸士夫言汝知緊獸不答言知復問其狀云何答言其色黑如火燒柱當彼見時緊獸黑色如火燒柱時彼士夫聞緊獸黑色如火燒柱不大歡喜復更詣一曾見緊獸士夫復問彼言汝知緊獸不彼答言知復問其狀云何彼曾見緊獸士夫答言其色赤而開敷狀似肉段彼人見時緊獸開敷實似肉段是士夫聞彼所説猶復不喜復更詣餘曾見緊獸士夫問汝知緊獸不答言知復問其狀云何答言𣯶𣯶下垂如尸利沙果是人聞已心復不喜復行問餘知緊獸者問汝知緊獸不彼答言知又問其狀云何彼復答言其葉青其葉滑其葉長廣如尼拘婁陀樹如彼士夫問其緊獸聞則不喜處處更求而彼諸人見緊獸者隨時所見而為記説是故不同如是諸比丘若於獨處專精思惟不放逸住所因思惟法不起諸漏心得解脫隨彼所見而為記説汝今復聽我説譬其智者以譬喻得解譬如有邊國王善治城壁門下堅固交道平正於四城門置四守護悉皆聰慧知其來去當其城中有四交道安置床榻城主坐上若東方使來問守門者城主何在彼即答言主在城中四交道頭床上而坐彼使聞已往詣城主受其教令復道而還南西北方遠使來人問守門者城主何在彼亦答言在其城中四交道頭彼使聞已悉詣城主受其教令各還本處佛告比丘我説斯譬今當説義所謂城者以譬人身麁色如篋毒蛇譬經説善治城壁者謂之正見交道平正者謂內六入處四門者謂四識住四守門者謂四念處城主者謂識受陰使者謂止觀如實言者謂四真諦復道還者以八聖道佛告比丘若大師為弟子所作我今已作以哀愍故如篋毒蛇譬經説爾時比丘聞佛説已專精思惟不放逸住增修梵行乃至不受後有成阿羅漢一一七六如是我聞一時世尊釋氏人間遊行至迦毗羅衛國住尼拘婁陀園爾時迦毗羅衛釋氏作新講堂未有諸沙門婆羅門釋迦年少及諸人民在中住者聞世尊來至釋氏迦毗羅衛人間遊行住尼拘婁陀園論苦樂義此堂新成未有住者可請世尊與諸大衆於中供養得功德福報長夜安隱然復我等當隨受用作是議已悉共出城詣世尊所稽首禮足退坐一面爾時世尊為諸釋氏演説要法示教照喜已默然而住時諸釋氏從座起整衣服為佛作禮右膝著地合掌白佛言世尊我等釋氏新作講堂未有住者今請世尊及諸大衆於中供養得功德福利長夜安隱然後我等當隨受用爾時世尊默然受請時諸釋氏知世尊受請已稽首佛足各還其所即以其日以車輿經紀運其衆具莊嚴新堂敷置床座軟草布地備香油燈衆事辦已往詣佛所稽首白言衆事辦已惟聖知時爾時世尊與諸大衆前後圍繞至新堂外洗足已然後上堂於中柱下東向而坐時諸比丘亦洗足已隨入講堂於世尊後西面東向次第而坐時諸釋氏即於東面西向而坐爾時世尊為諸釋氏廣説要法示教照喜已語諸釋氏瞿曇初夜已過於時可還迦毗羅越時諸釋氏聞佛所説歡喜隨喜作禮而去爾時世尊知釋氏去已告大目揵連汝當為諸比丘説法我今背疾當自消息時大目揵連默然受教爾時世尊四褻鬱多羅僧安置脅下卷襞僧伽梨置於頭下右脅而臥屈膝纍足係念明相作起想思惟爾時大目揵連語諸比丘佛所説法初中後善善義善味純一滿淨清白梵行我今當説漏不漏法汝等諦聽云何為漏法愚癡無聞凡夫眼見色已於可念色而起樂著不可念色而起憎惡不住身念處於心解脫慧解脫無少分智而起種種惡不善法不無餘滅不無餘永盡耳鼻舌身意亦復如是比丘如是者天魔波旬往詣其所伺其虛短於其眼色即得其闕耳聲鼻香舌味身觸意法亦復如是即得其闕譬如枯乾草積四方火起尋時即燒如是比丘於其眼色天魔波旬即得其闕如是比丘不勝於色於耳聲鼻香舌味身觸意法受制於法不能勝法不勝色不勝聲香味觸法亦復不勝意不善法諸煩惱熾然苦報及未來世生老病死諸尊我從世尊親受於此諸有漏法是名有漏法經云何無漏法經多聞聖弟子眼見色於可念色不起樂著不可念色不起憎惡繫念而住無量心解脫慧解脫如實知於彼已起惡不善法無餘滅盡耳鼻舌身意亦復如是如是像類比丘弊魔波旬往詣其所於其眼色伺求其短不得其短於耳聲鼻香舌味身觸意法伺求其短不得其短譬如樓閣墻壁牢固窗戶重閉埿塗厚密四方火起不能燒然斯等比丘亦復如是弊魔波旬往詣其所伺求其短不得其短如是比丘能勝彼色不為彼色之所勝也勝於聲香味觸法不為彼法之所勝也若勝於色勝於聲香味觸法已亦復勝於惡不善法煩惱熾燃苦報及未來世生老病死我親從世尊面受此法是名無漏法經爾時世尊知大目揵連説法竟起正身坐繫念在前告大目揵連善哉善哉目揵連為人説此經法多所饒益多所過度長夜安樂諸天世人爾時世尊告諸比丘汝當受持漏無漏法經廣為人説所以者何義具足故法具足故梵行具足故開發神通正向涅槃乃至信心善男子在家出家當受持讀誦廣為人説佛説此經已諸比丘聞佛所説歡喜奉行一一七七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘譬如灰河兩岸極熱多諸利刺在於暗處衆多罪人在於河中隨流漂沒中有一人不愚不癡聰明黠慧樂樂厭苦樂生厭死作如是念我今何緣在此灰河兩岸極熱又多利刺在暗冥處隨流漂沒我當以手足方便逆流而上漸見小明其人默念今已疾強見此小明復運手足勤加方便遂見平地即住於彼觀察四方見大石山不斷不壞亦不穿穴即登而上復見清涼八分之水所謂冷美輕軟香淨飲時不噎咽中不閡飲已安身即入其中若浴若飲離諸惱熱然後復進大山上見七種華謂優鉢羅華鉢曇摩華拘牟頭華分陀利華修揵提華彌離頭揵提花阿提目多花聞花香已復上石山見四層階堂即坐其上見五柱帳即入其中斂身正坐種種枕褥散花遍布莊嚴妙好而於其中自恣坐臥涼風四湊令身安隱坐高林下高聲唱言灰河衆生諸賢正士如彼灰河兩岸極熱多諸利刺其處暗冥求出於彼河中有聞聲者乘聲問言何方得出從何處出其中有言汝何須問何處得出彼喚聲者亦自不知不見從何而出彼亦當復在此灰河兩岸極熱多諸利刺於暗冥中隨流來下用問彼為如是比丘我説此譬今當説義灰者謂三惡不善覺云何三欲覺恚覺害覺河者謂三愛欲愛色愛無色愛兩岸極熱者謂內外六入處多諸利刺者謂五欲功德暗冥處者謂無明障閉慧眼衆多人者謂愚癡凡夫流謂生死河中有一人不愚不癡者謂菩薩摩訶薩手足方便逆流上者謂精勤修學微見小明者謂得法忍得平地者謂持戒觀四方者謂見四真諦大石山者謂正見八分水者謂八聖道七種花者謂七覺分四層堂者謂四如意足五柱悵者謂信等五根正身坐者謂無餘涅槃散花遍布者謂諸禪解脫三昧正受自恣坐臥者謂如來應等正覺四方風吹者謂四增心見法安樂住舉聲唱喚者謂轉法輪彼有人問諸賢正士何處去何處出者謂舍利弗目揵連等諸賢坐比丘於中有言汝何所問彼亦不知不見有所出處彼亦當復於此灰河兩岸極熱多諸利刺於暗冥處隨流來下者謂六師等諸邪見輩所謂富蘭那迦葉末伽梨瞿舍梨子散闍耶毗羅胝子阿耆多枳舍欽婆羅伽拘羅迦氈延尼揵連陀闍提弗多羅及餘邪見輩如是比丘大師為諸聲聞所作我今已作汝今當作所作如前篋毒蛇説佛説此經已諸比丘聞佛所説歡喜奉行
