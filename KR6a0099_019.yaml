body:
  text: 宋天竺三藏求那跋陀羅譯五四如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者大目揵連在耆闍崛山時釋提桓因有上妙堂觀於夜來詣尊者大目揵連所稽首禮足退坐一面時釋提桓因光明普照耆闍崛山周匝大明爾時釋提桓因坐已即説偈言能伏於慳垢大德隨時施是名施中賢來世見殊勝時大目揵連問帝釋言憍尸迦云何為調伏慳垢見於殊勝而汝説言能調伏慳垢大德隨時施是則施中賢來世見殊勝時天帝釋答言尊者大目揵連勝婆羅門大姓勝剎利大姓勝長者大姓勝四王天勝三十三天稽首敬禮故尊者大目揵連我為勝婆羅門大姓勝剎利大姓勝長者大姓勝四王天勝三十三天恭敬作禮見斯果報故説此偈復次尊者大目揵連乃至日所周行照於諸方至千世界千月千日千須彌山王千弗婆提舍千鬱多羅提舍千瞿陀尼迦千閻浮提千四天王千三十三天炎摩天兜率陀天化樂天他化自在天千梵天名為小千世界此小千世界中無有堂觀與毗闍延堂觀等者毗闍延有百一樓觀觀有七重重有七房房有七天后后各七侍女尊者大目揵連於小千世界無有如是堂觀端嚴如毗闍延者我見是調伏慳故有此妙果故説斯偈大目揵連語帝釋言善哉善哉憍尸迦汝能見此勝妙果報而説斯偈時天帝釋聞尊者大目揵連所説歡喜隨喜忽然不現五五如是我聞一時佛住王舍城時尊者大目揵連在耆闍崛山中爾時尊者大目揵連獨一靜處禪思作是念昔有時釋提桓因於界隔山石窟中問世尊愛盡解脫之義世尊為説聞已隨喜似欲更有所問義我今當往問其喜意作是念已如力士屈申臂頃於耆闍崛山沒至三十三天去一分陀利池不遠而住時天帝釋與五百婇女遊戲浴池有諸天女音聲美妙爾時帝釋遙見尊者大目揵連語諸天女言莫歌莫歌時諸天女即便默然天帝釋即詣尊者大目犍連所稽首禮足退住一面尊者大目揵連問帝釋言汝先於界隔山中問世尊愛盡解脫義聞已隨喜汝意云何為聞説隨喜為更欲有所問故隨喜耶天帝釋語尊者大目揵連我三十三天多著放逸樂或憶先事或時不憶世尊今在王舍城迦蘭陀竹園尊者欲知我先界隔山中所問事者今可往問世尊如世尊説汝當受持然我此處有好堂觀新成未久可入觀看時尊者大目揵連默然受請即與天帝釋共入堂觀彼諸天女遙見帝釋來皆作天樂或歌或舞諸天女輩著身瓔珞莊嚴之具出妙音聲合於五樂如善作樂音聲不異諸天女輩既見尊者大目揵連悉皆慚愧入室藏隱時天帝釋語尊者大目揵連觀此堂觀地好平正其壁柱梁重閣窗牖羅網簾障悉皆嚴好尊者大目揵連語帝釋言憍尸迦先修善法福德因緣成此妙果如是帝釋三自稱歎問尊者大目揵連尊者大目揵連亦再三答時尊者大目揵連作是念今此帝釋極自放逸著界神住歎此堂觀我當令彼心生厭離即入三昧以神通力以一足指撇其堂觀悉令震動時尊者大目揵連即沒不現諸天女衆見此堂觀震掉動搖顛沛恐怖東西馳走白帝釋言此是憍尸迦大師有此大功德力耶時天帝釋語諸天女此非我師是大師弟子大目揵連梵行清淨大德大力者諸天女言善哉憍尸迦乃有如此梵行大德大力同學大師德力當復如何五六如是我聞一時佛住三十三天驄色虛軟石上去波梨耶多羅拘毗陀羅香樹不遠夏安居為母及三十三天説法爾時尊者大目揵連在舍衛國祇樹給孤獨園安居時諸四衆詣尊者大目揵連所稽首禮足退坐一面白尊者大目揵連知世尊夏安居處不尊者大目揵連答言我聞世尊在三十三天驄色虛軟石上去波梨耶多羅拘毗陀羅香樹不遠夏安居為母及三十三天説法時諸四衆聞尊者大目揵連所説歡喜隨喜各從座起作禮而去時諸四衆過三月安居已復詣尊者大目揵連所稽首禮足退坐一面時尊者大目揵連為諸四衆種種説法示教照喜示教照喜已默然而住時諸四衆從座而起稽首作禮白尊者大目揵連尊者大目揵連當知我等不見世尊已久衆甚虛渴欲見世尊尊者大目揵連若不憚勞者願為我等往詣三十三天普為我等問訊世尊少病少惱起居輕利安樂住不又白世尊閻浮提四衆願見世尊而無神力升三十三天禮敬世尊三十三天自有神力來下人中唯願世尊還閻浮提以哀愍故時尊者大目犍連默然而許時諸四衆知尊者大目犍連默然許已各從座起作禮而去爾時尊者大目犍連知四衆去已即入三昧如其正受如大力士屈伸臂頃從舍衛國沒於三十三天驄色虛軟石上去波梨耶多羅拘毗陀羅香樹不遠而現爾時世尊與三十三天衆無量眷屬圍繞説法時尊者大目犍連遙見世尊踊躍歡喜作是念今日世尊諸天大衆圍繞説法與閻浮提衆會不異爾時世尊知尊者大目犍連心之所念語尊者大目犍連言大目犍連非為自力我欲為諸天説法彼即來集欲令其去彼即還去彼隨心來隨心去也爾時尊者大目犍連稽首佛足退坐一面白世尊言種種諸天大衆雲集彼天衆中有曾從佛世尊聞所説法得不壞淨身壞命終來生於此佛告尊者大目犍連如是如是此中種種諸天來雲集者有從宿命聞法得佛不壞淨法僧不壞淨聖戒成就身壞命終來生於此時天帝釋見世尊與尊者大目犍連歎説諸天衆共語已語尊者大目犍連如是如是尊者大目犍連此中種種衆會皆是宿命曾聞正法得於佛不壞淨法僧不壞淨聖戒成就身壞命終來生於此時有異比丘見世尊與尊者大目犍連及天帝釋語言善相述可已語尊者大目犍連如是如是尊者大目犍連是中種種諸天來會此者皆是宿命曾聞正法得於佛不壞淨法僧不壞淨聖戒成就身壞命終而來生此時有一天子從座起整衣服偏袒右肩合掌白佛世尊我亦成就於佛不壞淨故來生此復有天子言我得法不壞淨有言得僧不壞淨有言聖戒成就故來生此如是諸天無量千數於世尊前各自記説得須陀洹法悉於佛前即沒不現時尊者大目犍連知諸天衆去不久從座起整衣服偏袒右肩白佛言世尊閻浮提四衆稽首敬禮世尊足問訊世尊少病少惱起居輕利安樂住不四衆思慕願見世尊又白世尊我等人間無有神力升三十三天禮覲世尊然彼諸天有大德力悉能來下至閻浮提唯願世尊還閻浮提愍四衆故佛告目犍連汝可還彼語閻浮提人却後七日世尊當從三十三天還閻浮提僧迦舍城於外門外優曇鉢樹下尊者大目揵連受世尊教即入三昧譬如力士屈伸臂頃從三十三天沒至閻浮提告諸四衆諸人當知世尊却後七日從三十三天還閻浮提僧迦舍城於外門外優曇鉢樹下如期七日世尊從三十三天下閻浮提僧迦舍城優曇鉢樹下天龍鬼神乃至梵天悉從來下即於此時名此會名天下處五七如是我聞一時佛住王舍城迦蘭陀竹園時有四十天子來詣尊者大目犍連所稽首作禮退坐一面時尊者大目犍連語諸天子言善哉諸天子於佛不壞淨成就法僧不壞淨成就時四十天子從座起整衣服偏袒右肩合掌白尊者大目揵連我得於佛不壞淨於法僧不壞淨聖戒成就故生天上有一天言得於佛不壞淨有言得法不壞淨有言得僧不壞淨有言聖戒成就身壞命終得生天上時四十天子於尊者大目犍連前各自記説得須陀洹果即沒不現如四十天子如是四百八百十千天子亦如是説五八如是我聞一時佛住王舍城迦蘭陀竹園時尊者大目犍連與尊者勒叉那比丘共在耆闍崛山中尊者勒叉那晨朝詣尊者大目犍連所語尊者大目犍連共出耆闍崛山入王舍城乞食時尊者大目犍連默然而許即共出耆闍崛山入王舍城乞食行至一處尊者大目犍連心有所念欣然微笑尊者勒叉那見微笑已即問尊者大目犍連言若佛及佛弟子欣然微笑非無因緣尊者今日何因何緣而發微笑尊者大目犍連言所問非時且入王舍城乞食還於世尊前當問是事是應時問當為汝説時尊者大目揵連與尊者勒叉那入王舍城乞食而還洗足舉衣鉢俱詣佛所稽首佛足退坐一面尊者勒叉那問尊者大目揵連我今晨朝與汝共出耆闍崛山乞食汝於一處欣然微笑我即問汝微笑因緣汝答我言所問非時今復問汝何因何緣欣然微笑尊者大目犍連語尊者勒叉那我路中見一衆生身如樓閣啼哭號呼憂悲苦痛乘虛而行我見是已作是思惟如是衆生受如此身而有如是憂悲大苦故發微笑爾時世尊告諸比丘善哉善哉我聲聞中住實眼實智實義實法決定通達見是衆生我亦見此衆生而不説者恐人不信所以者何如來所説有不信者是愚癡人長夜受苦佛告諸比丘過去世時彼大身衆生在此王舍城為屠牛兒以屠牛因緣故於百千歲墮地獄中從地獄出有屠牛餘罪得如是身常受如是憂悲惱苦如是諸比丘如尊者大目犍連所見不異汝等受持佛説此經已諸比丘聞佛所説歡喜奉行五九如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者大目犍連與尊者勒叉那在耆闍崛山尊者勒叉那於晨朝時詣尊者大目犍連所語尊者大目犍連共出耆闍崛山入王舍城乞食尊者大目犍連默然而許即共出耆闍崛山入王舍城乞食行至一處尊者大目犍連心有所念欣然微笑尊者勒叉那見尊者大目犍連微笑即問言尊者若佛及佛聲聞弟子欣然微笑非無因緣尊者今日何因何緣而發微笑尊者大目犍連言所問非時且乞食還於世尊前當問是事是應時問尊者大目犍連與尊者勒叉那共入城乞食食已還洗足舉衣鉢俱詣佛所稽首佛足退坐一面尊者勒叉那問尊者大目犍連我今晨朝與汝共入王舍城乞食汝於一處欣然微笑我即問汝何因緣笑汝答我言所問非時我今問汝何因何緣欣然微笑尊者大目犍連語尊者勒叉那我於路中見一衆生筋骨相連舉身不淨臭穢可厭烏鵄雕鷲野干餓狗隨而擭食或從脅肋探其內藏而取食之極大苦痛啼哭號呼我見是已心即念言如是衆生得如是身而受如是不饒益苦爾時世尊告諸比丘善哉比丘我聲聞中住實眼實智實義實法決定通達見如是衆生我亦見是衆生而不説者恐不信故所以者何如來所説有不信者是愚癡人長夜當受不饒益苦諸比丘是衆生者過去世時於此王舍城為屠牛弟子緣屠牛罪故已百千歲墮地獄中受無量苦彼屠牛惡行餘罪緣故今得此身續受如是不饒益苦諸比丘如大目揵連所見真實不異汝等受持佛説此經已諸比丘聞佛所説歡喜奉行五一如是我聞一時佛住王舍城迦蘭陀竹園尊者大目犍連與尊者勒叉那在耆闍崛山中尊者勒叉那於晨朝時詣尊者大目犍連所語尊者大目犍連共出耆闍崛山入王舍城乞食尊者大目犍連默然而許即共出耆闍崛山入王舍城乞食行至一處尊者大目犍連心有所念欣然微笑尊者勒叉那見尊者大目犍連微笑即問言尊者若佛及佛聲聞弟子欣然微笑非無因緣尊者今日何因何緣而發微笑尊者大目犍連言所問非時且乞食還於世尊前當問是事是應時問尊者大目犍連與尊者勒叉那共入城乞食已還洗足舉衣鉢俱詣佛所稽首佛足退坐一面尊者勒叉那問尊者大目犍連我今晨朝共入王舍城乞食汝於一處欣然微笑我即問汝微笑因緣汝答我言所問非時我今問汝何因何緣欣然微笑尊者大目犍連語勒叉那我於路中見一大身衆生舉身無皮純一肉段乘空而行烏鵄雕鷲野干餓狗隨而擭食或從脅肋探其內藏而取食之苦痛切迫啼哭號呼我即思惟如是衆生得如是身乃受如是不饒益苦佛告諸比丘善哉比丘我聲聞中住實眼實智實義實法決定通達見是衆生我亦見是衆生而不説者恐不信故所以者何如來所説有不信者是愚癡人長夜當受不饒益苦諸比丘是衆生者過去世時於此王舍城為屠羊者緣斯罪故已百千歲墮地獄中受無量苦今得此身餘罪緣故續受斯苦諸比丘如大目犍連所見真實無異汝等受持佛説此經已諸比丘聞佛所説歡喜奉行五一一如是我聞一時佛住王舍城乃至尊者大目犍連於路中見一大身衆生舉體無皮形如脯臘乘虛而行乃至佛告諸比丘此衆生者過去世時於此王舍城為屠羊弟子屠羊罪故已百千歲墮地獄中受無量苦今得此身續受斯罪諸比丘如大目犍連所見真實無異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五一二如是我聞一時佛住王舍城乃至路中見一大身衆生舉體無皮形如肉段乘虛而行乃至佛告諸比丘此衆生者過去世時於此王舍城自墮其胎緣斯罪故墮地獄中已百千歲受無量苦以餘罪故今得此身續受斯苦諸比丘如大目犍連所見真實無異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五一三如是我聞一時佛住王舍城乃至尊者大目犍連於路中見一大身衆生舉體生毛毛如大針針皆火然還燒其體痛徹骨髓乃至佛告諸比丘此衆生者過去世時於此王舍城為調象士緣斯罪故已百千歲墮地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行如調象士如是調馬士調牛士好讒人者及諸種種苦切人者亦復如是五一四如是我聞一時佛住王舍城乃至尊者大目犍連於路中見一大身衆生舉身生毛毛利如刀其毛火然還割其體痛徹骨髓乃至佛告諸比丘此衆生者過去世時於此王舍城好樂戰諍刀劍傷人已百千歲墮地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五一五如是我聞一時佛住王舍城乃至尊者大目犍連於路中見一大身衆生遍身生毛其毛似箭皆悉火然還燒其身痛徹骨髓乃至佛告諸比丘此衆生者過去世時於此王舍城曾為獵師射諸禽獸緣斯罪故已百千歲墮地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五一六如是我聞一時佛住王舍城乃至我於路中見一大身衆生舉體生毛毛如䂎矛毛悉火然還燒其身痛徹骨髓乃至佛告諸比丘此衆生者過去世時於此王舍城為屠豬人䂎殺群豬緣斯罪故已百千歲墮地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五一七如是我聞一時佛住王舍城乃至我於路中見一大身無頭衆生兩邊生目胸前生口身常流血諸蟲唼食痛徹骨髓乃至佛告諸比丘此衆生者過去世時於此王舍城好斷人頭緣斯罪故已百千歲墮地獄中受無量苦今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行如斷人頭捉頭亦如是五一八如是我聞一時佛住王舍城乃至我於路中見一衆生陰卵如甕坐則踞上行則肩擔乃至佛告諸比丘此衆生者過去世時於王舍城作鍛銅師偽器欺人緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行如鍛銅師如是斗稱欺人村主市監亦復如是五一九如是我聞一時佛住王舍城乃至路中見一衆生以銅鐵羅網自纏其身火常熾然還燒其體痛徹骨髓乘虛而行佛告諸比丘此衆生者過去世時於此王舍城為捕魚師緣斯罪故已地獄中受無量苦地獄餘罪今受此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行如捕魚師捕鳥網兔亦復如是五二如是我聞一時佛住王舍城乃至路中見一衆生頂有鐵磨盛火熾然轉磨其頂乘虛而行受無量苦乃至佛告諸比丘此衆生者過去世時於此王舍城為卜占女人轉式卜占欺妄惑人以求財物緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五二一如是我聞一時佛住王舍城乃至路中見一衆生其身獨轉猶若旋風乘虛而行乃至佛告諸比丘此衆生者過去世時於此王舍城為卜占師誤惑多人以求財物緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五二二如是我聞一時佛住王舍城乃至路中見一衆生傴身藏行狀如恐怖舉體被服悉皆火然還燒其身乘虛而行佛告諸比丘此衆生者過去世時於此王舍城好行他淫緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五二三如是我聞一時佛住波羅㮈國仙人住處鹿野苑中時尊者大目犍連尊者勒叉那比丘晨朝共入波羅㮈城乞食於路中尊者大目犍連思惟顧念欣然微笑時尊者勒叉那白尊者大目犍連言世尊及世尊弟子欣然微笑必有因緣何緣尊者今日欣然微笑尊者大目犍連語尊者勒叉那此非時問且乞食還詣世尊前當問此事時俱入城乞食還洗足舉衣鉢俱詣世尊稽首禮足退坐一面時尊者勒叉那問尊者大目犍連晨朝路中何因何緣欣然微笑尊者大目犍連語尊者勒叉那我於路中見一大身衆生舉體膿壞臭穢不淨乘虛而行烏鵄雕鷲野干餓狗隨逐擭食啼哭號呼我念衆生得如是身受如是苦一何痛哉佛告諸比丘我亦見此衆生而不説者恐不信故所以者何如來所説有不信者是愚癡人長夜受苦此衆生者過去世時於此波羅㮈城為女人賣色自活時有比丘於迦葉佛所出家彼女人以不清淨心請彼比丘比丘直心受請不解其意女人瞋恚以不淨水灑比丘身緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説是經已諸比丘聞佛所説歡喜奉行五二四如是我聞一時佛住波羅㮈國仙人住處鹿野苑中乃至我於路中見一大身衆生舉體火然乘虛而行啼哭號呼受諸苦痛乃至佛告諸比丘此衆生者過去世時於此波羅㮈城為自在王第一夫人與王共宿起瞋恚心以然燈油灑王身上緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説是經已諸比丘聞佛所説歡喜奉行五二五如是我聞一時佛住波羅㮈國仙人住處鹿野苑中乃至尊者大目犍連言我於路中見一衆生舉體糞穢以塗其身亦食糞穢乘虛而行臭穢苦惱啼哭號呼乃至佛告諸比丘此衆生者過去世時於此波羅㮈城為自在王師婆羅門以憎嫉心請迦葉佛聲聞僧以糞著飯下試惱衆僧緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五二六如是我聞一時佛住舍衛國祇樹給孤獨園乃至尊者大目犍連言我於路中見一大身衆生頭上有大銅鑊熾然滿中洋銅流灌身體乘虛而行啼哭號呼乃至佛告諸比丘此衆生者過去世時於此舍衛國迦葉佛所出家為知事比丘有檀越送油應付諸比丘時有衆多客比丘知事比丘不時分油待客比丘去然後乃分緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異佛説此經已諸比丘聞佛所説歡喜奉行五二七如是我聞一時佛住舍衛國祇樹給孤獨園乃至尊者大目犍連言我於路中見一大身衆生有熾熱鐵丸從身出入乘虛而行苦痛切迫啼哭號呼乃至佛告諸比丘此衆生者過去世時於此舍衛國迦葉佛法中出家作沙彌次守衆僧果園盜取七果持奉和上緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五二八如是我聞一時佛住舍衛國乃至尊者大目犍連言我於路中見一大身衆生其舌廣長見有利釿炎火熾然以釿其舌乘虛而行啼哭號呼乃至佛告諸比丘此衆生者過去世時於此舍衛國迦葉佛法中出家作沙彌以斧破石蜜供養衆僧著斧刃者盜取食之緣斯罪故入地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五二九如是我聞一時佛住舍衛國乃至尊者大目犍連言我於路中見是大身衆生有雙鐵輪在兩脅下熾然旋轉還燒其身乘虛而行啼哭號呼乃至佛告諸比丘此衆生者過去世時於此舍衛國迦葉佛法中出家作沙彌持石蜜供養衆僧盜取二著於掖下緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五三如是我聞一時佛住舍衛國乃至尊者大目犍連言我於路中見一大身衆生以熾然鐵葉以纏其身衣被床臥悉皆熱鐵炎火熾然食熱鐵丸乘虛而行啼哭號呼乃至佛告諸比丘此衆生者過去世時於此舍衛國迦葉佛法中出家作比丘為衆僧乞衣食供僧之餘輒自受用緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行如比丘如是比丘尼式叉摩那沙彌沙彌尼優婆塞優婆夷亦復如是五三一如是我聞一時佛住舍衛國乃至尊者大目犍連言我於路中見一大身衆生熾然鐵車而駕其頸拔其頸筋及連四腳筋以勒其頸行熱鐵地乘虛而去啼哭號呼乃至佛告諸比丘此衆生者過去世時於此舍衛國駕乘牛車以自生活緣斯罪故於地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五三二如是我聞一時佛住舍衛國乃至尊者大目犍連言我於路中見一大身衆生其舌長廣熾然鐵釘以釘其舌乘虛而行啼哭號呼乃至佛告諸比丘此衆生者過去世時於此舍衛國迦葉佛法中出家作比丘為摩摩帝呵責諸比丘言諸長老汝等可去此處儉薄不能相供各隨意去求豐樂處饒衣食所衣食床臥應病湯藥可得不乏先住比丘悉皆捨去客僧聞之亦復不來緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五三三如是我聞一時佛住舍衛國乃至尊者大目犍連言我於路中見一大身衆生比丘之像皆著鐵葉以為衣服舉體火然亦以鐵鉢盛熱鐵丸而食之乃至佛告諸比丘此衆生者過去世時於此舍衛國迦葉佛法中出家作比丘作摩摩帝惡口形名諸比丘或言此是惡禿此惡風法此惡衣服以彼惡口故先住者去未來不來緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目犍連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五三四如是我聞一時佛住舍衛國乃至佛告諸比丘此衆生者過去世時於此舍衛國迦葉佛法中出家作比丘好起諍訟鬪亂衆僧作諸口舌令不和合先住比丘厭惡捨去未來者不來緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦諸比丘如大目揵連所見真實不異當受持之佛説此經已諸比丘聞佛所説歡喜奉行五三五如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者阿那律住松林精舍時尊者大目犍連住跋祇聚落失收摩羅山恐怖稠林禽獸之處時尊者阿那律獨一靜處禪思思惟作是念有一乘道淨衆生離憂悲惱苦得真如法所謂四念處何等為四身身觀念處受心法法觀念處若於四念處遠離者於賢聖法遠離於賢聖法遠離者於聖道遠離聖道遠離者於甘露法遠離甘露法遠離者則不能脫生老病死憂悲惱苦若於四念處信樂者於聖法信樂聖法信樂者於聖道信樂聖道信樂者於甘露法信樂甘露法信樂者得脫生老病死憂悲惱苦爾時尊者大目揵連知尊者阿那律心之所念如力士屈伸臂頃以神通力於跋祇聚落失收摩羅山恐怖稠林禽獸之處沒至舍衛城松林精舍尊者阿那律前現語阿那律言汝獨一靜處禪思思惟作是念有一乘道令衆生清淨離生老病死憂悲惱苦得真如法所謂四念處何等為四身身觀念處受心法法觀念處若於四念處不樂者於賢聖法不樂聖法不樂者於聖道不樂不樂聖道者於甘露法亦不樂不樂甘露法者則不能脫生老病死憂悲惱苦若於四念處信樂者樂賢聖法樂賢聖法者樂於聖道樂聖道者得甘露法得甘露法者得脫生老病死憂悲惱苦耶尊者阿那律語尊者大目揵連言如是如是尊者大目犍連語尊者阿那律言云何名為樂四念處尊者大目犍連若比丘身身觀念處心緣身正念住調伏止息寂靜一心增進如是受心法念處正念住調伏止息寂靜一心增進尊者大目犍連是名比丘樂四念處時尊者大目犍連即如其像三昧正受從舍衛國松林精舍門還至跋祇聚落失收摩羅山恐怖稠林禽獸之處五三六如是我聞一時佛住舍衛國祇樹給孤獨園乃至尊者大目犍連問尊者阿那律云何名為四念處修習多修習尊者阿那律語尊者大目犍連言若比丘於內身起厭離想於內身起不厭離想厭離不厭離俱捨想正念正知如內身如是外身內外身內受外受內外受內心外心內外心內法外法內外法作厭離想不厭離想厭離不厭離俱捨想住正念正知如是尊者大目犍連是名四念處修習多修習時尊者大目犍連即入三昧從舍衛國松林精舍入三昧神通力如力士屈伸臂頃還到跋祇聚落失收摩羅山恐怖稠林禽獸住處
