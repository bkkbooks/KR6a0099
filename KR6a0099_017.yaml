body:
  text: 四五六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有光界淨界無量空入處界無量識入處界無所有入處界非想非非想入處界有滅界時有異比丘從座起整衣服稽首禮足合掌白佛言世尊彼光界淨界無量空入處界無量識入處界無所有入處界非想非非想入處界滅界如此諸界何因緣可知佛告比丘彼光界者緣暗故可知淨界緣不淨故可知無量空入處界者緣色故可知無量識入處界者緣內故可知無所有入處界者緣所有可知非想非非想入處界者緣有第一故可知滅界者緣有身可知諸比丘白佛言世尊彼光界乃至滅界以何正受而得佛告比丘彼光界淨界無量空入處界無量識入處界無所有入處界此諸界於自行正受而得非想非非想入處界於第一有正受而得滅界者於有身滅正受而得佛説此經已諸比丘聞佛所説歡喜奉行四五七如是我聞一時佛住舍衛國東園鹿子母講堂爾時世尊晡時從禪覺於講堂陰中敷座於大衆前坐説優檀那句告諸比丘緣界故生説非不界緣界故生見非不界緣界故生想非不界緣下界我説生下説下見下想下思下欲下願下士夫下所作下施設下建立下部分下顯示下受生如是中如是勝界緣勝界我説彼生勝説勝見勝想勝思勝願勝士夫勝所作勝施設勝建立勝部分勝顯示勝受生勝時有婆迦利比丘在佛後執扇扇佛白佛言世尊若於三藐三佛陀起非三藐三佛陀見彼見亦緣界而生耶佛告比丘於三藐三佛陀起非三藐三佛陀見亦緣界而生非不界所以者何凡夫界者是無明界如我先説緣下界生下説下見乃至下受生中勝界生勝説勝見乃至勝受生佛説此經已諸比丘聞佛所説歡喜奉行四五八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有因生欲想非無因有因生恚想害想非無因云何因生欲想謂緣欲界也緣欲界故生欲想欲欲欲覺欲熱欲求愚癡凡夫起欲求已此衆生起三處邪謂身口心如是邪因緣故現法苦住有苦有礙有惱有熱身壞命終生惡趣中是名因緣生欲想云何因緣生恚想害想謂害界也緣害界生害想害欲害覺害熱害求愚癡凡夫起害求已此衆生起三處邪謂身口心起三處邪因緣已現法苦住有苦有礙有惱有熱身壞命終生惡趣中是名因緣生害想諸比丘若諸沙門婆羅門如是安於生生危嶮想不求捨離不覺不吐彼則現法苦住有苦有礙有惱有熱身壞命終生惡趣中譬如城邑聚落不遠有曠野大火卒起彼無有力能滅火者當知彼諸野中衆生悉被火害如是諸沙門婆羅門安於生生危嶮想身壞命終生惡趣中諸比丘有因生出要想非無因云何有因生出要想謂出要界緣出要界生出要想出要欲出要覺出要熱出要求謂彼慧者出要求時衆生三處生正謂身口心彼如是生正因緣已現法樂住不苦不礙不惱不熱身壞命終生善趣中是名因緣生出要想云何因緣生不恚不害想謂不害界也不害界因緣生不害想不害欲不害覺不害熱不害求彼慧者不害求時衆生三處正謂身口心彼正因緣生已現法樂住不苦不礙不惱不熱身壞命終生善趣中是名因緣生不害想若諸沙門婆羅門安於生生不害想不捨離不覺不吐現法樂住不苦不礙不惱不熱身壞命終生善趣中譬如城邑聚落邊有曠野大火卒起有人堪能手足滅火當知彼諸衆生依草木者悉不被害如是諸沙門婆羅門安於生生正想不捨不覺不吐現法樂住不苦不礙不惱不熱身壞命終生善趣中佛説此經已諸比丘聞佛所説歡喜奉行四五九如是我聞一時佛住舍衛國祇樹給孤獨園時有婆羅門來詣佛所與世尊面相慰勞已於一面住白佛言衆生非自作非他作佛告婆羅門如是論者我不與相見汝今自來而言我非自作非他作婆羅門言云何瞿曇衆生為自作為他作耶佛告婆羅門我今問汝隨意答我婆羅門於意云何有衆生方便界令諸衆生知作方便耶婆羅門言瞿曇有衆生方便界令諸衆生知作方便也佛告婆羅門若有方便界令諸衆生知有方便者是則衆生自作是則他作婆羅門於意云何有衆生安住界堅固界出界造作界令彼衆生知有造作耶婆羅門白佛有衆生安住界堅固界出界造作界令諸衆生知有造作佛告婆羅門若彼安住界堅固界出界造作界令諸衆生知有造作者是則衆生自作是則他作婆羅門白佛有衆生自作有他作瞿曇世間多事今當請辭佛告婆羅門世間多事宜知是時時彼婆羅門聞佛所説歡喜隨喜從座起去四六如是我聞一時佛住拘睒彌國瞿師羅園爾時瞿師羅長者詣尊者阿難所禮尊者阿難足退坐一面白尊者阿難所説種種界云何為種種界尊者阿難告瞿師羅長者眼界異色界異喜處二因緣生識三事和合生觸又喜觸因緣生樂受如是耳鼻舌身意法亦如是説復次長者有異眼界異色界憂處二因緣生識三事和合生苦觸彼苦觸因緣生苦受如是耳鼻舌身意法亦如是説復次長者異眼界異色界捨處二因緣生識三事和合生不苦不樂觸不苦不樂觸因緣生不苦不樂受如是耳鼻舌身意法亦如是説爾時瞿師羅長者聞尊者阿難所説歡喜隨喜禮足而去四六一如是我聞一時佛住拘睒彌國瞿師羅園爾時瞿師羅長者詣尊者阿難所稽首禮足於一面坐白尊者阿難所説種種界云何為種種界尊者阿難告瞿師羅長者有三界云何三謂欲界色界無色界爾時尊者阿難即説偈言曉了於欲界色界亦復然捨一切有餘得無餘寂滅於身和合界永盡無餘證三耶三佛説無憂離垢句尊者阿難説是經已瞿師羅長者歡喜隨喜作禮而去四六二如是我聞一時佛住拘睒彌國瞿師羅園爾時瞿師羅長者詣尊者阿難所稽首禮足退坐一面白尊者阿難所説種種界云何名為種種界尊者阿難告瞿師羅長者有三界色界無色界滅界是名三界即説偈言若色界衆生及住無色界不識滅界者還復受諸有若斷於色界不住無色界滅界心解脫永離於生死尊者阿難説是經已瞿師羅長者歡喜隨喜作禮而去四六三如是我聞一時佛住拘睒彌國瞿師羅園爾時瞿師羅長者詣尊者阿難所稽首禮足退坐一面白尊者阿難所説種種界云何為種種界尊者阿難答瞿師羅長者謂三種出界云何三謂從欲界出至色界色界出至無色界一切諸行一切思想滅界是名三出界即説偈言知從欲界出超踰於色界一切行寂滅勤修正方便斷除一切愛一切行滅盡知一切有餘不復轉還有尊者阿難説是經已瞿師羅長者歡喜隨喜作禮而去四六四如是我聞一時佛住拘睒彌國瞿師羅園爾時尊者阿難往詣上座上座名者所詣已恭敬問訊問訊已退坐一面問上座上座名者言若比丘於空處樹下間房思惟當以何法專精思惟上座答言尊者阿難於空處樹下間房思惟者當以二法專精思惟所謂止觀尊者阿難復問上座修習於止多修習已當何所成修習於觀多修習已當何所成上座答言尊者阿難修習於止終成於觀修習觀已亦成於止謂聖弟子止觀俱修得諸解脫界阿難復問上座云何諸解脫界上座答言尊者阿難若斷界無欲界滅界是名諸解脫界尊者阿難復問上座云何斷界乃至滅界上座答言尊者阿難斷一切行是名斷界斷除愛欲是無欲界一切行滅是名滅界時尊者阿難聞上座所説歡喜隨喜往詣五百比丘所恭敬問訊退坐一面白五百比丘言若比丘於空處樹下間房思惟時當以何法專精思惟時五百比丘答尊者阿難當以二法專精思惟乃至滅界如上座所説時尊者阿難聞五百比丘所説歡喜隨喜往詣佛所稽首佛足退坐一面白佛言世尊若比丘空處樹下間房思惟當以何法專精思惟佛告阿難若比丘空處樹下間房思惟當以二法專精思惟乃至滅界如五百比丘所説時尊者阿難白佛言奇哉世尊大師及諸弟子皆悉同法同句同義同味我今詣上座名上座者問如此義亦以此義此句此味答我如今世尊所説我復詣五百比丘所亦以此義此句此味而問彼五百比丘亦以此義此句此味答如今世尊所説是故當知師及弟子一切同法同義同句同味佛告阿難汝知彼上座為何如比丘阿難白佛不知世尊佛告阿難上座者是阿羅漢諸漏已盡已捨重擔正智心善解脫彼五百比丘亦皆如是佛説此經已尊者阿難聞佛所説歡喜奉行四六五如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者羅睺羅詣世尊所稽首禮足退坐一面白佛言世尊云何知云何見我此識身及外境界一切相得無有我我所見我慢繫著使佛告羅睺羅諦聽善思當為汝説羅睺羅若比丘於所有地界若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切非我不異我不相在如實知水界火界風界空界識界亦復如是羅睺羅比丘如是知如是見於我此識身及外境界一切相無有我我所見我慢繫著使羅睺羅若比丘於此識身及外境界一切相無有我我所見我慢繫著使是名斷愛轉諸結正慢無間等究竟苦邊佛説此經已尊者羅睺羅聞佛所説歡喜奉行四六六如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者羅睺羅往詣佛所稽首禮足退坐一面白佛言世尊云何知云何見我此識身及外境界一切相得無有我我所見我慢繫著使佛告羅睺羅有三受苦受樂受不苦不樂受此三受何因何集何生何轉謂此三受觸因觸集觸生觸轉彼彼觸因彼彼受生若彼彼觸滅彼彼受亦滅止清涼沒如是知如是見我此識及外境界一切相得無有我我所見我慢繫著使佛説此經已尊者羅睺羅聞佛所説歡喜奉行四六七如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者羅睺羅往詣佛所稽首禮足退住一面白佛言世尊云何知云何見我此識身及外境界一切相得無有我我所見我慢繫著使佛告羅睺羅有三受苦受樂受不苦不樂受觀於樂受而作苦想觀於苦受作劍刺想觀不苦不樂受作無常想若彼比丘觀於樂受而作苦想觀於苦受作劍刺想觀不苦不樂受作無常滅想者是名正見爾時世尊即説偈言觀樂作苦想苦受同劍刺於不苦不樂修無常滅想是則為比丘正見成就者寂滅安樂道住於最後邊永離諸煩惱摧伏衆魔軍佛説此經已尊者羅睺羅聞佛所説歡喜奉行四六八如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者羅睺羅往詣佛所稽首佛足退坐一面白佛言世尊云何知云何見我此識身及外境界一切相得無有我我所見我慢繫著使佛告羅睺羅有三受苦受樂受不苦不樂受觀於樂受為斷樂受貪使故於我所修梵行斷苦受瞋恚使故於我所修梵行斷不苦不樂受癡使故於我所修梵行羅睺羅若比丘樂受貪使已斷已知苦受恚使已斷已知不苦不樂受癡使已斷已知者是名比丘斷除愛欲轉去諸結慢無間等究竟苦邊爾時世尊即説偈言樂受所受時則不知樂受貪使之所使不見出要道苦受所受時則不知苦受瞋恚使所使不見出要道不苦不樂受正覺之所説不善觀察者終不度彼岸比丘勤精進正知不動轉如此一切受慧者能覺知覺知諸受者現法盡諸漏明智者命終不墮於衆數衆數既已斷永處般涅槃佛説此經已尊者羅睺羅聞佛所説歡喜奉行四六九如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘大海深嶮者此世間愚夫所説深嶮非賢聖法律所説深嶮世間所説者是大水積聚數耳若從身生諸受衆苦逼迫或惱或死是名大海極深嶮處愚癡無聞凡夫於此身生諸受苦痛逼迫或惱或死憂悲稱怨啼哭號呼心亂發狂長淪沒溺無止息處多聞聖弟子於身生諸受苦痛逼迫或惱或死不生憂悲啼哭號呼心生狂亂不淪生死得止息處爾時世尊即説偈言身生諸苦受逼迫乃至死憂悲不息忍號呼發狂亂心自生障礙招集衆苦增永淪生死海莫知休息處能捨身諸受身所生苦惱切迫乃至死不起憂悲想不啼哭號呼能自忍衆苦心不生障礙招集衆苦增不淪沒生死永得安隱處佛説此經已諸比丘聞佛所説歡喜奉行四七如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘愚癡無聞凡夫生苦樂受不苦不樂受多聞聖弟子亦生苦樂受不苦不樂受諸比丘凡夫聖人有何差別諸比丘白佛世尊是法根法眼法依善哉世尊唯願廣説諸比丘聞已當受奉行佛告諸比丘愚癡無聞凡夫身觸生諸受苦痛逼迫乃至奪命憂愁啼哭稱怨號呼佛告諸比丘諦聽善思當為汝説諸比丘愚癡無聞凡夫身觸生諸受增諸苦痛乃至奪命愁憂稱怨啼哭號呼心生狂亂當於爾時增長二受若身受若心受譬如士夫身被雙毒箭極生苦痛愚癡無聞凡夫亦復如是增長二受身受心受極生苦痛所以者何以彼愚癡無聞凡夫不了知故於諸五欲生樂受觸受五欲樂受五欲樂故為貪使所使苦受觸故則生瞋恚生瞋恚故為恚使所使於此二受若集若滅若味若患若離不如實知不如實知故生不苦不樂受為癡使所使為樂受所繫終不離苦受所繫終不離不苦不樂受所繫終不離云何繫謂為貪恚癡所繫為生老病死憂悲惱苦所繫多聞聖弟子身觸生苦受大苦逼迫乃至奪命不起憂悲稱怨啼哭號呼心亂發狂當於爾時唯生一受所謂身受不生心受譬如士夫被一毒箭不被第二毒箭當於爾時唯生一受所謂身受不生心受為樂受觸不染欲樂不染欲樂故於彼樂受貪使不使於苦觸受不生瞋恚不生瞋恚故恚使不使於彼二使集滅味患離如實知如實知故不苦不樂受癡使不使於彼樂受解脫不繫苦受不苦不樂受解脫不繫於何不繫謂貪恚癡不繫生老病死憂悲惱苦不繫爾時世尊即説偈言多聞於苦樂非不受覺知彼於凡夫人其實大有聞樂受不放逸苦觸不增憂苦樂二俱捨不順亦不違比丘勤方便正智不傾動於此一切受黠慧能了知了知諸受故現法盡諸漏身死不墮數永處般涅槃佛説此經已諸比丘聞佛所説歡喜奉行四七一如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘譬如空中狂風卒起從四方來有塵土風無塵土風毗濕波風鞞嵐婆風薄風厚風乃至風輪起風身中受風亦復如是種種受起樂受苦受不苦不樂受樂身受苦身受不苦不樂身受樂心受苦心受不苦不樂心受樂食受苦食受不苦不樂食受樂無食苦無食不苦不樂無食受樂貪受苦貪受不苦不樂貪受樂出要受苦出要受不樂不苦出要受爾時世尊即説偈言譬如虛空中種種狂風起東西南北風四維亦如是有塵及無塵乃至風輪起如是此身中諸受起亦然若樂若苦受及不苦不樂有食與無食貪著不貪著比丘勤方便正智不傾動於此一切受黠慧能了知了知諸受故現法盡諸漏身死不墮數永處般涅槃佛説此經已諸比丘聞佛所説歡喜奉行四七二如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘譬如客舍種種人住若剎利婆羅門長者居士野人獵師持戒犯戒在家出家悉於中住此身亦復如是種種受生苦受樂受不苦不樂受樂身受苦身受不苦不樂身受樂心受苦心受不苦不樂心受樂食受苦食受不苦不樂食受樂無食受苦無食受不苦不樂無食受樂貪著受苦貪著受不苦不樂貪著受樂出要受苦出要受不苦不樂出要受爾時世尊即説偈言譬如客舍中種種人住止剎利婆羅門長者居士等旃陀羅野人持戒犯戒者在家出家人如是等種種此身亦如是種種諸受生若樂若苦受及不苦不樂有食與無食貪著不貪著比丘勤方便正智不傾動於此一切受黠慧能了知了知諸受故現法盡諸漏身死不墮數永處般涅槃佛説此經已諸比丘聞佛所説歡喜奉行四七三如是我聞一時佛住王舍城迦蘭陀竹園時有異比丘獨一靜處禪思念言世尊説三受樂受苦受不苦不樂受又説諸所有受悉皆是苦此有何義是比丘作是念已從禪起往詣佛所稽首禮足退住一面白佛言世尊我於靜處禪思念言世尊説三受樂受苦受不苦不樂受又説諸所有受悉皆是苦此有何義佛告比丘我以一切行無常故一切諸行變易法故説諸所有受悉皆是苦爾時世尊即説偈言知諸行無常皆是變易法故説受悉苦正覺之所知比丘勤方便正智不傾動於諸一切受𭶑慧能了知悉知諸受已現法盡諸漏身死不墮數永處般涅槃佛説是經已諸比丘聞佛所説歡喜奉行四七四如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者阿難獨一靜處禪思念言世尊説三受樂受苦受不苦不樂受又復説諸所有受悉皆是苦此有何義作是念已從禪起詣世尊所稽首禮足退住一面白佛言世尊我獨一靜處禪思念言如世尊説三受樂受苦受不苦不樂受又説一切諸受悉皆是苦此有何義佛告阿難我以一切行無常故一切行變易法故説諸所有受悉皆是苦又復阿難我以諸行漸次寂滅故説以諸行漸次止息故説一切諸受悉皆是苦阿難白佛言云何世尊以諸受漸次寂滅故説佛告阿難初禪正受時言語寂滅第二禪正受時覺觀寂滅第三禪正受時喜心寂滅第四禪正受時出入息寂滅空入處正受時色想寂滅識入處正受時空入處想寂滅無所有入處正受時識入處想寂滅非想非非想入處正受時無所有入處想寂滅想受滅正受時想受寂滅是名漸次諸行寂滅阿難白佛言世尊云何漸次諸行止息佛告阿難初禪正受時言語止息二禪正受時覺觀止息三禪正受時喜心止息四禪正受時出入息止息空入處正受時色想止息識入處正受時空入處想止息無所有入處正受時識入處想止息非想非非想入處正受時無所有入處想止息想受滅正受時想受止息是名漸次諸行止息阿難白佛世尊是名漸次諸行止息佛告阿難復有勝止息奇特止息上止息無上止息如是止息於餘止息無過上者阿難白佛何等為勝止息奇特止息上止息無上止息諸餘止息無過上者佛告阿難於貪欲心不樂解脫恚癡心不樂解脫是名勝止息奇特止息上止息無上止息諸餘止息無過上者佛説此經已尊者阿難聞佛所説歡喜奉行四七五如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘毗婆尸如來未成佛時獨一靜處禪思思惟作如是觀觀察諸受云何為受云何受集云何受滅云何受集道迹云何受滅道迹云何受味云何受患云何受離如是觀察有三受樂受苦受不苦不樂受觸集是受集觸滅是受滅若於受愛樂讚歎染著堅住是名受集道迹若於受不愛樂讚歎染著堅住是名受滅道迹若受因緣生樂喜是名受味若受無常變易法是名受患若於受斷欲貪越欲貪是名受離佛説此經已諸比丘聞佛所説歡喜奉行如毗婆尸佛如是式棄佛毗濕波浮佛迦羅迦孫提佛迦那迦牟尼佛迦葉佛及我釋迦文佛未成佛時思惟觀察諸受亦復如是四七六如是我聞一時佛住王舍城迦蘭陀竹園爾時有異比丘獨一靜處禪思如是觀察諸受云何受云何受集云何受滅云何受集道迹云何受滅道迹云何受味云何受患云何受離時彼比丘從禪覺已詣世尊所稽首禮足退住一面白佛言世尊我獨一靜處禪思觀察諸受云何為受云何受集云何受滅云何受集道迹云何受滅道迹云何受味云何受患云何受離佛告比丘有三受樂受苦受不苦不樂受觸集是受集觸滅是受滅若於受愛樂讚歎染著堅住是名受集道迹若於受不愛樂讚歎染著堅住是名受滅道迹若受因緣生樂喜是名受味若受無常變易法是名受患若於受斷欲貪越欲貪是名受離佛説此經已諸比丘聞佛所説歡喜奉行四七七如異比丘問經尊者阿難所問經亦如是四七八如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘云何為受云何受集云何受滅云何受集道迹云何受滅道迹諸比丘白佛言世尊是法根法眼法依善哉世尊唯願廣説諸比丘聞已當受奉行佛告諸比丘諦聽善思當為汝説佛告比丘有三受樂受苦受不苦不樂受觸集是受集觸滅是受滅若於受愛樂讚歎染著堅住是名受集道迹若於受不愛樂讚歎染著堅住是名受滅道迹若受因緣生樂喜是名受味若受無常變易是名受患若於受斷欲貪越欲貪是名受離佛説此經已諸比丘聞佛所説歡喜奉行四七九如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘若我於諸受不如實知受集受滅受集道迹受滅道迹受味受患受離不如實知我於諸天世間魔梵沙門婆羅門天人衆中不得解脫出離脫諸顛倒亦非阿耨多羅三藐三菩提以我於諸受受集受滅受集道迹受滅道迹受味受患受離如實知故於諸天世間魔梵沙門婆羅門天人衆中為脫為出為脫諸顛倒得阿耨多羅三藐三菩提佛説此經已諸比丘聞佛所説歡喜奉行四八如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘若沙門婆羅門於諸受不如實知受集受滅受集道迹受滅道迹受味受患受離不如實知者非沙門非婆羅門不同沙門不同婆羅門非沙門義非婆羅門義現法自知作證我生已盡梵行已立所作已作自知不受後有若沙門婆羅門於諸受如實知受集受滅受集道迹受滅道迹受味受患受離如實知者彼是沙門之沙門婆羅門之婆羅門同沙門同婆羅門沙門義婆羅門義現法自知作證我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行如沙門非沙門如是沙門數非沙門數亦如是四八一如是我聞一時佛住一奢能伽羅國一奢能伽羅林中爾時世尊告諸比丘我欲於此中半月坐禪諸比丘勿復遊行唯除乞食及布薩即便坐禪不復遊行唯除乞食及布薩爾時世尊半月過已敷坐具於衆前坐告諸比丘我以初成佛時所思惟禪法少許禪分於今半月思惟作是念諸有衆生生受皆有因緣非無因緣云何因緣欲是因緣覺是因緣觸是因緣諸比丘於欲不寂滅覺不寂滅觸不寂滅彼因緣故衆生生受以不寂滅因緣故衆生生受彼欲寂滅覺不寂滅觸不寂滅以彼因緣故衆生生受以不寂滅因緣故衆生生受彼欲寂滅覺寂滅觸不寂滅以彼因緣故衆生生受以不寂滅因緣故衆生生受彼欲寂滅覺寂滅觸寂滅以彼因緣故衆生生受以彼寂滅因緣故衆生生受邪見因緣故衆生生受邪見不寂滅因緣故衆生生受邪志邪語邪業邪命邪方便邪念邪定邪解脫邪智因緣故衆生生受邪智不寂滅因緣故衆生生受正見因緣故衆生生受正見寂滅因緣故衆生生受正志正語正業正命正方便正念正定正解脫正智因緣故衆生生受正智寂滅因緣故衆生生受若彼欲不得者得不獲者獲不證者證生以彼因緣故衆生生受以彼寂滅因緣故衆生生受是名不寂滅因緣衆生生受寂滅因緣衆生生受若沙門婆羅門如是緣緣緣緣集緣緣滅緣緣集道迹緣緣滅道迹不如實知者彼非沙門之沙門非婆羅門之婆羅門不同沙門之沙門不同婆羅門之婆羅門非沙門義非婆羅門義現法自知作證我生已盡梵行已立所作已作自知不受後有若沙門婆羅門於此緣緣緣緣集緣緣滅緣緣集道迹緣緣滅道迹如實知者當知是沙門之沙門婆羅門之婆羅門同沙門同婆羅門以沙門義婆羅門義現法自知作證我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行四八二如是我聞一時佛住舍衛國祇樹給孤獨園夏安居時爾時給孤獨長者來詣佛所稽首禮足却坐一面佛為説法示教照喜説種種法示教照喜已從座起整衣服為佛作禮合掌白佛言唯願世尊與諸大衆受我三月請衣被飲食應病湯藥爾時世尊默然而許時給孤獨長者知佛默然受請已從座起去還歸自家過三月已來詣佛所稽首禮足退坐一面佛告給孤獨長者善哉長者三月供養衣被飲食應病湯藥汝以莊嚴淨治上道於未來世當獲安樂果報然汝今莫得默然樂受此法汝當精勤時時學遠離喜樂具足身作證時給孤獨長者聞佛所説歡喜隨喜從座起而去爾時尊者舍利弗於衆中坐知給孤獨長者去已白佛言奇哉世尊善為給孤獨長者説法善勸勵給孤獨長者言汝已三月具足供養如來大衆中淨治上道於未來世當受樂報汝莫默然樂著此福汝當時時學遠離喜樂具足身作證世尊若使聖弟子學遠離喜樂具足身作證得遠離五法修滿五法云何遠離五法謂斷欲所長養喜斷欲所長養憂斷欲所長養捨斷不善所長養喜斷不善所長養憂是名五法遠離云何修滿五法謂隨喜歡喜猗息樂一心佛告舍利弗如是如是若聖弟子修學遠離喜樂具足身作證遠離五法修滿五法佛説此經已諸比丘聞佛所説歡喜奉行四八三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有食念者有無食念者有無食無食念者有食樂者無食樂者有無食無食樂者有食捨者有無食捨者有無食無食捨者有食解脫者有無食解脫者有無食無食解脫者云何食念謂五欲因緣生念云何無食念謂比丘離欲離惡不善法有覺有觀離生喜樂初禪具足住是名無食念云何無食無食念謂比丘有覺有觀息內淨一心無覺無觀定生喜樂第二禪具足住是名無食無食念云何有食樂謂五欲因緣生樂生喜是名有食樂云何無食樂謂息有覺有觀內淨一心無覺無觀定生喜樂是名無食樂云何無食無食樂謂比丘離喜貪捨心住正念正知安樂住彼聖説捨是名無食無食樂云何有食捨謂五欲因緣生捨是名有食捨云何無食捨謂彼比丘離喜貪捨心住正念正知安樂住彼聖説捨第三禪具足住是名無食捨云何無食無食捨謂比丘離苦息樂憂喜先已離不苦不樂捨淨念一心第四禪具足住是名無食無食捨云何有食解脫謂色俱行云何無食解脫謂無色俱行云何無食無食解脫謂彼比丘貪欲不染解脫瞋恚愚癡心不染解脫是名無食無食解脫佛説此經已諸比丘聞佛所説歡喜奉行四八四如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者跋陀羅比丘及尊者阿難俱住祇樹給孤獨園爾時尊者阿難往詣尊者跋陀羅所共相問訊慰勞已於一面住時尊者阿難問尊者跋陀羅比丘言云何名為見第一云何聞第一云何樂第一云何想第一云何有第一尊者跋陀羅語尊者阿難言有梵天自在造作化如意為世之父若見彼梵天者名曰見第一阿難有衆生離生喜樂處處潤澤處處敷悅舉身充滿無不滿處所謂離生喜樂彼從三昧起舉聲唱説遍告大衆極寂靜者離生喜樂極樂者離生喜樂諸有聞彼聲者是名聞第一復次阿難有衆生於此身離喜之樂潤澤處處潤澤敷悅充滿舉身充滿無不滿處所謂離喜之樂是名樂第一云何想第一阿難有衆生度一切識入處無所有無所有入處具足住若起彼想者是名想第一云何有第一復次阿難有衆生度一切無所有入處非想非非想入處具足住若起彼有者是名有第一尊者阿難語尊者跋陀羅比丘言多有人作如是見如是説汝亦同彼有何差別我作方便問汝汝當諦聽當為汝説如其所觀次第盡諸漏是為見第一如其所聞次第盡諸漏是名聞第一如所生樂次第盡諸漏者是名樂第一如其所想次第盡諸漏者是名想第一如實觀察次第盡諸漏是名有第一時二正士共論説已從座起去四八五如是我聞一時佛住王舍城迦蘭陀竹園爾時瓶沙王詣尊者優陀夷所稽首作禮退坐一面時瓶沙王白尊者優陀夷言云何世尊所説諸受優陀夷言大王世尊説三受樂受苦受不苦不樂受瓶沙王白尊者優陀夷莫作是言世尊説三受樂受苦受不苦不樂受正應有二受樂受苦受若不苦不樂受是則寂滅如是三説優陀夷不能為王立三受王亦不能立二受俱共詣佛所稽首禮足退住一面時尊者優陀夷以先所説廣白世尊我亦不能立三受王亦不能立二受今故共來具問世尊如是之義定有幾受佛告優陀夷我有時説一受或時説二受或説三四五六十八三十六乃至百八受或時説無量受云何我説一受如説所有受皆悉是苦是名我説一受云何説二受説身受心受是名二受云何三受樂受苦受不苦不樂受云何四受謂欲界繫受色界繫受無色界繫受及不繫受云何説五受謂樂根喜根苦根憂根捨根是名説五受云何説六受謂眼觸生受耳鼻舌身意觸生受云何説十八受謂隨六喜行隨六憂行隨六捨行受是名説十八受云何三十六受依六貪著喜依六離貪著喜依六貪著憂依六離貪著憂依六貪著捨依六離貪著捨是名説三十六受云何説百八受謂三十六受過去三十六未來三十六現在三十六是名説百八受云何説無量受如説此受彼受等比如是無量名説是名説無量受優陀夷我如是種種説受如實義世間不解故而共諍論共相違反終竟不得我法律中真實之義以自止息優陀夷若於我此所説種種受義如實解知者不起諍論共相違反起未起諍能以法律止令休息然優陀夷有二受欲受離欲受云何欲受五欲功德因緣生受是名欲受云何離欲受謂比丘離欲惡不善法有覺有觀離生喜樂初禪具足住是名離欲受若有説言衆生依此初禪唯是為樂非餘者此則不然所以者何更有勝樂過於此故何者是謂比丘離有覺有觀內淨定生喜樂第二禪具足住是名勝樂如是乃至非想非非想入處轉轉勝説若有説言唯有此處乃至非想非非想極樂非餘亦復不然所以者何更有勝樂過於此故何者是謂比丘度一切非想非非想入處想受滅身作證具足住是名勝樂過於彼者若有異學出家作是説言沙門釋種子唯説想受滅名為至樂此所不應所以者何應當語言此非世尊所説受樂數世尊説受樂數者如説優陀夷有四種樂何等為四謂離欲樂遠離樂寂滅樂菩提樂佛説此經已尊者優陀夷及瓶沙王聞佛所説歡喜奉行四八六如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘若於一法生正厭離不樂背捨得盡諸漏所謂一切衆生由食而存復有二法名及色復有三法謂三受復有四法謂四食復有五法謂五受陰復有六法謂六內外入處復有七法謂七識住復有八法謂世八法復有九法謂九衆生居復有十法謂十業迹於此十法生厭不樂背捨得盡諸漏佛説此經已諸比丘聞佛所説歡喜奉行四八七如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘若於一法生正厭離不樂背捨究竟苦邊解脫於苦謂一切衆生由食而存復有二法名及色復有三法謂三受復有四法謂四食復有五法謂五受陰復有六法謂六內外入處復有七法謂七識住復有八法謂世八法復有九法謂九衆生居復有十法謂十業迹於此十法生正厭離不樂背捨究竟苦邊解脫於苦佛説此經已諸比丘聞佛所説歡喜奉行四八八如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘若於一法觀察無常觀察變易觀察離欲觀察滅觀察捨離得盡諸漏謂一切衆生由食而存復有二法名及色復有三法謂三受復有四法謂四食復有五法謂五受陰復有六法謂六內外入處復有七法謂七識住復有八法謂世八法復有九法謂九衆生居復有十法謂十業迹於此十法正觀無常觀察變易觀察離欲觀察滅觀察捨離得盡諸漏佛説此經已諸比丘聞佛所説歡喜奉行四八九如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘若於一法觀察無常觀察變易觀察離欲觀察滅觀察捨離究竟苦邊解脫於苦謂一切衆生由食存復有二法名及色復有三法謂三受復有四法謂四食復有五法謂五受陰復有六法謂六內外入處復有七法謂七識住復有八法謂世八法復有九法謂九衆生居復有十法謂十業迹於此十業迹觀察無常觀察變易觀察離欲觀察滅觀察捨離究竟苦邊解脫於苦佛説此經已諸比丘聞佛所説歡喜奉行四五五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘緣界種種故生種種觸緣種種觸生種種想緣種種想生種種欲緣種種欲生種種覺緣種種覺生種種熱緣種種熱生種種求云何種種界謂十八界眼界乃至法界云何緣種種界生種種觸云何乃至緣種種熱生種種求謂緣眼界生眼觸非緣眼觸生眼界但緣眼界生眼觸緣眼觸生眼想非緣眼想生眼觸但緣眼觸生眼想緣眼想生眼欲非緣眼欲生眼想但緣眼想生眼欲緣眼欲生眼覺非緣眼覺生眼欲但緣眼欲生眼覺緣眼覺生眼熱非緣眼熱生眼覺但緣眼覺生眼熱緣眼熱生眼求非緣眼求生眼熱但緣眼熱生眼求如是耳鼻舌身意界緣生意觸乃至緣意熱生意求亦如是廣説是名比丘緣種種界生種種觸乃至緣種種熱生種種求非緣種種求生種種熱乃至非緣種種觸生種種界但緣種種界生種種觸乃至緣種種熱生種種求佛説是經已諸比丘聞佛所説歡喜奉行如內六入處外六入處亦如是説
