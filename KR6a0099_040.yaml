body:
  text: 宋天竺三藏求那跋陀羅譯一一四如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘若能受持七種受者以是因緣得生天帝釋處謂天帝釋本為人時供養父母及家諸尊長和顏軟語不惡口不兩舌常真實言於慳吝世間雖在居家而不慳惜行解脫施勤施常樂行施施會供養等施一切爾時世尊即説偈言供養於父母及家之尊長柔和恭遜辭離麁言兩舌調伏慳吝心常修真實語彼三十三天見行七法者咸各作是言當來生此天佛説此經已諸比丘聞佛所説歡喜奉行一一五如是我聞一時佛住鞞舍離國獼猴池側重閣講堂時有離車名摩訶利來詣佛所稽首佛足退坐一面白佛言世尊見天帝釋不佛答言見離車復問世尊見有鬼似帝釋形以不佛告離車我知天帝釋亦知有鬼似天帝釋亦知彼帝釋法受持彼法緣故得生帝釋處離車帝釋本為人時供養父母乃至行平等捨爾時世尊即説偈言供養於父母及家之尊長柔和恭遜辭離麁言兩舌調伏慳吝心常修真實語彼三十三天見行七法者咸各作是言當來生此天佛説此經已時摩訶利離車聞佛所説歡喜隨喜作禮而去一一六如是我聞一時佛住鞞舍離國獼猴池側重閣講堂時有異比丘來詣佛所稽首佛足退住一面白佛言世尊何因何緣釋提桓因名釋提桓因佛告比丘釋提桓因本為人時行於頓施沙門婆羅門貧窮困苦求生行路乞施以飲食錢財穀帛華香嚴具床臥燈明以堪能故名釋提桓因比丘復白佛言世尊何因何緣故釋提桓因復名富蘭陀羅佛告比丘彼釋提桓因本為人時數數行施衣被飲食乃至燈明以是因緣故名富蘭陀羅比丘復白佛言何因何緣故復名摩伽婆佛告比丘彼釋提桓因本為人時名摩伽婆故釋提桓因即以本名名摩伽婆比丘復白佛言何因何緣復名娑婆婆佛告比丘彼釋提桓因本為人時數以婆詵私衣布施供養以是因緣故釋提桓因名娑婆婆比丘復白佛言世尊何因何緣釋提桓因復名憍尸迦佛告比丘彼釋提桓因本為人時為憍尸族姓人以是因緣故彼釋提桓因復名憍尸迦比丘問佛言世尊何因何緣彼釋提桓因名舍脂鉢低佛告比丘彼阿修羅女名曰舍脂為天帝釋第一天后是故帝釋名舍脂鉢低比丘白佛言世尊何因何緣釋提桓因復名千眼佛告比丘彼釋提桓因本為人時聰明智慧於一坐間思千種義觀察稱量以是因緣彼天帝釋復名千眼比丘白佛何因何緣彼釋提桓因復名因提利佛告比丘彼天帝釋於諸三十三天為王為主以是因緣故彼天帝釋名因提利佛告比丘然彼釋提桓因本為人時受持七種受以是因緣得天帝釋何等為七釋提桓因本為人時供養父母乃至等行惠施是為七種受以是因緣為天帝釋爾時世尊即説偈言如上廣説佛説此經已諸比丘聞佛所説歡喜奉行一一七如是我聞一時佛住鞞舍離國獼猴池側重閣講堂爾時世尊告諸比丘過去世時有一夜叉鬼醜陋惡色在帝釋空座上坐三十三天見此鬼醜陋惡色在帝釋空座上坐見已咸各瞋恚諸天如是極瞋恚已彼鬼如是如是隨瞋恚漸漸端正時三十三天往詣天帝釋白帝釋言憍尸迦當知有一異鬼醜陋惡色在天王空座上坐我等諸天見彼鬼醜陋惡色坐天王座極生瞋恚隨彼諸天瞋恚彼鬼隨漸端正釋提桓因告諸三十三天彼是瞋恚對治鬼爾時天帝釋自往彼鬼所整衣服偏袒右肩合掌三稱名字而言仁者我是釋提桓因隨釋提桓因如是恭敬下意彼鬼如是如是隨漸醜陋即復不現時釋提桓因自坐已而説偈言人當莫瞋恚見瞋莫瞋報於惡莫生惡當破壞憍慢不瞋亦不害名住賢聖衆惡罪起瞋恚堅住如石山盛瞋恚能持如制逸馬車我説善御士非謂執繩者佛告諸比丘釋提桓因於三十三天為自在王歎説不瞋汝等如是正信非家出家學道亦應讚歎不瞋當如是學佛説此經已諸比丘聞佛所説歡喜奉行一一八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊晨朝著衣持鉢入舍衛城乞食乞食已還精舍舉衣鉢洗足已持尼師壇著右肩上至安陀林布尼師壇坐一樹下入晝正受爾時祇桓中有兩比丘諍起一人罵詈一人默然其罵詈者即便改悔懺謝於彼而彼比丘不受其懺以不受懺故時精舍中衆多比丘共相勸諫高聲閙亂爾時世尊以淨天耳過於人耳聞祇桓中高聲閙亂聞已從禪覺還精舍於大衆前敷座而坐告諸比丘我今晨朝乞食還至安陀林坐禪入晝正受聞精舍中高聲大聲紛紜閙亂竟為是誰比丘白佛此精舍中有二比丘諍起一比丘罵一者默然時罵比丘尋向悔謝而彼不受緣不受故多人勸諫故致大聲高聲閙亂佛告比丘云何比丘愚癡之人人向悔謝不受其懺若人懺而不受者是愚癡人長夜當得不饒益苦諸比丘過去世時釋提桓因有三十三天共諍説偈教誡言於他無害心瞋亦不纏結懷恨不經久於瞋以不住雖復瞋恚盛不發於麁言不求彼開節揚人之虛短常當自防護以義內省察不怒亦不害常與賢聖俱若與惡人俱剛強猶山石盛恚能自持如制逸馬車我説為善御非謂執繩者佛告諸比丘釋提桓因於三十三天為自在王常行忍辱亦復讚歎行忍者汝等比丘正信非家出家學道當行忍辱讚歎忍者應當學佛説此經已諸比丘聞佛所説歡喜奉行一一九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去世時天阿修羅對陳欲戰釋提桓因語毗摩質多羅阿修羅王莫得各各共相殺害但當論議理屈者伏毗摩質多羅阿修羅王言設共論議誰當證知理之通塞天帝釋言諸天衆中自有智慧明記識者阿修羅衆亦復自有明記識者毗摩質多羅阿修羅言可爾釋提桓因言汝等可先立論然後我當隨後立論則不為難時毗摩質多羅阿修羅王即説偈立論言我若行忍者於事則有闕愚癡者當言怖畏故行忍釋提桓因説偈答言正使愚癡者言恐怖故忍及其不言者於理何所傷但自觀其義亦觀於他義彼我悉獲安斯忍為最上毗摩質多羅阿修羅復説偈言若不制愚癡愚癡則傷人猶如凶惡牛捨走逐觸人執杖而強制怖畏則調伏是故堅持杖折伏彼愚夫帝釋復説偈言我常觀察彼制彼愚夫者愚者瞋恚盛智以靜默伏不瞋亦不害常與賢聖俱惡罪起瞋恚堅住如石山盛瞋恚能持如制逸馬車我説善御士非謂執繩者爾時天衆中有天智慧者阿修羅衆中有阿修羅智慧者於此偈思惟稱量觀察作是念毗摩質多羅阿修羅所説偈終竟長夜起於鬪訟戰諍當知毗摩質多羅阿修羅王教人長夜鬪訟戰諍釋提桓因所説偈長夜終竟息於鬪訟戰諍當知天帝釋長夜教人息於鬪訟戰諍當知帝釋善論得勝佛告諸比丘釋提桓因以善論議伏阿修羅諸比丘釋提桓因於三十三天為自在王立於善論讚歎善論汝等比丘亦應如是正信非家出家學道亦當善論讚歎善論應當學佛説此經已諸比丘聞佛所説歡喜奉行一一一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去世時有天帝釋天阿修羅對陳欲戰釋提桓因語三十三天衆言今日諸天與阿修羅軍戰諸天得勝阿修羅不如者當生擒毗摩質多羅阿修羅王以五繫縛將還天宮毗摩質多羅阿修羅王告阿修羅衆今日諸天阿修羅共戰若阿修羅勝諸天不如者當生擒釋提桓因以五繫縛將還阿修羅宮當其戰時諸天得勝阿修羅不如時彼諸天捉得毗摩質多羅阿修羅王以五繫縛將還天宮縛在帝釋斷法殿前門下帝釋從此門入出之時毗摩質多羅阿修羅縛在門側瞋恚罵詈時帝釋御者見阿修羅王身被五縛在於門側帝釋出入之時輒瞋恚罵詈見已即便説偈白帝釋言釋今為畏彼為力不足耶能忍阿修羅面前而罵辱釋即答言不以畏故忍亦非力不足何有𭶑慧人而與愚夫對御者復白言若但行忍者於事則有闕愚癡者當言畏怖故行忍是故當苦治以智制愚癡帝釋答言我常觀察彼制彼愚夫者見愚者瞋盛智以靜默伏非力而為力是彼愚癡力愚癡違遠法於道則無有若使有大力能忍於劣者是則為上忍無力何有忍於他極罵辱大力者能忍是則為上忍無力何所忍於己及他人善護大恐怖知彼瞋恚盛還自守靜默於二義俱備自利亦利他謂言愚夫者以不見法故愚夫謂勝忍重增其惡口未知忍彼罵於彼常得勝於勝己行忍是名恐怖忍於等者行忍是名忍諍忍於劣者行忍是則為上忍佛告諸比丘釋提桓因於三十三天為自在王常行忍辱讚歎於忍汝等比丘正信非家出家學道亦應如是行忍讚歎於忍應當學佛説經已諸比丘聞佛所説歡喜奉行一一一一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去世時釋提桓因欲入園觀時敕其御者令嚴駕千馬之車詣於園觀御者奉敕即嚴駕千馬之車往白帝釋唯俱尸迦嚴駕已竟唯王知時天帝釋即下常勝殿東向合掌禮佛爾時御者見即心驚毛竪馬鞭落地時天帝釋見御者心驚毛竪馬鞭落地即説偈言汝見何憂怖馬鞭落於地御者説偈白帝釋言見王天帝釋為舍脂之夫所以生恐怖馬鞭落地者常見天帝釋一切諸大地人天大小王及四護世主三十三天衆悉皆恭敬禮何處更有尊尊於帝釋者而今正東向合掌修敬禮爾時帝釋説偈答言我實於一切世間大小王及四護世王三十三天衆最為其尊王故悉來恭敬而復有世間隨順等正覺名號滿天師故我稽首禮御者復白言是必世間勝故使天王釋恭敬而合掌東向稽首禮我今亦當禮天王所禮者時天帝釋舍脂之夫説如是偈禮佛已乘千馬車往詣園觀佛告諸比丘彼天帝釋於三十三天為自在王尚恭敬佛亦復讚歎恭敬於佛汝等比丘正信非家出家學道亦應如是恭敬於佛亦當讚歎恭敬佛者應當學佛説此經已諸比丘聞佛所説歡喜奉行一一一二如是我聞一時佛住舍衛國祇樹給孤獨園廣説如上差別者爾時帝釋下常勝殿合掌東向敬禮尊法乃至佛説此經已諸比丘聞佛所説歡喜奉行如是我聞一時佛住舍衛國祇樹給孤獨園如上廣説差別者爾時帝釋説偈答御者言我實為大地世間大小王及四護世主三十三天衆如是等一切悉尊重恭敬然復有淨戒長夜入正受正信而出家究竟諸梵行故我於彼所尊重恭敬禮又調伏貪恚超越愚癡境修學不放逸亦恭敬禮彼貪欲瞋恚癡悉已永不著漏盡阿羅漢復應敬禮彼若復在居家奉持於淨戒如法修布薩亦復應敬禮御者白帝釋言是必世間勝故天王敬禮我亦當如是隨天王恭敬諸比丘彼天帝釋舍脂之夫敬禮法僧亦復讚歎禮法僧者汝等已能正信非家出家學道亦當如是敬禮法僧當復讚歎禮法僧者佛説此經已諸比丘聞佛所説歡喜奉行一一一三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去世時有天帝釋欲入園觀王敕御者令嚴駕千馬之車御者受教即嚴駕已還白帝釋乘已嚴駕唯王知時爾時帝釋從常勝殿來下周向諸方合掌恭敬時彼御者見天帝釋從殿來下住於中庭周向諸方合掌恭敬見已驚怖馬鞭落地而説偈言諸方唯有人臭穢胞胎生神處穢死尸飢渴常燋然何故憍尸迦故重於非家為我説其義飢渴願欲聞時天帝釋説偈答言我正恭敬彼能出非家者自在遊諸方不計其行止城邑國土色不能纍其心不畜資生具一往無欲定往則無所求唯無為為樂言則定善言不言則寂定諸天阿修羅各各共相違人間自共諍相違亦如是唯有出家者於諸諍無諍於一切衆生放捨於刀杖於財離財色不醉亦不荒遠離一切惡是故敬禮彼是時御者復説偈言天王之所敬是必世間勝故我從今日當禮出家人如是説已天帝釋敬禮諸方一切僧畢升於馬車遊觀園林佛告比丘彼天帝釋於三十三天為自在王而常恭敬衆僧亦常讚歎恭敬僧功德汝等比丘正信非家出家學道亦當如是恭敬衆僧亦當讚歎敬僧功德佛説此經已諸比丘聞佛所説歡喜奉行一一一四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去世時阿修羅王興四種兵象兵馬兵車兵步兵時三十三天欲共鬪戰時天帝釋聞阿修羅王興四種兵象兵馬兵車兵步兵來欲共戰聞已即告宿毗梨天子言阿公知不阿修羅興四種兵象兵馬兵車兵步兵欲與三十三天共戰阿公可敕三十三天興四種兵象兵馬兵車兵步兵與彼阿修羅共戰爾時宿毗梨天子受帝釋教還自天宮慢緩寬縱不勤方便阿修羅衆已出在道路帝釋聞已復告宿毗梨天子阿公阿修羅軍已在道路阿公可速告令起四種兵與阿修羅戰宿毗梨天子受帝釋教已即復還宮懈怠寬縱時阿修羅王軍已垂至釋提桓因聞阿修羅軍已在近路復告宿毗梨天子阿公知不阿修羅軍已在近路阿公速告諸天起四種兵時宿毗梨天子即説偈言若有不起處無為安隱樂得如是處者無作亦無憂當與我是處令我得安隱爾時帝釋説偈答言若有不起處無為安隱樂若得是處者無作亦無憂汝得是處者亦應將我去宿毗梨天子復説偈言若處無方便不起安隱樂若得彼處者無作亦無憂當與我是處令我得安隱時天帝釋復説偈答言若處無方便不起安隱樂若人得是處無作亦無憂汝得是處者亦應將我去宿毗梨天子復説偈言若處不放逸不起安隱樂若人得是處無作亦無憂當與我是處令得安隱樂時天帝釋復説偈言若處不放逸不起安隱樂若人得是處無作亦無憂汝得是處者亦應將我去宿毗梨復説偈言懶惰無所起不知作已作行欲悉皆會當與我是處時天帝釋復説偈言懶惰無所起得究竟安樂汝得彼處者亦應將我去宿毗梨天子復説偈言無事亦得樂無作亦無憂若與我是處令我得安樂天帝釋復説偈言若見若復聞衆生無所作汝得是處者亦應將我去汝若畏所作不念於有為但當速淨除涅槃之徑路時宿毗梨天子嚴四兵象兵馬兵車兵步兵與阿修羅戰摧阿修羅衆諸天得勝還歸天宮佛告諸比丘釋提桓因興四種兵與阿修羅戰精勤得勝諸比丘釋提桓因於三十三天為自在王常以精勤方便亦常讚歎精勤之德汝等比丘正信非家出家學道當勤精進讚歎精勤佛説此經已諸比丘聞佛所説歡喜奉行一一一五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去世時有一聚落有諸仙人於聚落邊空間處住止時有諸天阿修羅去聚落不遠對陳戰鬪爾時毗摩質多羅阿修羅王除去五飾脫去天冠却傘蓋除劍刀屏寶拂脫革屣至彼仙人住處入於門內周向看視不顧眄諸仙人亦不問訊看已還出時有一仙人遙見毗摩質多羅阿修羅王除去五飾入園看已還出見已語諸仙人言此何等人有不調伏色不似人形非威儀法似田舍兒非長者子除去五飾入於園門高視觀看亦不顧眄問訊諸仙人有一仙人答言此是毗摩質多羅阿修羅王除去五飾觀看而去彼仙人言此非賢士不好不善非賢非法除去五飾來入園門看已還去亦不顧眄問訊諸仙人以是故當知天衆增長阿修羅損減時釋提桓因除去五飾入仙人住處與諸仙人面相問訊慰勞然後還出復有仙人見天帝釋除去五飾入於園門周遍問訊見已問諸仙人此是何人入於園林有調伏色有可適人色有威儀色非田舍兒似族姓子除去五飾來入園門周遍問訊然後還出有仙人答言此是天帝釋除去五飾來入園門周遍問訊然後還去彼仙人言此是賢士善好真實威儀法除去五飾來入園門周遍問訊然後還去以是當知天衆增長阿修羅衆損減時毗摩質多羅阿修羅王聞仙人稱歎諸天聞已瞋恚熾盛時彼空處仙人聞阿修羅王瞋恚熾盛往詣毗摩質多羅阿修羅王所而説偈言仙人故來此求乞施無畏汝能施無畏賜牟尼恩教毗摩質多羅以偈答言於汝仙人所無有施無畏違背阿修羅習近帝釋故於此諸無畏當遺以恐怖仙人復説偈言隨行殖種子隨類果報生來乞於無畏遺之以恐怖當獲無盡畏施畏種子故時諸仙人於毗摩質多羅阿修羅王面前説呪已凌虛而逝即於是夜毗摩質多羅阿修羅王心驚三起眠中聞惡聲言釋提桓因興四種兵與阿修羅戰驚覺恐怖慮戰必敗退走而還阿修羅宮時天帝釋敵退得勝已詣彼空間仙人住處禮諸仙人足已退於西面諸仙人前東向而坐時東風起有異仙人即説偈言今此諸牟尼出家來日久腋下流汗臭莫順坐風下千眼可移坐此臭難可堪時天帝釋説偈答言種種衆香華結以為華鬘今之所聞香其香復過是寧久聞斯香未曾生厭患佛告諸比丘彼天帝釋於三十三天為自在王恭敬出家人亦常讚歎出家人亦常讚歎恭敬之德汝等比丘正信非家出家學道常應恭敬諸梵行者亦當讚歎恭敬之德佛説此經已諸比丘聞佛所説歡喜奉行一一一六如是我聞一時佛住舍衛國祇樹給孤獨園時天帝釋晨朝來詣佛所稽首佛足以帝釋神力身諸光明遍照祇樹精舍時釋提桓因説偈問佛言為殺於何等而得安隱眠為殺於何等而得無憂畏為殺何等法瞿曇所讚歎爾時世尊説偈答言害凶惡瞋恚而得安隱眠害凶惡瞋恚心得無憂畏瞋恚為毒根滅彼苦種子滅彼苦種子而得無憂畏彼苦種滅故賢聖所稱歎爾時釋提桓因聞佛所説歡喜隨喜作禮而去一一一七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於月八日四大天王敕遣大臣案行世間為何等人供養父母沙門婆羅門宗親尊重作諸福德見今世惡畏後世罪行施作福受持齋戒於月八日十四日十五日及神變月受戒布薩至十四日遣太子下觀察世間為何等人供養父母乃至受戒布薩至十五日四大天王自下世間觀察衆生為何等人供養父母乃至受戒布薩諸比丘爾時世間無有多人供養父母乃至受戒布薩者時四天王即往詣三十三天集法講堂白天帝釋天王當知今諸世間無有多人供養父母乃至受戒布薩時三十三天衆聞之不喜轉相告語今世間人不賢不善不好不類無真實行不供養父母乃至不受戒布薩緣斯罪故諸天衆減阿修羅衆當漸增廣諸比丘爾時世間若復多人供養父母乃至受戒布薩者四天王至三十三天集法講堂白天帝釋天王當知今諸世間多有人民供養父母乃至受戒布薩時三十三天心皆歡喜轉相告語今諸世間賢聖真實如法多有人民供養父母乃至受戒布薩緣斯福德阿修羅衆減諸天衆增廣時天帝釋知諸天衆皆歡喜已即説偈言若人月八日十四十五日及神變之月受持八支齋如我所修行彼亦如是修爾時世尊告諸比丘彼天帝釋所説偈言若人月八日十四十五日及神變之月受持八支齋如我所修行彼亦如是修此非善説所以者何彼天帝釋自有貪恚癡患不脫生老病死憂悲惱苦故若阿羅漢比丘諸漏已盡所作已作離諸重擔斷諸有結心善解脫説此偈言若人月八日十四十五日及神變之月受持八支齋如我所修行彼亦如是修如是説者則為善説所以者何阿羅漢比丘離貪恚癡已脫生老病死憂悲惱苦是故此偈則為善説佛説此經已諸比丘聞佛所説歡喜奉行一一一八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去世時毗摩質多羅阿修羅王疾病困篤往詣釋提桓因所語釋提桓因言憍尸迦當知我今疾病困篤為我療治令得安隱釋提桓因語毗摩質多羅阿修羅言汝當授我幻法我當療治汝病令得安隱毗摩質多羅阿修羅語帝釋言我當還問諸阿修羅衆聽我者當授帝釋阿修羅幻法爾時毗摩質多羅阿修羅即往至諸阿修羅衆中語諸阿修羅言諸人當知我今疾病困篤往詣釋提桓因所求彼治病彼語我言汝能授我阿修羅幻法者當治汝病令得安隱我今當往為彼説阿修羅幻法時有一詐偽阿修羅語毗摩質多羅阿修羅其彼天帝釋質直好信不虛偽但語彼言天王此阿修羅幻法若學者令人墮地獄受罪無量百千歲彼天帝釋必當息意不復求學當言汝去令汝病差可得安隱時毗摩質多羅阿修羅復往帝釋所説偈白言千眼尊天王阿修羅幻術皆是虛誑法令人墮地獄無量百千歲受苦無休息時天帝釋語毗摩質多羅阿修羅言止止如是幻術非我所須汝且還去令汝身病寂滅休息得力安隱佛告諸比丘釋提桓因於三十三天為自在王長夜真實不幻不偽賢善質直汝等比丘正信非家出家學道亦應如是不幻不偽賢善質直當如是學佛説此經已諸比丘聞佛所説歡喜奉行一一一九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘時有天帝釋及鞞盧闍那子婆稚阿修羅王有絶妙之容於晨朝時俱詣佛所稽首佛足退坐一面時天帝釋及鞞盧闍那子婆稚阿修羅王身諸光明普照祇樹給孤獨園爾時鞞盧闍那阿修羅王説偈白佛人當勤方便必令利滿足是利滿足已何須復方便時天帝釋復説偈言若人勤方便必令利滿足是利滿足已修忍無過上説是偈已俱白佛言世尊何者善説世尊告言汝等所説二説俱善然今汝等復聽我説一切衆生類悉皆求己利彼彼諸衆生各自求所應世間諸和合及與第一義當知世和合則為非常法若人勤方便必令利滿足是利滿足已修忍無過上爾時天帝釋及鞞盧闍那子婆稚阿修羅王聞佛所説歡喜隨喜作禮而去爾時世尊告諸比丘釋提桓因於三十三天為自在王修行於忍讚歎於忍汝等比丘正信非家出家學道亦應如是修行於忍讚歎於忍佛説此經已諸比丘聞佛所説歡喜奉行一一二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去世時有天帝釋白佛言世尊我今受如是戒乃至佛法住世盡其形壽有惱我者要不反報加惱於彼時毗摩質多羅阿修羅王聞天帝釋受如是戒乃至佛法住世盡其形壽有惱我者我不反報加惱於彼聞已執持利劍逆道而來時天帝釋遙見毗摩質多羅阿修羅王執持利劍逆道而來即遙告言阿修羅住縛汝勿動毗摩質多羅阿修羅王即不得動語帝釋言汝今豈不受如是戒若佛法住世盡其形壽有惱我者必不還報耶天帝釋答言我實受如是戒但汝息住受縛阿修羅言今且放我帝釋答言汝若約誓不作亂者然後放汝阿修羅言放我當如法作帝釋答言先如法作然後放汝時毗摩質多羅阿修羅王即説偈言貪欲之所趣及瞋恚所趣妄語之所趣謗毀賢聖趣我若嬈亂者趣同彼趣趣釋提桓因復告言放汝令去隨汝所安爾時天帝釋令阿修羅王作約誓已往詣佛所稽首佛足退坐一面白佛言世尊我於佛前受如是戒乃至佛法住世盡其形壽有惱我者我不反報毗摩質多羅阿修羅王聞我受戒手執利劍隨路而來我遙見已語言阿修羅住住縛汝勿動彼阿修羅言汝不受戒耶我即答言我實受戒且汝今住縛汝勿動彼即求脫我告彼言若作約誓不作亂者當令汝脫阿修羅言且當放我當説約誓我即告言先説約誓然後放汝彼即説偈作約誓言貪欲之所趣及瞋恚所趣妄語之所趣謗毀賢聖趣我若作嬈亂趣同彼趣趣如是世尊我要彼阿修羅王令説約誓為是法不彼阿修羅復為嬈亂不佛告天帝釋善哉善哉汝要彼約誓如法不違彼亦不復敢作嬈亂爾時天帝釋聞佛所説歡喜隨喜作禮而去爾時世尊告諸比丘彼天帝釋於三十三天為自在王不為嬈亂亦常讚歎不嬈亂法汝等比丘正信非家出家學道亦應如是行不嬈亂亦當讚歎不擾亂法佛説此經已諸比丘聞佛所説歡喜奉行
