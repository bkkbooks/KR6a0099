body:
  text: 宋天竺三藏求那跋陀羅譯八八如是我聞一時佛住舍衛國祇樹給孤獨園時有年少婆羅門名鬱多羅來詣佛所與世尊面相問訊慰勞已退坐一面白佛言世尊我常如法行乞持用供養父母令得樂離苦世尊我作如是為多福不佛告鬱多羅實有多福所以者何若有如法乞求供養父母令其安樂除苦惱者實有大福爾時世尊即説偈言如汝於父母恭敬修供養現世名稱流命終生天上佛説此經已年少鬱多羅歡喜隨喜作禮而去八九如是我聞一時佛住舍衛國祇樹給孤獨園時有年少婆羅門名優波迦來詣佛所與世尊面相問訊慰勞已退坐一面白佛言瞿曇諸婆羅門常稱歎邪盛大會沙門瞿曇亦復稱歎邪盛大會不佛告優波迦我不一向稱歎或有邪盛大會可稱歎或有邪盛大會不可稱歎優波迦白佛何等邪盛大會可稱歎何等邪盛大會不可稱歎佛告優波迦若邪盛大會繫群少特牛水特水牸及諸羊犢小小衆生悉皆傷殺逼迫苦切僕使作人鞭笞恐怛悲泣號呼不喜不樂衆苦作役如是等邪盛大會我不稱歎以造大難故若復大會不繫縛群牛乃至不令衆生辛苦作役者如是邪盛大會我所稱歎以不造大難故爾時世尊即説偈言馬祀等大會造諸大難事如是等邪盛大仙不稱歎繫縛諸衆生殺害微細蟲是非為正會大仙不隨順若不害衆生造作衆難者是等名正會大仙隨稱歎惠施修供養為應法邪盛施者清淨心梵行良福田如是大會者是則羅漢會是會得大果諸天皆歡喜自行恭敬請自手而施與彼我悉清淨是施得大果慧者如是施信心應解脫無罪樂世間智者往生彼佛説此經已優波迦婆羅門聞佛所説歡喜隨喜作禮而去九如是我聞一時佛住舍衛國祇樹給孤獨園廣説如上差別者謂隨説異偈言無為無諸難邪盛時清淨如法隨順行攝護諸梵行馨香歸世界超過諸凡鄙佛於邪盛善稱歎此邪盛惠施修供養邪盛隨所應淨信平等施梵行良福田彼作如是施是施羅漢田如是廣大施諸天所稱歎自行恭敬請自手而供養等攝自他故邪盛得大果慧者如是施淨信心解脫於無罪世界智者往生彼佛説此經已優波迦婆羅門聞佛所説歡喜作禮而去九一如是我聞一時佛住舍衛國祇樹給孤獨園時有年少婆羅門名鬱闍迦來詣佛所稽首佛足退坐一面白佛言世尊俗人在家當行幾法得現法安及現法樂佛告婆羅門有四法俗人在家得現法安現法樂何等為四謂方便具足守護具足善知識具足正命具足何等為方便具足謂善男子種種工巧業處以自營生謂種田商賈或以王事或以書疏算畫於彼彼工巧業處精勤修行是名方便具足何等為守護具足謂善男子所有錢穀方便所得自手執作如法而得能極守護不令王賊水火劫奪漂沒令失不善守護者亡失不愛念者輒取及諸災患所壞是名善男子善守護何等為善知識具足若有善男子不落度不放逸不虛妄不凶險如是知識能善安慰未生憂苦能令不生已生憂苦能令開覺未生喜樂能令速生已生喜樂護令不失是名善男子善知識具足云何為正命具足謂善男子所有錢財出內稱量周圓掌護不令多入少出也多出少入也如執稱者少則增之多則減之知平而捨如是善男子稱量財物等入等出莫令入多出少出多入少若善男子無有錢財而廣散用以此生活人皆名為優曇鉢果無有種子愚癡貪欲不顧其後或有善男子財物豐多不能食用傍人皆言是愚癡人如餓死狗是故善男子所有錢財能自稱量等入等出是名正命具足如是婆羅門四法成就現法安現法樂婆羅門白佛言世尊在家之人有幾法能令後世安後世樂佛告婆羅門在家之人有四法能令後世安後世樂何等為四謂信具足戒具足施具足慧具足何等為信具足謂善男子於如來所得信敬心建立信本非諸天魔梵及餘世人同法所壞是名善男子信具足何等戒具足謂善男子不殺生不偷盜不邪淫不妄語不飲酒是名戒具足云何施具足謂善男子離慳垢心在於居家行解脫施常自手與樂修行捨等心行施是名善男子施具足云何為慧具足謂善男子苦聖諦如實知習滅道聖諦如實知是名善男子慧具足若善男子在家行此四法者能得後世安後世樂爾時世尊復説偈言方便建諸業積集能守護知識善男子正命以自活淨信戒具足惠施離慳垢淨除於速道得後世安樂若處於居家成就於八法審諦尊所説等正覺所知現法得安隱現法喜樂住後世喜樂住佛説此經已鬱闍迦聞佛所説歡喜隨喜作禮而去九二如是我聞一時佛在拘薩羅人間遊行至舍衛國祇樹給孤獨園爾時舍衛國有憍慢婆羅門止住父母種姓俱淨無瑕點能説者七世相承悉皆清淨為婆羅門師言論通達諸論記典悉了萬名解法優劣分明諸句句記説容貌端正或生志高族姓志高容色志高聰明志高財富志高不敬父母諸尊師長聞沙門瞿曇在拘薩羅國人間遊行至舍衛國祇樹給孤獨園聞已作是念我當往彼沙門瞿曇所若有所説我當共論無所説者默然而還時憍慢婆羅門乘白馬車諸年少婆羅門前後導從持金柄傘蓋手執金瓶往見世尊至於園門下車步進爾時世尊與諸大衆圍繞説法不時顧念憍慢婆羅門時憍慢婆羅門作是念沙門瞿曇不顧念我且當還去爾時世尊知憍慢婆羅門心念而説偈言憍慢既來此不善更增慢向以義故來應轉增其義時憍慢婆羅門作是念沙門瞿曇已知我心欲修敬禮爾時世尊告憍慢婆羅門止止不須作禮心淨已足時諸大衆咸各高聲唱言奇哉世尊大德大力今此憍慢婆羅門恃生憍慢族姓憍慢容色憍慢聰明憍慢財富憍慢不敬父母諸尊師長今於沙門瞿曇所謙卑下下欲接足禮時憍慢婆羅門於大衆前唱令靜默而説偈言云何不起慢云何起恭敬云何善慰諭云何善供養爾時世尊説偈答言父母及長兄和尚諸師長及諸尊重者所不應生慢應當善恭敬謙下而問訊盡心而奉事兼設諸供養離貪恚癡心漏盡阿羅漢正智善解脫伏諸憍慢心於此賢聖等合掌稽首禮爾時世尊為憍慢婆羅門種種説法示教照喜如佛世尊次第説法説布施持戒生天功德愛欲味患煩惱清淨出要遠離諸清淨分如是廣説如白淨衣無諸黑惡速受染色憍慢婆羅門即於座上解四聖諦苦習滅道得無間等時憍慢婆羅門見法得法知法入法度諸疑惑不由他度於正法中得無所畏即從座起整衣服為佛作禮合掌白佛我今可得於正法中出家受具足不佛告憍慢婆羅門汝今可得於正法中出家受具足彼即出家獨正思惟所以善男子剃除鬚髮著袈裟衣正信非家出家學道得阿羅漢心善解脫九三如是我聞一時佛在拘薩羅人間遊行至舍衛國祇樹給孤獨園時有長身婆羅門作如是邪盛大會以七百特牛行列繫柱特牸水牛及諸羊犢種種小蟲悉皆繫縛辦諸飲食廣行布施種種外道從諸國國皆悉來集邪盛會所時長身婆羅門聞沙門瞿曇從拘薩羅人間遊行至舍衛國祇樹給孤獨園作是念我今辦邪盛大會所以七百特牛行列繫柱乃至小小諸蟲皆悉繫縛為邪盛大會故種種異道從諸國國來至會所我今當往沙門瞿曇所問邪盛法莫令我作邪盛大會分數中有所短少作是念已乘白馬車諸年少婆羅門前後導從持金柄傘蓋執金澡瓶出舍衛城詣世尊所恭敬承事至精舍門下車步進至於佛前面相問訊慰勞已退坐一面白佛言瞿曇我今欲作邪盛大會以七百特牛行列繫柱乃至小小諸蟲皆悉繫縛為邪盛大會故種種異道從諸國國皆悉來至邪盛會所又聞瞿曇從拘薩羅人間遊行至舍衛國祇樹給孤獨園我今故來請問瞿曇邪盛大會法諸物分數莫令我所作邪盛大會諸分數之中有所短少佛告婆羅門或有一邪盛大會主行施作福而生於罪為三刀劍之所刻削得不善果報何等三謂身刀劍口刀劍意刀劍何等為意刀劍生諸苦報如一會主造作大會作是思惟我作邪盛大會當殺爾所少壯特牛爾所水特水牸爾所羊犢及種種諸蟲是名意刀劍生諸苦報如是施主雖念作種種布施種種供養實生於罪云何為口刀劍生諸苦報有一會主造作大會作如是教我今作邪盛大會汝等當殺爾所少壯特牛乃至殺害爾所微細蟲是名口刀劍生諸苦報大會主雖作是布施供養實生於罪云何為身刀劍生諸苦報謂有一大會主造作大會自手傷殺爾所特牛乃至殺害種種細蟲是名身刀劍生諸苦報彼大會主雖作是念種種布施種種供養實生於罪然婆羅門當勤供養三火隨時恭敬禮拜奉事施其安樂何等為三一者根本二者居家三者福田何者為根本火隨時恭敬奉事供養施其安樂謂善男子方便得財手足勤苦如法所得供養父母令得安樂是名根本火何故名為根本若善男子從彼而生所謂父母故名根本善男子以崇本故隨時恭敬奉事供養施以安樂何等為居家火善男子隨時育養施以安樂謂善男子方便得財手足勤苦如法所得供給妻子宗親眷屬僕使傭客隨時給與恭敬施安是名家火何故名家其善男子處於居家樂則同樂苦則同苦在所為作皆相順從故名為家是故善男子隨時供給施與安樂何等名田火善男子隨時恭敬尊重供養施其安樂謂善男子方便得財手足勤勞如法所得奉事供養諸沙門婆羅門善能調伏貪恚癡者如是等沙門婆羅門建立福田崇向增進樂分樂報未來生天是名田火何故名田為世福田謂為應供是故名田是善男子隨時恭敬奉事供養施其安樂爾時世尊復説偈言根本及居家應供福田火是火增供養充足安隱樂無罪樂世間慧者往生彼如法財復會供養所應養供養應養故生天得名稱然婆羅門今善男子先所供養三火應斷令滅何等為三謂貪欲火瞋恚火愚癡火所以者何若貪火不斷不滅者自害害他自他俱害現法得罪後世得罪現法後世得罪緣彼而生心法憂苦恚火癡火亦復如是婆羅門若善男子事積薪火隨時辛苦隨時然隨時滅火因緣受苦爾時長身婆羅門默然而住時有婆羅門子名鬱多羅於會中坐長身婆羅門須臾默然思惟已告鬱多羅汝能往至邪盛會所放彼繫柱特牛及諸衆生受繫縛者悉皆放不而告之言長身婆羅門語汝隨意自在山澤曠野食不斷草飲淨流水四方風中受諸快樂鬱多羅白言隨大師教即往彼邪盛會所放諸衆生而告之言長身婆羅門語汝隨其所樂山澤曠野飲水食草四風自適爾時世尊知鬱多羅知已為長身婆羅門種種説法示教照喜如律世尊説法先後説戒説施及生天功德愛欲味患出要清淨煩惱清淨開示現顯譬如鮮淨白㲲易受染色長身婆羅門亦復如是即於座上見四真諦得無間等時長身婆羅門見法得法知法入法度諸疑惑不由他度於正法中得無所畏即從座起整衣服偏袒右肩合掌白佛已度世尊我從今日盡其壽命歸佛歸法歸比丘僧為優婆塞證知我唯願世尊與諸大衆受我飯食爾時世尊默然而許時長身婆羅門知佛受請已為佛作禮右繞三匝而去長身婆羅門還邪盛處作諸供辦淨美好者布置床座遣使請佛白言時到惟聖知時爾時世尊著衣持鉢大衆圍繞往到長身婆羅門會所大衆前坐時長身婆羅門知世尊坐定已手自供養種種飲食食已澡漱洗鉢畢別敷卑床於大衆前端坐聽法爾時世尊為長身婆羅門説種種法示教照喜已從座起而去九四如是我聞一時佛住舍衛國祇樹給孤獨園時有年少婆羅門名僧迦羅來詣佛所與世尊面相問訊慰勞已退坐一面白佛言瞿曇不善男子云何可知佛告婆羅門譬猶如月婆羅門復問善男子云何可知佛告婆羅門譬猶如月婆羅門白佛云何不善男子如月佛告婆羅門如月黑分光明亦失色亦失所係亦失日夜消滅乃至不現如是有人於如來所得信家心受持淨戒善學多聞損己布施正見真實於如來所淨信持戒惠施多聞正見真直已然後退失於戒聞施正見悉皆忘失日夜消滅乃至須臾一切忘失復次婆羅門若善男子不習近善知識不數聞法不正思惟身行惡行口行惡行意行惡行行惡因緣故身壞命終墮惡趣泥梨中如是婆羅門不善男子其譬如月婆羅門白佛云何善男子其譬如月佛告婆羅門譬如明月淨分光明色澤日夜增明乃至月滿一切圓淨如是善男子於如來法律得淨信心乃至正見真淨增明戒增施增聞增慧增日夜增長復於餘時親近善知識聞説正法內正思惟行身善行行口善行行意善行故以是因緣身壞命終化生天上婆羅門是故善男子譬如月爾時世尊而説偈言譬如月無垢周行於虛空一切小星中其光最盛明淨信亦如是戒聞離慳施於諸慳世間其施特明顯佛説此經已僧迦羅婆羅門聞佛所説歡喜隨喜從座起而去九五如是我聞一時佛住舍衛國祇樹給孤獨園時有生聞婆羅門來詣佛所與世尊面相問訊慰勞已退坐一面白佛言瞿曇我聞瞿曇説言唯應施我不應施餘人施我得大果非施餘人而得大果應施我弟子不應施餘弟子施我弟子得大果報非施餘弟子得大果報云何瞿曇作是語者為實説耶非為謗毀瞿曇乎為如説説如法説耶法次法説不為餘人以同法來訶責耶佛告婆羅門彼如是説者謗毀我耳非如説説如法説法次法説不致他人來以同法呵責所以者何我不如是説應施於我不應施餘施我得大果報非施餘人得大果報應施我弟子施我弟子得大果報非施餘弟子得大果報然婆羅門我作如是説者作二種障障施者施障受者利婆羅門乃至士夫以洗器餘食著於淨地令彼處衆生即得利樂我説斯等亦入福門況復施人婆羅門然我復説施持戒者得果報不同犯戒生聞婆羅門白佛言如是瞿曇我亦如是説施持戒者得大果報非施犯戒爾時世尊復説偈言若黑若有白若赤若有色犂雜及金色純黃及鴿色如是等牸牛生犢姝好者丁壯力具足調善行捷疾但使堪運重不問本生色人亦復如是各隨彼彼生剎利婆羅門毗舍首陀羅旃陀羅下賤所生悉不同但使持淨戒離重擔煩惱純一修梵行漏盡阿羅漢於世間善逝施彼得大果愚者無智慧未嘗聞正法施彼無大果不近善友故若習善知識如來及聲聞清淨信善逝根生堅固力所住之善趣及生大姓家究竟般涅盤大仙如是説佛説此經已生聞婆羅門聞佛所説歡喜隨喜作禮而去九六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊晨朝著衣持鉢入舍衛城乞食時有異婆羅門年耆根熟執杖持鉢家家乞食爾時世尊告婆羅門汝今云何年耆根熟柱杖持鉢家家乞食婆羅門白佛瞿曇我家中所有財物悉付其子為子娶妻然後捨家是故柱杖持鉢家家乞食佛告婆羅門汝能於我所受誦一偈還歸於衆中為兒説耶婆羅門白佛能受瞿曇爾時世尊即説偈言生子心歡喜為子聚財物亦為娉其妻而自捨出家邊鄙田舍兒違負於其父人形羅剎心棄捨於尊老老馬無復用則奪其麥兒少而父老家家行乞食曲杖為最勝非子為恩愛為我防惡牛免險地得安能却凶暴狗扶我暗處行避深坑空井草木棘刺林憑杖威力故峙立不墮落時婆羅門從世尊受斯偈已還歸婆羅門大衆中為子而説先白大衆聽我所説然後誦偈如上廣説其子愧怖即抱其父還將入家摩身洗浴覆以青衣被立為家主時婆羅門作是念我今得勝族姓是沙門瞿曇恩我經所説為師者如師供養為和尚者如和尚供養我今所得皆沙門瞿曇力即是我師我今當以上妙好衣以奉瞿曇時婆羅門持上妙衣至世尊所面前問訊慰勞已退坐一面白佛言瞿曇我今居家成就是瞿曇力我經記説為師者以師供養為和尚者以和尚供養今日瞿曇即為我師願受此衣哀愍故世尊即受為哀愍故爾時世尊為婆羅門説種種法示教照喜時婆羅門聞佛所説歡喜隨喜作禮而去九七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊晨朝著衣持鉢入舍衛城乞食時有異婆羅門年耆根熟攝杖持鉢家家乞食彼婆羅門遙見世尊而作是念沙門瞿曇攝杖持鉢家家乞食我亦攝杖持鉢家家乞食我與瞿曇俱是比丘爾時世尊説偈答曰所謂比丘者非但以乞食受持在家法是何名比丘於功德過惡俱離修正行其心無所畏是則名比丘佛説是經已彼婆羅門聞佛所説歡喜隨喜作禮而去九八如是我聞一時佛在拘薩羅人間遊行至一那羅聚落住一那羅林中爾時世尊著衣持鉢入一那羅聚落乞食而作是念今日太早今且可過耕田婆羅豆婆遮婆羅門作飲食處爾時耕田婆羅豆婆遮婆羅門五百具犁耕田為作飲食時耕田婆羅豆婆遮婆羅門遙見世尊白言瞿曇我今耕田下種以供飲食沙門瞿曇亦應耕田下種以供飲食佛告婆羅門我亦耕田下種以供飲食婆羅門白佛我都不見沙門瞿曇若犁若軛若鞅若縻若鑱若鞭而今瞿曇説言我亦耕田下種以供飲食爾時耕田婆羅豆婆遮婆羅門即説偈言自説耕田者而不見其耕為我説耕田令我知耕法爾時世尊説偈答言信心為種子苦行為時雨智慧為時軛慚愧心為轅正念自守護是則善御者包藏身口業知食處內藏真實為真乘樂住為懈息精進為廢荒安隱而速進直往不轉還得到無憂處如是耕田者逮得甘露果如是耕田者不還受諸有時耕田婆羅豆婆遮婆羅門白佛言善耕田瞿曇極善耕田瞿曇於是耕田婆羅豆婆遮婆羅門聞世尊説偈心轉增信以滿鉢香美飲食以奉世尊世尊不受以因説偈得故即説偈言不因説法故受彼食而食如是廣説如前為火與婆羅門廣説時耕田婆羅豆婆遮婆羅門白佛言瞿曇今以此食安著何處佛告婆羅門我不見諸天魔梵沙門婆羅門天神世人堪食此食而得安身婆羅門汝持此食著無蟲水中及少生草地時婆羅門即持此食著無蟲水中水即煙起涌沸啾啾作聲如熱丸投於冷水啾啾作聲如是彼食投著無蟲水中煙起涌沸啾啾作聲時婆羅門作是念沙門瞿曇實為奇特大德大力乃令飲食神變如是時彼婆羅門見食瑞應信心轉增白佛言瞿曇我今可得於正法中出家受具足不佛告婆羅門汝今可得於正法中出家受具足得比丘分彼即出家已獨靜思惟所以族姓子剃除鬚髮著袈裟衣正信非家出家學道乃至得阿羅漢心善解脫九九如是我聞一時佛住王舍城時有尊者名曰淨天在鞞提訶國人間遊行至彌絺羅城菴羅園中時尊者淨天晨朝著衣持鉢入彌絺羅城乞食次第乞食到自本家時淨天母年老在中堂持食祀火求生梵天不覺尊者淨天在門外立時毗沙門天王於尊者淨天所極生敬信時毗沙門天王諸夜叉導從乘虛而行見尊者淨天在門外立又見其母手擎飲食在中堂上供養祀火不見其子在外門立見已從空中下至淨天母前而説偈言此婆羅門尼梵天極遼遠為求彼生故於此祠祀火此非梵天道何為徒祀此汝婆羅門尼淨天住門外垢穢永無餘是則天中天蕭然無所有獨一不兼資為乞食入舍所應供養者淨天善修身人天良福田遠離一切惡不為染所染德同於梵天形在人間住不著一切法如彼淳熟龍比丘正念住其心善解脫應奉以初佛是則上福田應以正信心及時速施與當預建立洲令未來安樂汝觀此牟尼已渡苦海流是故當信心及時速施與當預建立洲令未來安樂毗沙門天王開發彼令捨時尊者淨天即為其母種種説法示教照喜已復道而去一如是我聞一時佛住舍衛國祇樹給孤獨園時有異婆羅門來詣佛所面前問訊相慰勞已退坐一面白佛言瞿曇所謂佛者云何為佛為是父母制名為是婆羅門制名時婆羅門即説偈言佛者是世間超渡之勝名為是父母制名之為佛耶爾時世尊説偈答言佛見過去世如是見未來亦見現在世一切行起滅明智所了知所應修已修應斷悉已斷是故名為佛歷劫求選擇純苦無暫樂生者悉磨滅遠離息塵垢拔諸使刺本等覺故名佛佛説偈已彼婆羅門聞佛所説歡喜隨喜從座起去一一如是我聞一時佛在拘薩羅人間遊行有從迦帝聚落墮鳩羅聚落二村中間一樹下坐入晝正受時有豆磨種姓婆羅門隨彼道行尋佛後來見佛腳迹千輻輪相印文顯現齊輻圓輞衆好滿足見已作是念我未曾見人間有如是足迹今當隨迹以求其人即尋腳迹至於佛所來見世尊坐一樹下入晝正受嚴容絶世諸根澄靜其心寂定第一調伏正觀成就光相巍巍猶若金山見已白言為是天耶佛告婆羅門我非天也為龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等佛告婆羅門我非龍乃至人非人也婆羅門白佛若言非天非龍乃至非人非非人為是何等爾時世尊説偈答言天龍乾闥婆緊那羅夜叉無善阿修羅諸摩睺羅伽人與非人等悉由煩惱生如是煩惱漏一切我已捨已破已磨滅如芬陀利生雖生於水中而未曾著水我雖生世間不為世間著歷劫常選擇純苦無暫樂一切有為行悉皆生滅故離垢不傾動已拔諸劍刺究竟生死除故名為佛陀佛説此經已豆摩種婆羅門聞佛所説歡喜隨喜從路而去一二如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊晨朝著衣持鉢入王舍城乞食次第乞食至婆羅豆婆遮婆羅門舍時婆羅門手執木杓盛諸飲食供養火具住於門邊遙見佛來見已白佛作是言住住領群特慎勿近我門佛告婆羅門汝知領群特領群特法耶婆羅門言我不知領群特亦不知領群特法沙門瞿曇知領群特及領群特法不佛言我善知是領群特及領群特法是時婆羅門即放事火具疾敷床座請佛令坐白言瞿曇為我説領群特及領群特法佛即就座為説偈言瞋恚心懷恨隱覆諸過惡犯戒起惡見虛偽不真實如是等士夫當知領群特憋暴貪吝惜惡欲慳諂偽無慚無愧心當知領群特一生二生者一切皆殺害無有慈愍心是為領群特若殺縛椎打聚落及城邑無道以切責當知領群特住止及行路為衆之導首苦切諸群下恐怛相迫愶取利以供己當知領群特聚落及空地有主無主物掠護為己有當知領群特自棄薄其妻又不入淫舍侵陵他所愛當知領群特內外諸親屬同心善知識侵掠彼所愛當知領群特妄語欺誑人詐取無證財他索而不還當知領群特為己亦為他舉責及財與或復順他語妄語為他證如是妄語者當知領群特作惡不善業無有人知者隱諱覆藏惡當知領群特若人問其義而答以非義顛倒欺誑人當知領群特實空無所有而輕毀智者愚癡為利故當知領群特高慢自稱舉毀壞於他人是極卑鄙慢當知領群特自造諸過惡移過誣他人妄語謗清白當知領群特前受他利養他人來詣己無有敬報心當知領群特沙門婆羅門如法來乞求呵責而不與當知領群特若父母年老少壯氣已謝不勤加奉養當知領群特父母諸尊長兄弟親眷屬實非阿羅漢自顯羅漢德世間之大賊當知領群特初上種姓生習婆羅門典而於其中間習行諸惡業不以勝生故障呵責惡道現法受呵責後世墮惡道生旃陀羅家世稱須陀夷名聞遍天下旃陀羅所無婆羅門剎利大姓所供養乘於淨天道平等正直住不以生處障令不生梵天現法善名譽後世生善趣二生汝當知如我所顯示不以所生故名為領群特不以所生故名為婆羅門業為領群特業為婆羅門婆羅門白佛言如是大精進如是大牟尼不以所生故名為領群特不以所生故名為婆羅門業故領群特業故婆羅門時事火婆羅豆婆遮婆羅門轉得信心以滿鉢好食奉上世尊世尊不受以説偈得故偈如上説時事火婆羅豆婆遮婆羅門見食瑞應已增其信心白佛言世尊我今可得於正法律出家受具足不佛告婆羅門汝今可得於正法律出家受具足戒即得出家獨靜思惟如前説乃至得阿羅漢心善解脫時婆羅豆婆遮婆羅門得阿羅漢心善解脫自覺喜樂即説偈言非道求清淨供養祠祀火不識清淨道猶如生盲者今已得安樂出家受具足逮得於三明佛所教已作先婆羅門難今為婆羅門沐浴離塵垢度諸天彼岸此經此卷國宋二本文義全同皆有十九經總二十五紙丹本有十五經若依宋藏式寫之可成二十七紙又其文義與國宋二本全別未知去取今撿國宋本經則下流函中此經第四十二卷耳宋藏錯將彼卷重刊于此為初四卷國亦仍之者錯也故令去彼取此丹本經焉
