body:
  text: 四七如是我聞一時佛住王舍城迦蘭陀竹園時有衆多比丘集於食堂思惟世間而思惟爾時世尊知諸比丘心之所念往詣食堂敷座而坐告諸比丘汝等比丘慎莫思惟世間思惟所以者何世間思惟非義饒益非法饒益非梵行饒益非智非覺不順涅槃汝等當正思惟此苦聖諦此苦集聖諦此苦滅聖諦此苦滅道迹聖諦所以者何如此思惟則義饒益法饒益梵行饒益正智正覺正向涅槃過去世時有一士夫出王舍城於拘絺羅池側正坐思惟世間思惟當思惟時見四種軍象軍馬軍車軍步軍無量無數皆悉入於一藕孔中見已作是念我狂失性世間所無而今見之爾時去池不遠更有大衆一處聚集時彼士夫詣大衆所語言諸人我今發狂我今失性世間所無而我今見如上廣説時彼大衆皆謂士夫狂發失性世間所無而彼見之佛告比丘然彼士夫非狂失性所見真實所以者何爾時去拘絺羅池不遠有諸天阿修羅興四種軍戰於空中時諸天得勝阿修羅軍敗退入彼池一藕孔中是故比丘汝等慎莫思惟世間所以者何世間思惟非義饒益非法饒益非梵行饒益非智非覺非正向涅槃當思惟四聖諦何等為四苦聖諦苦集聖諦苦滅聖諦苦滅道迹聖諦佛説此經已諸比丘聞佛所説歡喜奉行四八如是我聞一時佛住王舍城迦蘭陀竹園時有衆多比丘集於食堂作如是論或謂世間有常或謂世間無常世間有常無常世間非有常非無常世間有邊世間無邊世間有邊無邊世間非有邊非無邊是命是身命異身異如來死後有如來死後無如來死後有無如來死後非有非無爾時世尊一處坐禪以天耳聞諸比丘集於食堂論議之聲聞已往詣食堂於大衆前敷座而坐告諸比丘汝等比丘衆多聚集何所言説時諸比丘白佛言世尊我等衆多比丘集此食堂作如是論或説有常或説無常如上廣説佛告比丘汝等莫作如是論議所以者何如此論者非義饒益非法饒益非梵行饒益非智非正覺非正向涅槃汝等比丘應如是論議此苦聖諦此苦集聖諦此苦滅聖諦此苦滅道迹聖諦所以者何如是論議是義饒益法饒益梵行饒益正智正覺正向涅槃是故比丘於四聖諦未無間等當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四九如是我聞一時佛住王舍城迦蘭陀竹園爾時有衆多比丘集於食堂或有貪覺覺者或瞋覺覺者或害覺覺者爾時世尊知諸比丘心之所念往詣食堂敷坐具於衆前坐告諸比丘汝等莫起貪覺覺莫起恚覺覺莫起害覺覺所以者何此諸覺非義饒益非法饒益非梵行饒益非智非正覺不向涅槃汝等當起苦聖諦覺苦集聖諦覺苦滅聖諦覺苦滅道迹聖諦覺所以者何此四聖諦覺義饒益法饒益梵行饒益正智正覺向於涅槃是故諸比丘於四聖諦當勤方便起增上欲正智正念精進修學佛説此經已諸比丘聞佛所説歡喜奉行四一如是我聞一時如上廣説差別者起親里覺國土人民覺不死覺乃至聞佛所説歡喜奉行四一一如是我聞一時佛住王舍城迦蘭陀竹園時有衆多比丘集於食堂作如是論或論王事賊事鬪戰事錢財事衣被事飲食事男女事世間言語事事業事説諸海中事爾時世尊於禪定中以天耳聞諸比丘論説之聲即從座起往詣食堂敷坐具於衆前坐告諸比丘汝等比丘衆多聚集為何所説諸比丘白佛言世尊我等於此聚集或論説王事如上廣説佛告比丘汝等莫作是論論説王事乃至不向涅槃若論説者應當論説此苦聖諦苦集聖諦苦滅聖諦苦滅道迹聖諦所以者何此四聖諦以義饒益法饒益梵行饒益正智正覺正向涅槃佛説此經已諸比丘聞佛所説歡喜奉行四一二如是我聞一時佛住王舍城迦蘭陀竹園時有衆多比丘集於食堂作如是説我知法律汝等不知我所説成就我等所説與理合汝等所説不成就不與理合應前説者則在後説應後説者則在前説而共諍論言我論是汝等不如能答者當答爾時世尊於禪定中以天耳聞諸比丘諍論之聲如是廣説乃至於四聖諦未無間等者當勤起方便起增上欲學無間等佛説是經已諸比丘聞佛所説歡喜奉行四一三如是我聞一時佛住王舍城迦蘭陀竹園時有衆多比丘集於食堂作如是論波斯匿王頻婆娑羅王何者大力何者大富爾時世尊於禪定中以天耳聞諸比丘論説之聲即從座起往詣食堂敷坐具於衆前坐問諸比丘汝等何所論説時諸比丘即以上事具白世尊佛告比丘汝等用説諸王大力大富為汝等比丘莫作是論所以者何此非義饒益非法饒益非梵行饒益非智非正覺不向涅槃汝等當説此苦聖諦苦集聖諦苦滅聖諦苦滅道迹聖諦所以者何此四聖諦是義饒益法饒益梵行饒益正智正覺正向涅槃是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四一四如是我聞一時佛住王舍城迦蘭陀竹園時有衆多比丘集於食堂作如是論汝等宿命作何等業為何工巧以何自活爾時世尊於禪定中以天耳聞諸比丘論説之聲即從座起往詣食堂敷坐具於衆前坐問諸比丘汝説何等時諸比丘以上所説具白世尊佛告比丘汝等比丘莫作是説宿命所作所以者何此非義饒益非法饒益非梵行饒益非智非正覺不向涅槃汝等比丘當共論説此苦聖諦苦集聖諦苦滅聖諦苦滅道迹聖諦所以者何此義饒益法饒益梵行饒益正智正覺正向涅槃是故比丘依於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四一五如是我聞一時佛住王舍城迦蘭陀竹園時有衆多比丘集於食堂作如是説論某甲檀越作麁疏食我等食已無味無力我等不如捨彼麁食而行乞食所以者何比丘乞食時得好食又見好色時聞好聲多人所識亦得衣被臥具醫藥爾時世尊於禪定中以天耳聞諸比丘論説之聲即詣食堂如是廣説乃至正向涅槃佛説此經已諸比丘聞佛所説歡喜奉行四一六如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘汝等持我所説四聖諦不時有異比丘從座起正衣服為佛作禮合掌白佛唯然世尊所説四聖諦我悉受持佛告比丘汝云何受持四聖諦比丘白佛言世尊説言此是苦聖諦我即受持此苦集聖諦此苦滅聖諦此苦滅道迹聖諦如是世尊説四聖諦我即受持佛告比丘善哉善哉我説苦聖諦汝真實受持我説苦集聖諦苦滅聖諦苦滅道迹聖諦汝真實受持佛説此經已諸比丘聞佛所説歡喜奉行四一七如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘汝等持我所説四聖諦不時有比丘從座起整衣服偏袒右肩為佛作禮合掌白佛唯然世尊所説四聖諦我悉受持佛告比丘汝云何持我所説四聖諦比丘白佛言世尊説苦聖諦我悉受持如如不離如不異如真實審諦不顛倒是聖所諦是名苦聖諦世尊説苦集聖諦苦滅聖諦苦滅道迹聖諦如如不離如不異如真實審諦不顛倒是聖所諦是為世尊説四聖諦我悉受持佛告比丘善哉善哉汝真實持我所説四聖諦如如不離如不異如真實審諦不顛倒是名比丘真實持我四聖諦佛説此經已諸比丘聞佛所説歡喜奉行四一八如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘汝持我所説四聖諦不時有異比丘從座起整衣服為佛作禮合掌白佛言唯然世尊所説四聖諦我悉持之云何四諦世尊説苦聖諦我悉持之苦集聖諦苦滅聖諦苦滅道迹聖諦我悉持之佛告彼比丘善哉善哉如我所説四聖諦汝悉持之諸比丘若沙門婆羅門作如是説如沙門瞿曇所説苦聖諦我當捨更立苦聖諦者但有言數問已不知增其疑惑以非其境界故苦集聖諦苦滅聖諦苦滅道迹聖諦我今當捨更立餘四聖諦者彼但有言數問已不知增其疑惑以非其境界故是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四一九如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘若比丘於佛有疑者則於苦聖諦有疑苦集聖諦苦滅聖諦苦滅道迹聖諦則有疑惑若於法僧有疑者則於苦聖諦疑惑苦集聖諦苦滅聖諦苦滅道迹聖諦疑惑若於佛不疑惑者則於苦聖諦不疑惑苦集聖諦苦滅聖諦苦滅道迹聖諦不疑惑若於法僧不疑惑者則於苦聖諦不疑惑苦集聖諦苦滅聖諦苦滅道迹聖諦不疑惑佛説此經已諸比丘聞佛所説歡喜奉行四二如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘若沙門婆羅門於苦聖諦有疑者則於佛有疑於法僧有疑若於集滅道疑者則於佛有疑於法僧有疑若於苦聖諦無疑者則於佛無疑於法僧無疑於集滅道聖諦無疑者則於佛無疑於法僧無疑佛説此經已諸比丘聞佛所説歡喜奉行四二一如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘汝等共行至深嶮巖諸比丘白佛唯然世尊爾時世尊與諸大衆至深嶮巖敷座而坐周匝觀察深嶮巖已告諸比丘此巖極大深嶮時有異比丘從座起整衣服為佛作禮合掌白佛言世尊此極深嶮然復有一極深嶮極嶮於此甚可怖畏者不佛知其意即告言如是比丘此極深嶮然復有大深嶮嶮於此者甚可怖畏謂諸沙門婆羅門於苦聖諦不如實知苦集聖諦苦滅聖諦苦滅道迹聖諦不如實知彼於生本諸行樂著於老病死憂悲惱苦生本諸行樂著而作是行老病死憂悲惱苦行轉增長故墮於生深嶮之處墮於老病死憂悲惱苦深嶮之處如是比丘此則大深嶮嶮於此者是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四二二如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘有大熱地獄若衆生生於彼中一向與烔然時有異比丘從座起整衣服為佛作禮合掌白佛言如世尊説此則大熱世尊唯此大熱復有大熱過於此者甚可怖畏無有過上如是比丘此則大熱亦更有大熱過於此者甚可怖畏無有過上何等為更有大熱甚可怖畏過於此者謂沙門婆羅門此苦聖諦不如實知苦集聖諦苦滅聖諦苦滅道迹聖諦不如實知如是乃至生老病死憂悲惱苦大熱熾然是名比丘大熱燒然甚可怖畏無有過者是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四二三如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘有大暗地獄彼諸衆生生彼中者不見自身分時有異比丘從座起整衣服為佛作禮合掌白佛言世尊此則大暗唯此大暗復更有餘大暗甚可怖畏過於此不佛告比丘如是更有大暗甚可怖畏過於此者謂沙門婆羅門於四聖諦不如實知乃至墮於生老病死憂悲惱苦大暗之中是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四二四如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘如日遊行照諸世界乃至千日千月照千世界千須彌山千弗婆提千閻浮提千拘耶尼千鬱單越千四天王千三十三天千炎魔天千兜率天千化樂天千他化自在天千梵天是名小千世界此千世界中間暗冥日月光照有大德力而彼不見其有衆生生彼中者不見自身分時有異比丘從座起整衣服為佛作禮合掌白佛言世尊如世尊説是大暗冥復更有餘大暗冥處過於此耶佛告比丘有大暗冥過於此者謂沙門婆羅門於苦聖諦不如實知乃至墮於生老病死憂悲惱苦大暗冥中是名比丘有大暗冥過於世界中間暗冥是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已時諸比丘聞佛所説歡喜奉行四二五如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘從小千世界數滿至千是名中千世界於是中千世界中間暗冥如前所説乃至於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四二六如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘從中千世界數滿至千是名三千大千世界世界中間暗冥之處日月遊行普照世界而彼不見乃至墮於生老病死憂悲惱苦大暗冥中是故諸比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四二七如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘我今當説四聖諦諦聽諦聽善思念之何等為四謂苦聖諦苦集聖諦苦滅聖諦苦滅道迹聖諦是名四聖諦佛説此經已諸比丘聞佛所説歡喜奉行如當説如是有如是當知亦如上説四二八如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘當勤禪思正方便起內寂其心所以者何比丘禪思內寂其心成就已如實顯現云何如實顯現謂此苦聖諦如實顯現此苦集聖諦苦滅聖諦苦滅道迹聖諦如實顯現佛説此經已諸比丘聞佛所説歡喜奉行四二九如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘當修無量三摩提專心正念所以者何修無量三摩提專心正念已如是如實顯現云何如實顯現謂此苦聖諦如實顯現苦集聖諦苦滅聖諦苦滅道迹聖諦如實顯現佛説此經已諸比丘聞佛所説歡喜奉行四三如是我聞一時佛住王舍城迦蘭陀竹園爾時佛告諸比丘如人擲杖於虛空中尋即還墮或根著地或腹著地或頭著地如是沙門婆羅門於此苦聖諦不如實知苦集聖諦苦滅聖諦苦滅道迹聖諦不如實知當知是沙門婆羅門或墮地獄或墮畜生或墮餓鬼是故比丘於四聖諦未無間等者當勤方便學無間等佛説此經已諸比丘聞佛所説歡喜奉行四三一如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘如人擲杖置虛空中其必還墮或墮淨地或墮不淨地如是沙門婆羅門於苦聖諦不如實知於苦集聖諦苦滅聖諦苦滅道迹聖諦不如實知以不如實知故或生善趣或生惡趣是故諸比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四三二如是我聞一時佛住王舍城迦蘭陀竹園爾時佛告諸比丘譬如五節相續輪大力士夫令速旋轉如是沙門婆羅門於此苦聖諦不如實知此苦集聖諦苦滅聖諦苦滅道迹聖諦不如實知輪回五趣而速旋轉或墮地獄或墮畜生或墮餓鬼或人或天還墮惡道長夜輪轉是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四三三如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘如來應等正覺增上説法謂四聖諦開示施設建立分別散説顯現表露何等為四謂苦聖諦苦集聖諦苦滅聖諦苦滅道迹聖諦是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四三四如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘何等為黠慧為此苦聖諦如實知此苦集聖諦苦滅聖諦苦滅道迹聖諦如實知為不知耶諸比丘白佛如我解世尊所説於四聖諦如實知者此為黠慧佛告比丘善哉善哉於苦聖諦苦集聖諦苦滅聖諦苦滅道迹聖諦如實知者是則黠慧是故諸比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説是經已諸比丘聞佛所説歡喜奉行四三五如是我聞一時佛住舍衛國祇樹給孤獨園時須達長者往詣佛所稽首佛足於一面坐白佛言世尊此四聖諦為漸次無間等為一頓無間等佛告長者此四聖諦漸次無間等非頓無間等佛告長者若有説言於苦聖諦未無間等而於彼苦集聖諦苦滅聖諦苦滅道迹聖諦無間等者此説不應所以者何若於苦聖諦未無間等而欲於苦集聖諦苦滅聖諦苦滅道迹聖諦無間等者無有是處猶如有人兩細樹葉連合為器盛水持行無有是處如是於苦聖諦未無間等而欲於苦集聖諦苦滅聖諦苦滅道迹聖諦無間等者無有是處譬如有人取蓮華葉連合為器盛水遊行斯有是處如是長者於苦聖諦無間等已而欲於苦集聖諦苦滅聖諦苦滅道迹聖諦無間等者斯有是處是故長者於四聖諦未無間等者當勤方便起增上欲學無間等佛説此經已諸比丘聞佛所説歡喜奉行四三六如須達長者所問有異比丘問亦如是説唯譬有差別如有四登階道升於殿堂若有説言不登初階而登第二第三第四階升堂殿者無有是處所以者何要由初階然後次登第二第三第四階得升殿堂如是比丘於苦聖諦未無間等而欲於苦集聖諦苦滅聖諦苦滅道迹聖諦無間等者無有是處譬如比丘若有人言以四階道升於殿堂要由初階然後次登第二第三第四階得升殿堂應作是説所以者何要由初階然後次登第二第三第四階升於殿堂有是處故如是比丘若言於苦聖諦無間等已然後次第於苦集聖諦苦滅聖諦苦滅道迹聖諦無間等者應作是説所以者何若於苦聖諦無間等已然後次第於苦集聖諦苦滅聖諦苦滅道迹聖諦無間等者有是處故佛説此經已諸比丘聞佛所説歡喜奉行四三七如異比丘問阿難所問亦如是説唯譬差別佛告阿難譬如四隥梯升於殿堂若有説言不由初隥而登第二第三第四隥升殿堂者無有是處如是阿難若於苦聖諦未無間等而欲苦集聖諦苦滅聖諦苦滅道迹聖諦無間等者此不應説所以者何若於苦聖諦未無間等而於苦集聖諦苦滅聖諦苦滅道迹聖諦無間等者無有是處譬如阿難由四隥梯升於殿堂若有人言要由初隥然後次登第二第三第四隥升殿堂者此所應説所以者何要由初隥然後次登第二第三第四隥升殿堂者有是處故如是阿難於苦聖諦無間等已然後次第苦集聖諦苦滅聖諦苦滅道迹聖諦無間等者斯有是處佛説是經已諸比丘聞佛所説歡喜奉行四三八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘譬如大地草木悉取為鏘貫大海中一切水蟲悉能貫不比丘白佛不能世尊所以者何大海諸蟲種種形類或於細不可貫或極大不可貫佛告比丘如是如是衆生界無數無量是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説是經已諸比丘聞佛所説歡喜奉行四三九如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊手執土石問諸比丘於意云何此手中土石為多彼大雪山土石為多比丘白佛言世尊手中土石甚少少耳雪山土石甚多無量百千巨億算數譬類不可為比佛告比丘其諸衆生於苦聖諦如實知者苦集聖諦苦滅聖諦苦滅道迹聖諦如實知者如我手中所執土石其諸衆生於苦聖諦不如實知於苦集聖諦苦滅聖諦苦滅道迹聖諦不如實知者如彼雪山土石其數無量是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説是經已諸比丘聞佛所説歡喜奉行四四如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘譬如湖池深廣五十由旬其水盈滿若有士夫以髮以毛或以指端渧彼湖水乃至再三云何比丘如彼士夫所渧水多湖池水多比丘白佛如彼士夫毛髮指端再三渧水甚少少耳彼湖大水其量無數乃至算數譬類不可為比佛告比丘如大湖水甚多無量如是多聞聖弟子具足見諦得聖道果斷諸苦本如截多羅樹頭於未來世成不生法餘不盡者如彼士夫髮毛指端所渧之水是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説是經已諸比丘聞佛所説歡喜奉行如大湖水譬如是薩羅多吒迦恆伽耶符那薩羅遊伊羅跋提摩醯及四大海其譬亦如上説四四一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊手捉團土大如梨果告諸比丘云何比丘我手中此團土為多大雪山中土石為多諸比丘白佛言世尊手中團土少少耳彼雪山王其土石甚多百千億那由他乃至算數譬類不得為比佛告諸比丘如我所捉團土如是衆生於苦聖諦如實知於苦集聖諦苦滅聖諦苦滅道迹聖諦如實知者亦復如是如大雪山王土石者如是衆生於苦聖諦不如實知於苦集聖諦苦滅聖諦苦滅道迹聖諦不如實知者亦復如是是故比丘於四聖諦未無間等者當勤方便起增上欲學無間等佛説是經已諸比丘聞佛所説歡喜奉行如雪山王如是尼民陀羅山毗那多迦山馬耳山善見山佉提羅迦山伊沙陀羅山由揵陀羅山須彌山王及大地土石亦復如是如梨果如是阿摩勒迦果跋陀羅果迦羅迦果豆果乃至蒜子譬亦復如是四四二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊以爪甲擎土已告諸比丘於意云何我爪甲上土為多此大地土多諸比丘白佛言世尊甲上土甚少少耳此大地土甚多無量乃至算數譬類不可為比佛告比丘如甲上土者若諸衆生形可見者亦復如是其形微細不可見者如大地土是故比丘於四聖諦未無間等者當勤方便學無間等佛説是經已諸比丘聞佛所説歡喜奉行如陸地如是水性亦爾如甲上土如是衆生人道者亦復如是如大地土如是非人亦爾如甲上土如是生中國者亦爾如大地土如是生邊地者亦爾如甲上土如是成就聖慧眼者亦復如是如大地土如是不成就聖慧眼者亦爾如甲上土如是衆生知此法律者亦復如是如大地土如是衆生不知法律者亦爾如知如是等知普知正想正覺正解法無間等亦如是如甲上土如是衆生知有父母亦爾如大地土如是衆生不知有父母亦爾如甲上土如是知有沙門婆羅門家之尊長作所應作作福此世他世畏罪行施受齋持戒亦爾如大地土不知有沙門婆羅門家之尊長作所應作作福此世他世畏罪行施受齋持戒亦如是説如甲上土如是衆生不殺不盜不邪淫不妄語不兩舌不惡口不綺語亦爾如大地土如是衆生不持諸戒者亦爾如是離貪恚邪見及不離貪恚邪見亦如是説如甲上土如是不殺不盜不邪淫不妄語不飲酒如大地土如是不持五戒者亦爾如甲上土如是衆生持八戒者亦如是如大地土如是衆生不持八戒者亦爾如甲上土如是衆生持十善者亦如是如大地土如是衆生不持十善者亦如是如甲上土如是衆生從地獄命終生人中者亦如是如大地土如是衆生從地獄命終還生地獄者亦如是如地獄如是畜生餓鬼亦爾如甲上土如是衆生從地獄命終生天上者亦如是如大地土如是衆生從地獄命終還生地獄者亦如是如地獄如是畜生餓鬼亦爾如甲上土如是衆生人道中沒還生人道中者亦如是如大地土其諸衆生從人道中沒生地獄中者亦如是如地獄如是畜生餓鬼亦爾如甲上土其諸衆生從天命終還生天上者亦如是如大地土其諸衆生天上沒生地獄中者亦如是如地獄畜生餓鬼亦如是四四三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我本未聞法時得正思惟此苦聖諦正見已生此苦集聖諦此苦滅聖諦苦滅道迹聖諦正見已生佛説此經已諸比丘聞佛所説歡喜奉行如已生如是今生當生如生如是起習近修多修觸作證亦如是四四四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘譬如眼藥丸深廣一由旬若有士夫取此藥丸界界安置能速令盡於彼界界不得其邊當知諸界其數無量是故比丘當善界學善種種界當如是學佛説此經已諸比丘聞佛所説歡喜奉行四四五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘衆生常與界俱與界和合云何衆生常與界俱謂衆生行不善心時與不善界俱善心時與善界俱勝心時與勝界俱鄙心時與鄙界俱是故諸比丘當作是學善種種界佛説是經已諸比丘聞佛所説歡喜奉行四四六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘廣説如上差別者即説偈言常會故常生相離生則斷如人執小木而入於巨海人木則俱沒懈怠俱亦然當離於懈怠卑劣之精進賢聖不懈怠安住於遠離殷勤精進禪超度生死流膠漆得其素火得風熾然珂乳則同色衆生與界俱相似共和合增長亦復然四四七如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告諸比丘衆生常與界俱與界和合云何與界俱謂衆生不善心時與不善界俱善心時與善界俱鄙心時與鄙界俱勝心時與勝界俱時尊者憍陳如與衆多比丘於近處經行一切皆是上座多聞大德出家已久具修梵行復有尊者大迦葉與衆多比丘於近處經行一切皆是少欲知足頭陀苦行不畜遺餘尊者舍利弗與衆多比丘於近處經行一切皆是大智辨才時尊者大目揵連與衆多比丘於近處經行一切皆是神通大力時阿那律陀與衆多比丘於近處經行一切皆是天眼明徹時尊者二十億耳與衆多比丘於近處經行一切皆是勇猛精進專勤修行者時尊者陀驃與衆多比丘於近處經行一切皆是能為大衆修供具者時尊者優波離與衆多比丘於近處經行一切皆是通達律行時尊者富樓那與衆多比丘於近處經行皆是辨才善説法者時尊者迦旃延與衆多比丘於近處經行一切皆能分別諸經善説法相時尊者阿難與衆多比丘於近處經行一切皆是多聞總持時尊者羅睺羅與衆多比丘於近處經行一切皆是善持律行時提婆達多與衆多比丘於近處經行一切皆是習衆惡行是名比丘常與界俱與界和合是故諸比丘當善分別種種諸界佛説是經時諸比丘聞佛所説歡喜奉行四四八如是我聞一時佛住王舍城迦蘭陀竹園如上廣説已即説偈言常會故常生相離生則斷如人執小木而入於巨海人木則俱沒懈怠俱亦然當離於懈怠卑劣之精進賢聖不懈怠安住於遠離殷勤精進禪超度生死流膠漆得其素火得風熾然珂乳則同色衆生與界俱相似共和合增長亦復然四四九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘衆生常與界俱與界和合如是廣説乃至勝心生時與勝界俱鄙心生時與鄙界俱殺生時與殺界俱盜淫妄語飲酒心時與飲酒界俱不殺生時與不殺界俱不盜不淫不妄語不飲酒與不飲酒界俱是故諸比丘當善分別種種界佛説是經已諸比丘聞佛所説歡喜奉行四五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘衆生常與界俱與界和合不信時與不信界俱犯戒時與犯戒界俱無慚無愧時與無慚無愧界俱信心時與信界俱持戒時與持戒界俱慚愧心時與慚愧界俱是故諸比丘當善分別種種諸界佛説是經已諸比丘聞佛所説歡喜奉行如信不信如是精進不精進失念不失念正受不正受多聞少聞慳者施者惡慧善慧難養易養難滿易滿多欲少欲知足不知足攝受不攝受界俱如上經如是廣説四五一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當説種種諸界諦聽善思當為汝説云何為種種界謂眼界色界眼識界耳界聲界耳識界鼻界香界鼻識界舌界味界舌識界身界觸界身識界意界法界意識界是名種種界佛説是經已諸比丘聞佛所説歡喜奉行四五二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘緣種種界生種種觸緣種種觸生種種受緣種種受生種種愛云何種種界謂十八界眼界色界眼識界乃至意界法界意識界是名種種界云何緣種種界生種種觸乃至云何緣種種受生種種愛謂緣眼界生眼觸緣眼觸生眼觸生受緣眼觸生受生眼觸生愛耳鼻舌身意界緣生意觸緣意觸生意觸生受緣意觸生受生意觸生愛諸比丘非緣種種愛生種種受非緣種種受生種種觸非緣種種觸生種種界要緣種種界生種種觸緣種種觸生種種受緣種種受生種種愛是名比丘緣種種界生種種觸緣種種觸生種種受緣種種受生種種愛佛説此經已諸比丘聞佛所説歡喜奉行四五三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘緣種種界生種種觸緣種種觸生種種受緣種種受生種種愛云何種種界謂十八界眼界色界眼識界乃至意界法界意識界是名種種界云何緣種種界生種種觸緣種種觸生種種受緣種種受生種種愛謂緣眼界生眼觸非緣眼觸生眼界但緣眼界生眼觸緣眼觸生眼受非緣眼受生眼觸但緣眼觸生眼受緣眼受生眼愛非緣眼愛生眼受但緣眼受生眼愛如是耳鼻舌身意界緣生意觸非緣意觸生意界但緣意界生意觸緣意觸生意受非緣意受生意觸但緣意觸生意受緣意受生意愛非緣意愛生意受但緣意受生意愛是故比丘非緣種種愛生種種受非緣種種受生種種觸非緣種種觸生種種界但緣種種界生種種觸緣種種觸生種種受緣種種受生種種愛是名比丘當善分別種種界佛説是經已諸比丘聞佛所説歡喜奉行四五四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘緣種種界生種種觸緣種種觸生種種受緣種種受生種種想緣種種想生種種欲緣種種欲生種種覺緣種種覺生種種熱緣種種熱生種種求云何種種界謂十八界眼界乃至法界云何緣種種界生種種觸乃至緣種種熱生種種求謂緣眼界生眼觸緣眼觸生眼受緣眼受生眼想緣眼想生眼欲緣眼欲生眼覺緣眼覺生眼熱緣眼熱生眼求如是耳鼻舌身意界緣生意觸緣意觸生意受緣意受生意想緣意想生意覺緣意覺生意熱緣意熱生意求是名比丘緣種種界故生種種觸乃至緣種種熱生種種求比丘非緣種種求生種種熱非緣種種熱生種種覺非緣種種覺生種種想非緣種種想生種種受非緣種種受生種種觸非緣種種觸生種種界但緣種種界生種種觸乃至緣種種熱生種種求佛説是經已諸比丘聞佛所説歡喜奉行
