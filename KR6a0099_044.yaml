body:
  text: 宋天竺三藏求那跋陀羅譯一一七八如是我聞一時佛住彌絺羅國菴羅園中時有婆四吒婆羅門尼有六子相續命終念子發狂裸形被髮隨路而走至彌絺羅菴羅園中爾時世尊無量大衆圍繞説法婆四吒婆羅門尼遙見世尊見已即得本心慚愧羞恥斂身蹲坐爾時世尊告尊者阿難取汝鬱多羅僧與彼婆四吒婆羅門尼令著聽法尊者阿難即受佛教取衣令著時婆羅門尼得衣著已至於佛前稽首禮佛退坐一面爾時世尊為其説法示教照喜已如佛常法説法次第乃至信心清淨受三自歸聞佛所説歡喜隨喜作禮而去彼婆四吒優婆夷於後時第七子忽復命終彼優婆夷都不啼哭憂悲惱苦時婆四吒優婆夷夫説偈而告婆四吒優婆夷言先諸子命終念子生憂苦晝夜不飲食乃至發狂亂今喪弟七子而不生憂苦婆四吒優婆夷即復説偈答其夫言兒孫有千數因緣和合生長夜遷過去我與君亦然子孫及宗族其數無限量彼彼所生處更互相殘食若知生要者何足生憂苦我已知出離生死存亡相不復生憂苦入佛正教故時婆四吒優婆夷夫説偈歎曰未曾所聞法而今聞汝説何處聞説法不念子憂悲婆四吒優婆夷説偈答言今日等正覺在彌絺羅國菴羅樹園中永離一切苦演説一切苦苦習苦寂滅賢聖八正道安隱趣涅槃則是我大師深樂其正教我已知正法能開子憂苦其夫婆羅門復説偈言我今亦當往彌絺菴羅園彼世尊亦當開我子憂苦優婆夷復説偈言當觀等正覺柔軟金色身不調者能調廣度海流人爾時婆羅門即嚴駕乘於馬車詣彌絺羅菴羅園遙見世尊轉增信樂詣大師前彼時大師即為説偈開其法眼苦習滅道正向涅槃彼即見法成無間等既知法已請求出家時婆羅門即得出家獨靜思惟乃至得阿羅漢世尊記説於第三夜逮得三明得三明已佛即告之命遣御者乘車還家告婆四吒優婆夷令發隨喜語言婆羅門往見世尊得淨信心奉事大師即為説法為開法眼見苦聖諦苦集苦滅賢聖八道安趣涅槃成無間等既知法已即求出家世尊記説於第三夜具足三明時彼御者奉教疾還時婆四吒優婆夷遙見御者空車而還即遙問言婆羅門為見佛不佛為説法開示法眼見聖諦不御者白言婆羅門已見世尊得淨信心奉事大師為開法眼説四聖諦成無間等既知法已即求出家專精思惟世尊記説於第三夜具足三明時優婆夷心即隨喜語御者言車馬屬汝加復賜汝金錢一千已汝傳信言婆羅門宿闍諦已得三明令我歡喜故御者白言我今何用車馬金錢為車馬金錢還優婆夷我今當還婆羅門所隨彼出家優婆夷言汝意如此便可速還不久亦當如彼所得具足三明隨後出家御者白言如是優婆夷如彼出家我亦當然優婆夷言汝父出家汝隨出家我今不久亦當隨去如空野大龍乘虛而遊其餘諸龍龍子龍女悉皆隨去我亦如是執持衣鉢易養易滿御者白言優婆夷若如是者所願必果不久當見優婆夷少欲知足執持衣鉢人所棄者乞受而食剃髮染衣於陰界入斷除愛欲離貪繫縛盡諸有漏彼婆羅門及其御者婆四吒優婆夷優婆夷女孫陀槃梨悉皆出家究竟苦邊一一七九如是我聞一時佛住毗舍離國大林精舍時有毗梨耶婆羅豆婆遮婆羅門晨朝買牛未償其價即日失牛六日不見時婆羅門為覓牛故至大林精舍遙見世尊坐一樹下儀容挺特諸根清淨其心寂默成就止觀其身金色光明焰照見已即詣其前而説偈言云何無所求空寂在於此獨一處空間而得心所樂爾時世尊説偈答曰若失若復得於我心不亂婆羅門當知莫謂彼如我心計於得失其心不自在時婆羅門復説偈言最勝梵志處如比丘所説我今當自説真實語諦聽沙門今定非晨朝失牛者六日求不得是故安樂住沙門今定非種殖胡麻田慮其草荒沒是故安樂住沙門今定非種稻田乏水畏葉枯便死是故安樂住沙門今定無寡女有七人悉養孤遺子是故安樂住沙門今定無七不愛念子放逸多負債是故安樂住沙門今定無債主守其門求索長息財是故安樂住沙門今定無七領重臥具憂勤擇諸蟲是故安樂住沙門今定無赤眼黃髮婦晝夜聞惡聲是故安樂住沙門今定無空倉群鼠戲常憂其羸乏是故安樂住爾時世尊説偈答言我今日定不晨朝失其牛六日求不得是故安樂住我今日定無種殖胡麻田常恐其荒沒是故安樂住我今日定無種稻田乏水畏葉便枯死是故安樂住我今日定無寡女有七人悉養孤遺子是故安樂住我今日定無七不愛念子放逸多負債是故安樂住我今日定無債主守其門求索長息財是故安樂住我今日定無七領重臥具憂勤擇諸蟲是故安樂住我今日定無黃頭赤眼婦晝夜聞惡聲是故安樂住我今日定無空倉群鼠戲常憂其羸乏是故安樂住不捨念不念衆生安樂住斷欲離恩愛而得安樂住爾時世尊為精進婆羅豆婆遮婆羅門種種説法示教照喜如佛常法次第説法布施持戒乃至於正法中心得無畏即從座起合掌白佛我今得於正法律出家學道成比丘分修梵行不佛告婆羅門汝今可得於正法律出家受具足修諸梵行乃至得阿羅漢心善解脫爾時精進婆羅豆婆遮婆羅門得阿羅漢緣自覺知得解脫樂而説偈言我今甚欣樂大仙法之上得離貪欲樂不生見於佛一一八如是我聞一時佛住娑羅樹林婆羅門聚落爾時世尊晨朝著衣持鉢入婆羅門聚落乞食有非時雲起爾時世尊作是念我今當往婆羅門聚落婆羅長者大會堂中作是念已即往向彼大會堂所時婆羅門長者悉集堂上遙見世尊共相謂言彼剃頭沙門竟知何法爾時世尊告彼婆羅聚落婆羅門長者言諸婆羅門有知法者有不知者剎利長者亦有知法者有不知法者爾時世尊即説偈言非朋欲勝朋王不伏難伏妻不求勝夫無子不恭父無會無智者無智不法言貪恚癡悉斷是則名智者時彼婆羅門長者白佛言善士瞿曇善士夫可入此堂就座而坐世尊坐已即白言瞿曇説法我等樂聽爾時世尊為彼大會婆羅門長者種種説法示教照喜已復説偈言愚智群聚會非説孰知明能説寂靜道因説智則辨説者顯正法建立大仙幢善説為仙幢法為羅漢幢爾時世尊為婆羅聚落婆羅門長者建立正法示教照喜示教照喜已從座起而去一一八一如是我聞一時佛在拘薩羅人間遊行至浮梨聚落住天作婆羅門菴羅園中尊者優波摩為侍者爾時世尊患背痛告尊者優波摩汝舉衣鉢已往至天作婆羅門舍時天作婆羅門處於中堂令梳頭者理剃鬚髮見尊者優波摩於外門住見已即説偈言何等剃鬚髮身著僧迦梨住於彼門外為欲何所求尊者優波摩説偈答言羅漢世善逝所患背風疾頗有安樂水療牟尼疾不時天作婆羅門以滿鉢酥一瓶油一瓶石蜜使人擔持并持暖水隨尊者優波摩詣世尊所以塗其體暖水洗之酥蜜作飲世尊背疾即得安隱時天作婆羅門晨朝早起往詣佛所稽首禮足退坐一面而説偈言何言婆羅門施何得大果何等為時施云何淨福田爾時世尊説偈答言若得宿命智見天定趣生得盡諸有漏牟尼起三明善知心解脫解脫一切貪説名婆羅門施彼得大果施彼為時施隨所欲福田時天作婆羅門聞佛所説歡喜隨喜作禮而去一一八二如是我聞一時佛在拘薩羅人間遊行於一夜時住止娑羅林中時有一婆羅門去娑羅林不遠營作田業晨朝起作至娑羅林中遙見世尊坐一樹下儀容端正諸根清淨其心寂定具足成就第一止觀其身金色光明徹照見已往詣其所白言瞿曇我近在此經營事業故樂此林瞿曇於此有何事業樂此林中復説偈言比丘於此林為何事業故獨一守空間樂於此林中爾時世尊説偈答曰無事於此林林根久已斷於林離林脫禪思不樂斷時彼婆羅門聞佛所説歡喜隨喜作禮而去一一八三如是我聞一時佛在拘薩羅人間遊行夜宿一娑羅林中時有一婆羅門近彼林側與五百年少婆羅門共彼婆羅門常稱歎欽想欲見世尊何時遊於此林我因得見遇問所疑頗有間暇為我記説時彼婆羅門年少弟子為採薪故入於林中遙見世尊坐一樹下儀容端正諸根寂靜其心寂定形若金山光明徹照見已作是念我和上婆羅門常稱歎欽仰欲見瞿曇問其所疑今此沙門瞿曇到此林中我當疾往白和上令知即持薪束疾還學堂捨薪束已詣和上所白言和上當知和上由來常所稱歎欽仰欲見沙門瞿曇脫到此林當問所疑今日瞿曇已到此林和上知時時婆羅門即詣世尊所面相問訊慰勞已退坐一面而説偈言獨入此恐怖深邃叢林中堅住不傾動善修正勤法無歌舞音樂寂默住空間我所未曾見獨樂深林者欲求於世間自在增上主為三十三天天上自在樂何故深林中苦行自枯稿爾時世尊説偈答言若欲種種求諸界多種著彼一切皆是愚癡之根本如是一切求我久悉已吐不求不諂偽一切無所觸於一切諸法唯一清淨觀得無上菩提禪思修不樂婆羅門復説偈言我今敬禮汝大寂牟尼尊禪思之妙王覺無邊大覺如來天人救巍巍若金山解脫於叢林於林永不著已拔深利刺清淨無餘迹論師之上首言説最勝辨人中雄師子震吼於深林顯現苦聖諦集滅八正道能盡衆苦聚乘出淨無垢自脫一切苦濟彼苦衆生安樂衆生故演説於正法已斷於恩愛遠離於欲網斷除於一切有愛之結縛如水生蓮花塵水不染著如日停虛空清淨無雲翳善哉我今日至拘薩羅林得見於大師兩足之勝尊大林大精進得第一廣度調御師之首敬禮無所畏時婆羅門廣説斯偈讚歎佛已聞佛所説歡喜隨喜作禮而去一一八四如是我聞一時佛在拘薩羅人間遊行宿於孫陀利河側爾時世尊剃髮未久於後夜時結跏趺坐正身思惟繫念在前以衣覆頭時孫陀利河側有婆羅門住止夜起持祠餘食不盡時至河邊欲求大德婆羅門以奉之爾時世尊聞河邊婆羅門聲聞已謦咳作聲却衣現頭時孫陀利河側婆羅門見佛已作是念是剃頭沙門非婆羅門欲持食還去彼婆羅門復作是念非獨沙門是剃頭者婆羅門中亦有剃頭應往至彼問其所生時孫陀利河側婆羅門詣世尊所而問之言為何姓生爾時世尊即説偈言汝莫問所生但當問所行刻木為鑽燧亦能生於火下賤種姓中生堅固牟尼智慧有慚愧精進善調伏究竟大明際清淨修梵行而今正是時應奉施餘食時孫陀利河側婆羅門復説偈言我今吉良日求福修供養遇得見大士三時最勝尊若不見佛者當更施餘人爾時孫陀利河側婆羅門轉得信心即持餘食以奉世尊世尊不受以説偈得故如上因説偈而得食廣説孫陀利河側婆羅門白佛言世尊今此施食當置何所佛告婆羅門我不見諸天魔梵沙門婆羅門天神世人有能食此食令身安隱者汝持此食去著無蟲水中及少生草地時婆羅門即持此食著無蟲水中水即煙起涌沸啾啾作聲如燒鐵丸投之冷水煙起涌沸啾啾作聲如是彼食著無蟲水中煙起涌沸啾啾作聲孫陀利河側婆羅門心欲恐怖身毛皆竪謂為災變馳走上岸集聚乾木供養祠火令息災怪世尊見彼集聚乾木供養祠火望息災怪見已即説偈言婆羅門祠火焚燒乾草木莫呼是淨道能却諸災患此則惡供養而謂為𭶑慧作如是因緣外道取修淨汝今棄薪火起內火熾然常修不放逸常富於供養處處興淨信廣施設大會心意為束薪瞋恚黑煙起妄語為塵味口舌為木杓胸懷燃火處欲火常熾然當善自調伏消滅士夫火正信為大河淨戒為度濟澄淨清流水智者之所歎人中淨天德當於中洗浴涉水不著身安樂度彼岸正法為深淵福德為下濟澄淨水充滿智者所讚嘆人中天淨德當於中洗浴涉水不著身安樂度彼岸真諦善調御攝護修梵行慈悲為苦行真實心清淨沐浴以正法智者所稱歎爾時孫陀利河側婆羅門聞佛所説歡喜隨喜復道而去一一八五如是我聞一時佛在拘薩羅人間遊行住孫陀利河側叢林中時有孫陀利河側住止婆羅門來詣佛所面相問訊慰勞已退坐一面問佛言瞿曇至孫陀利河中洗浴不佛告婆羅門何用於孫陀利河中洗浴為婆羅門白佛瞿曇孫陀利河是濟度之數是吉祥之數是清淨之數若有於中洗浴者悉能除人一切諸惡爾時世尊即説偈言非孫陀利河亦非婆休多非伽耶薩羅如是諸河等作諸惡不善能令其清淨恆河婆休多孫陀利河等愚者常居中不能除衆惡其清淨之人何用洗浴為其清淨之人何用布薩為淨業以自淨是生於受持不殺亦不盜不淫不妄語信施除慳垢於斯而洗浴於一切衆生常起慈悲心井水以洗浴用伽耶等為內心自清淨不待洗於外下賤田舍兒身體多污垢以水洗塵穢不能淨其內爾時孫陀利河側婆羅門聞佛所説歡喜隨喜從座起而去一一八六如是我聞一時佛住迦毗羅衛國尼拘律園中時有縈髻羅豆婆遮婆羅門本俗人時為佛善知識來詣佛所面相問訊慰勞已退坐一面而説偈言外身縈髻者是但名縈髻內心縈髻者是結縛衆生今請問瞿曇云何解縈髻爾時世尊説偈答言受持於淨戒內心修正覺專精勤方便是則解縈髻時縈髻婆羅門聞佛所説歡喜隨喜從座起而去一一八七如是我聞一時佛住迦毗羅衛國尼拘律園中時有縈髻波羅豆婆遮婆羅門來詣佛所而前問訊相慰勞已退坐一面而説偈言身外縈髻者是但名縈髻內心縈髻者是結縛衆生我今問瞿曇如此縈髻者云何作方便於何斷縈髻爾時世尊説偈答言眼耳及與鼻舌身意入處於彼名及色滅盡令無餘諸識永滅者於彼斷縈髻佛説此經已縈髻婆羅豆婆遮婆羅門聞佛所説歡喜隨喜從座起去一一八八如是我聞一時佛住鬱毗羅聚落尼連禪河側菩提樹下成佛未久爾時世尊獨靜思惟作是念不恭敬者則為大苦無有次序無他自在可畏懼者則於大義有所退減有所恭敬有次序有他自在者得安樂住有所恭敬有次序有他自在大義滿足頗有諸天魔梵沙門婆羅門天神世人中能於我所具足戒勝三昧勝智慧勝解脫勝解脫知見勝令我恭敬宗重奉事供養依彼而住復作是念無有諸天魔梵沙門婆羅門天神世人能於我所戒具足勝三昧勝智慧勝解脫勝解脫知見勝令我恭敬宗重奉事供養依彼而住者唯有正法令我自覺成三藐三佛陀者我當於彼恭敬宗重奉事供養依彼而住所以者何過去如來應等正覺亦於正法恭敬宗重奉事供養依彼而住諸當來世如來應等正覺亦於正法恭敬宗重奉事供養依彼而住爾時娑婆世界主梵天王知世尊心念已如力士屈伸臂頃從梵天沒住於佛前歎言善哉如是世尊如是善逝懈怠不恭敬者甚為大苦廣説乃至大義滿足其實無有諸天魔梵沙門婆羅門天神世人於世尊所戒具足勝三昧勝智慧勝解脫勝解脫知見勝令世尊恭敬宗重奉事供養依彼而住者唯有正法如來自悟成等正覺則是如來所應恭敬宗重奉事供養依彼而住者所以者何過去諸如來應等正覺亦於正法恭敬宗重奉事供養依彼而住諸未來如來應等正覺亦當於正法恭敬宗重奉事供養依彼而住世尊亦當於彼正法恭敬宗重奉事供養依彼而住時梵天王復説偈言過去等正覺及未來諸佛現在佛世尊能除衆生憂一切恭敬法依正法而住如是恭敬者是則諸佛法時梵天王聞佛所説歡喜隨喜稽首佛足即沒不現一一八九如是我聞一時佛住鬱毗羅聚落尼連禪河側菩提樹下成佛未久爾時世尊獨靜思惟作是念有一乘道能淨衆生度諸憂悲滅除苦惱得真如法謂四念處何等為四身身觀念處受心法法觀念處若有人不樂四念處者則不樂如聖法不樂如聖法者則不樂如聖道不樂如聖道者則不樂甘露法不樂甘露法者則不解脫生老病死憂悲惱苦若樂修四念處者則樂修如聖法樂修如聖法者則樂如聖道樂如聖道者則樂甘露法樂甘露法者得解脫生老病死憂悲惱苦爾時娑婆世界主梵天王知佛心念已譬如力士屈伸臂頃於梵天沒住於佛前作是歎言如是世尊如是善逝有一乘道能淨衆生謂四念處乃至解脫生老病死憂悲惱苦時梵天王復説偈言謂有一乘道見生諸有邊演説於正法安慰苦衆生過去諸世尊以乘斯道度當來諸世尊亦度乘斯道現在尊正覺乘此度海流究竟生死際調伏心清淨於生死輪轉悉已永消盡知種種諸界慧眼顯正道譬若恆水流悉歸趣大海激流浚漂遠正道亦如是廣智善顯示逮得甘露法殊勝正法輪本所未曾聞哀愍衆生故而為衆生轉覆護天人衆令度有彼岸是故諸衆生咸皆稽首禮爾時梵天王聞佛所説歡喜隨喜稽首佛足即沒不現一一九如是我聞一時佛住鬱毗羅聚落尼連禪河側菩提樹下成佛未久爾時娑婆世界主梵天王絶妙色身於後夜時來詣佛所稽首佛足退坐一面而説偈言於諸種姓中剎利兩足尊明行具足者天人中最勝佛告梵天王如是梵天如是梵天於諸種姓中剎利兩足尊明行具足者天人中最勝佛説是經已娑婆世界主梵天王聞佛所説歡喜隨喜稽首佛足即沒不現一一九一如是我聞一時佛在拘薩羅人間遊行住止空間無聚落處與比丘衆夜宿其中爾時世尊為諸比丘説隨順阿練若法時娑婆世界主梵天王作是念今者世尊在拘薩羅人間遊行住一空間無聚落處與諸大衆止宿空野爾時世尊為諸大衆説隨順空法我今當往隨順讚嘆譬如力士屈伸臂頃於梵天沒住於佛前稽首佛足退坐一面而説偈言習近邊林座斷除諸煩惱若不樂空間入衆自攝護自調伏其心家家行乞食攝持於諸根專精繫心念然後習空間阿練若床座遠離諸恐怖無畏安隱住若彼諸凶險惡蛇衆毒害黑雲大暗冥震雷曜電光離諸煩惱故晝夜安隱住如我所聞法乃至不究竟獨一修梵行不畏千死魔若修於覺道不畏於萬數一切須陀洹或得斯陀含及阿那含者其數亦無量不能定其數恐怖於妄説時娑婆世界主梵天王聞佛所説歡喜隨喜已為佛作禮即沒不現一一九二如是我聞一時佛住迦毗羅衛迦毗羅衛林中與五百比丘俱皆是羅漢諸漏已盡所作已作離諸重擔逮得己利盡諸有結正智心善解脫爾時世尊為諸大衆説涅槃相應法時有十方世界大衆威力諸天皆悉來會供養世尊及比丘僧復有諸梵天王住於梵世作是念今日佛住迦毗羅衛國如上廣説乃至供養世尊及諸大衆我今當往各各讚歎作是念已譬如力士屈伸臂頃從梵天沒住於佛前第一梵天即説偈言於此大林中大衆普雲集十方諸天衆皆悉來恭敬故我遠來禮最勝難伏僧第二梵天復説偈言是諸比丘僧真實心精進於此大林中攝諸根求度第三梵天次説偈言善方便消融恩愛深利刺堅固不傾動如因陀羅幢度深塹水流清淨不求欲善度之導師諸調伏大龍第四梵天次説偈言歸依於佛者終不墮惡趣能斷人中身得天身受樂各説偈已四梵天身即沒不現一一九三如是我聞一時佛住王舍城迦蘭陀竹園時有娑婆世界主梵天王日日精勤往詣佛所尊重供養時娑婆世界主作是念今旦太早而來見佛正值世尊入大三昧我等且當入提婆達多伴黨瞿迦梨比丘房中作是念已即入彼房至房戶中以指扣戶口説是言瞿迦梨瞿迦梨於舍利弗目連所起淨信心汝莫長夜得不饒益苦瞿迦梨言汝是誰梵天答言娑婆世界主梵天王瞿迦梨言世尊不記汝得阿那含耶梵天王言如是比丘瞿迦梨言汝何故來娑婆世界主梵天王答言此不可治即説偈言於無量處所生心欲籌量何有𭶑慧者而生此覺想無量而欲量是陰蓋凡夫時娑婆世界主梵天王往詣佛所稽首禮足退坐一面白佛言世尊我常日日勤到佛所親覲供養我作是念今旦太早來見世尊正值世尊入大三昧我且當入提婆達多伴黨瞿迦梨比丘房中即住戶中徐徐扣戶口説是言瞿迦梨瞿迦梨當於舍利弗目揵連賢善智慧者所起淨信心莫長夜得不饒益苦瞿迦梨言汝是誰我即答言是娑婆世界主梵天王瞿迦梨言世尊不記汝得阿那含耶我即答言如是瞿迦梨復言汝何故來我作是念此不可治即説偈言於不可量處發心欲籌量不可量欲量是陰蓋凡夫佛語梵王如是如是梵王於不可量處而發心欲量何有智慧人而生此妄想不可量欲量是陰蓋凡夫佛説此經已娑婆世界主梵天王聞佛所説歡喜隨喜從座起為佛作禮即沒不現一一九四如是我聞一時佛住王舍城迦蘭陀竹園爾時大梵天王及餘別梵天善臂別梵天日日方便往見供養世尊時有婆句梵天見別梵天善臂梵天精勤方便而問言汝欲何之彼即答言欲見世尊恭敬供養時婆句梵天即説偈言彼有四鵠鳥三種金色宮五百七十二修行禪思者熾焰金色身普照梵天宮汝且觀我身何用至彼為爾時善梵王別梵王善臂別梵王復説偈言雖有金色身普照梵天宮其有智慧者知色有煩惱智者不樂色於其心解脫時彼善梵天別梵天善臂別梵天往詣佛所稽首佛足退坐一面白佛言世尊我今方便欲來見世尊恭敬供養有婆句梵天見我方便而問我言汝今方便欲何所之我即答言欲往見世尊禮事供養婆句梵天即説偈言有四種鵠鳥三種金色宮五百七十二於中而禪思觀我身金色普照梵天宮汝且觀我身何用至彼為我即説偈而答彼言雖有金色身普照梵天宮當知真金色是則煩惱事智者解脫色於色不復樂佛告梵天如是梵天如是梵天雖有真金色普照梵天宮當知真金色則是煩惱事智者解脫色於色不復樂時彼梵天為迦吒務陀低沙比丘故説偈言夫士生世間利斧在口中還自斬其身斯由惡言故應毀者稱譽應譽而反毀惡口增其過所生無安樂博奕酒喪財其過失甚少惡心向善逝是則為大過地獄有百千名尼羅浮地三十有六百及五阿浮陀斯皆謗聖獄口意惡願故佛説此經已彼諸梵天聞佛所説歡喜隨喜稽首佛足即沒不現一一九五如是我聞一時佛住王舍城迦蘭陀竹園時有婆句梵天住梵天上起如是惡邪見言此處常恆非變易法純一出離之處爾時世尊知婆句梵天心念已入於三昧如其正受於王舍城沒住梵天上婆句梵天遙見世尊而説偈言梵天七十二造作諸福樂自在而常住生老死已過我於諸明論修習已究竟彼諸天衆等唯謂我長存爾時世尊説偈答言此則極短壽非是長存者而婆句梵天自謂為長壽尼羅浮多獄其壽百千數我悉憶念知汝自謂長存婆句梵天復説偈言佛世尊所見其劫數無邊生老死憂悲皆悉已過去唯願説知我過去曾所更受持何戒業而得生於此爾時世尊説偈答言過去久遠劫於大曠野中有諸大衆行多賢聖梵行飢乏無資糧汝救之令度慈救心相續經劫而不失是則汝過去所受持功德我悉憶念知久近如眠覺過去有村邑為賊所抄掠汝時悉皆救令其得解脫是則過去世所受持福業我憶此因緣久近如眠覺過去有人衆乘船恆水中惡龍持彼船欲盡害其命汝時以神力救令得解脫是則汝過去所受持福業我憶是因緣久近如眠覺婆句梵天復説偈言決定悉知我古今壽命事亦知餘一切是則為正覺是故所受身金光炎普照其身住於此光明遍世間爾時世尊為婆句梵天種種説法示教照喜已如其正受從梵天沒還王舍城一一九六如是我聞一時佛住舍衛國祇樹給孤獨園時有一梵天住梵天上起如是邪見言此處常恆不變易純一出離未曾見有來至此處況復有過此上者爾時世尊知彼梵天心之所念即入三昧如其正受於舍衛國沒現梵天宮當彼梵天頂上於虛空中結跏趺坐正身繫念爾時尊者阿若俱鄰作是念今日世尊為在何所即以天眼淨過人間眼觀見世尊在梵天上見已即入三昧如其正受於舍衛國沒現彼梵世在於東方西面向佛結跏趺坐端身繫念在佛座下梵天座上爾時尊者摩訶迦葉作是念今日世尊為在何所即以天眼淨過於人眼見世尊在梵天上見已即入三昧如其正受於舍衛國沒現梵天上在於南方北面向佛結跏趺坐端身繫念在佛座下梵天座上時尊者舍利弗作是念世尊今者為在何所即以天眼淨過於人眼見世尊在梵天上見已即入三昧如其正受於舍衛國沒住梵天上在於西方東面向佛結跏趺坐端身繫念在佛座下梵天座上爾時尊者大目揵連即作是念今日世尊為在何所以天眼淨過於人眼遙見世尊在梵天上見已即入三昧如其正受於舍衛國沒住梵天上在於北方南面向佛結跏趺坐端身繫念在佛座下梵天座上爾時世尊告梵天曰汝今復起是見從本已來未曾見有過我上者不梵天白佛我今不敢復言我未曾見有過我上者唯見梵天光明被障爾時世尊為彼梵天種種説法示教照喜已即入三昧如其正受於梵天上沒還舍衛國尊者阿若俱鄰摩訶迦葉舍利弗為彼梵天種種説法示教照喜已即入三昧如其正受於梵天沒還舍衛國唯尊者大目揵連仍於彼住時彼梵天問尊者大目揵連世尊諸餘弟子悉有如是大德大力不時尊者大目揵連即説偈言大德具三明通達觀他心漏盡諸羅漢其數無有量時尊者大目揵連為彼梵天種種説法示教照喜已即入三昧如其正受於梵天沒還舍衛國一一九七如是我聞一時佛住俱尸那竭國力士生地堅固雙樹林爾時世尊臨般涅槃告尊者阿難汝於堅固雙樹間敷繩床北首如來今日中夜於無餘涅槃而般涅槃時尊者阿難奉世尊教於雙堅固樹間為世尊敷繩床北首已還世尊所稽首禮足白言世尊已為如來於雙堅固樹間敷繩床令北首於是世尊往就繩床右脅著地北首而臥足足相纍繫念明相爾時世尊即於中夜於無餘涅槃而般涅槃般涅槃已雙堅固樹尋即生花周匝垂下供養世尊時有異比丘即説偈言善好堅固樹枝條垂禮佛妙花以供養大師般涅槃尋時釋提桓因説偈一切行無常斯皆生滅法雖生尋以滅斯寂滅為樂尋時娑婆世界主梵天王次復説偈言世間一切生立者皆當捨如是聖大師世間無有比逮得如來力普為世間眼終歸會磨滅入無餘涅槃尊者阿那律陀次復説偈言出息入息住立心善攝護從所依而來世間般涅槃大恐怖相生令人身毛竪一切行力具大師般涅槃其心不懈怠亦不住諸愛心法漸解脫如薪盡火滅如來涅槃後七日尊者阿難往枝提所而説偈言導師此寶身往詣梵天上如是大神力內火還燒身五百㲲纏身悉燒令磨滅千領細㲲衣以衣如來身唯二領不燒最上及襯身尊者阿難説是偈時諸比丘默然悲喜
