body:
  text: 宋天竺三藏求那跋陀羅譯七一二如是我聞一時佛住王舍城耆闍崛山如上説差別者有沙門婆羅門作如是見如是説無因無緣衆生無智無見無因無緣衆生智見如是廣説乃至無畏王子聞佛所説歡喜隨喜禮佛足而去七一三如是我聞一時佛住舍衛國祇樹給孤獨園時有衆多比丘晨朝著衣持鉢入舍衛城乞食時衆多比丘作是念今日太早乞食時未至我等且過諸外道精舍衆多比丘即入外道精舍與諸外道共相問訊慰勞問訊慰勞已於一面坐已諸外道問比丘言沙門瞿曇為諸弟子説法斷五蓋覆心慧力羸為障礙分不轉趣涅槃住四念處修七覺意我等亦復為諸弟子説斷五蓋覆心慧力羸善住四念處修七覺分我等與彼沙門瞿曇有何等異俱能説法時衆多比丘聞外道所説心不喜悅反呵罵從座起去入舍衛城乞食已還精舍舉衣鉢洗足已往詣佛所稽首佛足退坐一面以諸外道所説具白世尊爾時世尊告衆多比丘彼外道説是語時汝等應反問言諸外道五蓋者種應有十七覺者種應有十四何等為五蓋之十七覺之十四如是問者彼諸外道則自駭散説諸外道法瞋恚憍慢毀呰嫌恨不忍心生或默然低頭失辨潛思所以者何我不見諸天魔梵沙門婆羅門天人衆中聞我所説歡喜隨順者唯除如來及聲聞衆於此聞者諸比丘何等為五蓋之十謂有內貪欲有外貪欲彼內貪欲者即是蓋非智非等覺不轉趣涅槃彼外貪欲即是蓋非智非等覺不轉趣涅槃謂瞋恚有瞋恚相若瞋恚及瞋恚相即是蓋非智非等覺不轉趣涅槃有睡有眠彼睡彼眠即是蓋非智非等覺不轉趣涅槃有掉有悔彼掉彼悔即是蓋非智非等覺不轉趣涅槃有疑善法有疑不善法彼善法疑不善法疑即是蓋非智非等覺不轉趣涅槃是名五蓋説十何等為七覺分説十四有內法心念住有外法心念住彼內法念住即是念覺分是智是等覺能轉趣涅槃彼外法念住即是念覺分是智是等覺能轉趣涅槃有擇善法擇不善法彼善法擇即是擇法覺分是智是等覺能轉趣涅槃彼不善法擇即是擇法覺分是智是等覺能轉趣涅槃有精進斷不善法有精進長養善法彼斷不善法精進即是精進覺分是智是等覺能轉趣涅槃彼長養善法精進即是精進覺分是智是等覺能轉趣涅槃有喜有喜處彼喜即是喜覺分是智是等覺能轉趣涅槃彼喜處亦即是喜覺分是智是等覺能轉趣涅槃有身猗息有心猗息彼身猗息即是猗覺分是智是等覺能轉趣涅槃彼心猗息即是猗覺分是智是等覺能轉趣涅槃有定有定相彼定即是定覺分是智是等覺能轉趣涅槃彼定相即是定覺分是智是等覺能轉趣涅槃有捨善法有捨不善法彼善法捨即是捨覺分是智是等覺能轉趣涅槃彼不善法捨即是捨覺分是智是等覺能轉趣涅槃是名七覺分説為十四佛説此經已衆多比丘聞佛所説歡喜奉行七一四如是我聞一時佛住舍衛國祇樹給孤獨園時有衆多比丘如上説差別者有諸外道出家作如是説者當復問言若心微劣猶豫者爾時應修何等覺分何等為非修時若復掉心者掉心猶豫者爾時復修何等覺分何等為非時如是問者彼諸外道心則駭散説諸異法心生忿恚憍慢毀呰嫌恨不忍或默然低頭失辨潛思所以者何我不見諸天魔梵沙門婆羅門天人衆中聞我所説歡喜隨喜者唯除如來及聲聞衆於此聞者諸比丘若爾時其心微劣其心猶豫者不應修猗覺分定覺分捨覺分所以者何微劣心生微劣猶豫以此諸法增其微劣故譬如小火欲令其燃增以燋炭云何比丘非為增炭令火滅耶比丘白佛如是世尊如是比丘微劣猶豫若修猗覺分定覺分捨覺分者此則非時增懈怠故若掉心起若掉心猶豫爾時不應修擇法覺分精進覺分喜覺分所以者何掉心起掉心猶豫以此諸法能令其增譬如熾火欲令其滅足其乾薪於意云何豈不令火增熾燃耶比丘白佛如是世尊佛告比丘如是掉心生掉心猶豫修擇法覺分精進覺分喜覺分增其掉心諸比丘若微劣心生微劣猶豫是時應修擇法覺分精進覺分喜覺分所以者何微劣心生微劣猶豫以此諸法示教照喜譬如小火欲令其燃足其乾薪云何比丘此火寧熾燃不比丘白佛如是世尊佛告比丘如是微劣心生微劣猶豫當於爾時修擇法覺分精進覺分喜覺分示教照喜若掉心生掉心猶豫修猗覺分定覺分捨覺分所以者何掉心生掉心猶豫此等諸法能令內住一心攝持譬如燃火欲令其滅足其燋炭彼火則滅如是比丘掉心猶豫修擇法覺分精進喜則非時修猗定捨覺分自此則是時此等諸法內住一心攝持念覺分者一切兼助佛説此經已諸比丘聞佛所説歡喜奉行七一五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五蓋七覺分有食無食我今當説諦聽善思當為汝説譬如身依食而立非不食如是五蓋依於食而立非不食貪欲蓋以何為食謂觸相於彼不正思惟未起貪欲令起已起貪欲能令增廣是名欲愛蓋之食何等為瞋恚蓋食謂障礙相於彼不正思惟未起瞋恚蓋令起已起瞋恚蓋能令增廣是名瞋恚蓋食何等為睡眠蓋食有五法何等為五微弱不樂欠呿多食懈怠於彼不正思惟未起睡眠蓋令起已起睡眠蓋能令增廣是名睡眠蓋食何等為掉悔蓋食有四法何等為四謂親屬覺人衆覺天覺本所經娛樂覺自憶念他人令憶念而生覺於彼起不正思惟未起掉悔令起已起掉悔令其增廣是名掉悔蓋食何等為疑蓋食有三世何等為三謂過去世未來世現在世於過去世猶豫未來世猶豫現在世猶豫於彼起不正思惟未起疑蓋令起已起疑蓋能令增廣是名疑蓋食譬如身依於食而得長養非不食如是七覺分依食而住依食長養非不食何等為念覺分不食謂四念處不思惟未起念覺分不起已起念覺分令退是名念覺分不食何等為擇法覺分不食謂於善法撰擇於不善法撰擇於彼不思惟未起擇法覺分令不起已起擇法覺分令退是名擇法覺分不食何等為精進覺分不食謂四正斷於彼不思惟未起精進覺分令不起已起精進覺分令退是名精進覺分不食何等為喜覺分不食有喜有喜處法於彼不思惟未起喜覺分不起已起喜覺分令退是名喜覺分不食何等為猗覺分不食有身猗息及心猗息於彼不思惟未生猗覺分不起已生猗覺分令退是名猗覺分不食何等為定覺分不食有四禪於彼不思惟未起定覺分不起已起定覺分令退是名定覺分不食何等為捨覺分不食有三界謂斷界無欲界滅界於彼不思惟未起捨覺分不起已起捨覺分令退是名捨覺分不食何等為貪欲蓋不食謂不淨觀於彼思惟未起貪欲蓋不起已起貪欲蓋令斷是名貪欲蓋不食何等為瞋恚蓋不食彼慈心思惟未生瞋恚蓋不起已生瞋恚蓋令滅是名瞋恚蓋不食何等為睡眠蓋不食彼明照思惟未生睡眠蓋不起已生睡眠蓋令滅是名睡眠蓋不食何等為掉悔蓋不食彼寂止思惟未生掉悔蓋不起已生掉悔蓋令滅是名掉悔蓋不食何等為疑蓋不食彼緣起法思惟未生疑蓋不起已生疑蓋令滅是名疑蓋不食譬如身依食而住依食而立如是七覺分依食而住依食而立何等為念覺分食謂四念處思惟已未生念覺分令起已生念覺分轉生令增廣是名念覺分食何等為擇法覺分食有擇善法有擇不善法彼思惟已未生擇法覺分令起已生擇法覺分重生令增廣是名擇法覺分食何等為精進覺分食彼四正斷思惟未生精進覺分令起已生精進覺分重生令增廣是名精進覺分食何等為喜覺分食有喜有喜處彼思惟未生喜覺分令起已生喜覺分重生令增廣是名喜覺分食何等為猗覺分食有身猗息心猗息思惟未生猗覺分令起已生猗覺分重生令增廣是名猗覺分食何等為定覺分食謂有四禪思惟未生定覺分令生起已生定覺分重生令增廣是名定覺分食何等為捨覺分食有三界何等三謂斷界無欲界滅界彼思惟未生捨覺分令起已生捨覺分重生令增廣是名捨覺分食佛説此經已諸比丘聞佛所説歡喜奉行七一六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於內法中我不見一法未生惡不善法令生已生惡不善法重生令增廣未生善法不生已生則退所謂不正思惟諸比丘不正思惟者未生貪欲蓋令生已生者重生令增廣未生瞋恚睡眠掉悔疑蓋令生已生者重生令增廣未生念覺分不生已生者令退未生擇法精進喜猗定捨覺分令不生已生者令退我不見一法能令未生惡不善法不生已生者令斷未生善法令生已生者重生令增廣正思惟比丘正思惟者未生貪欲蓋令不生已生者令斷未生瞋恚睡眠掉悔疑蓋令不生已生者令斷未生念覺分令生已生者重生令增廣未生擇法精進喜猗定捨覺分令生已生者重生令增廣佛説此經已諸比丘聞佛所説歡喜奉行七一七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於外法中我不見一法未生惡不善法令生已生者重生令增廣未生善法令不生已生者令退如惡知識惡伴黨惡知識惡伴黨者未生貪欲蓋令生已生者重生令增廣未生瞋恚睡眠掉悔疑蓋令生已生者重生令增廣未生念覺分令不生已生者令退未生擇法精進喜猗定捨覺分令不生已生者令退諸比丘我不見一法未生惡不善法令不生已生者令斷未生善法令生已生者重生令增廣所謂善知識善伴黨善隨從者若善知識善伴黨善隨從者未生貪欲蓋令不生已生者令斷未生瞋恚睡眠掉悔疑蓋令不生已生者令斷未生念覺分令生已生者重生令增廣未生擇法精進喜猗定捨覺分令生已生者重生令增廣佛説此經已諸比丘聞佛所説歡喜奉行七一八如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者舍利弗告諸比丘有七覺分何等為七謂念覺分擇法覺分精進覺分喜覺分猗覺分定覺分捨覺分此七覺分決定而得不勤而得我隨所欲覺分正受若晨朝時日中時日暮時若欲正受隨其所欲多入正受譬如王大臣有種種衣服置箱簏中隨其所須日中所須日暮所須隨欲自在如是比丘此七覺分決定而得不勤而得隨意正受我此念覺分清淨純白起時知起滅時知滅沒時知沒已起知已起已滅知已滅如是擇法精進喜猗定捨覺分亦如是説尊者舍利弗説此經已諸比丘聞其所説歡喜奉行七一九如是我聞一時佛住巴連弗邑爾時尊者優波摩尊者阿提目多住巴連弗邑雞林精舍爾時尊者阿提目多晡時從禪覺詣尊者優波摩所共相問訊慰勞已退坐一面問尊者優波摩尊者能知七覺分方便如是樂住正受如是苦住正受優波摩答言尊者阿提目多比丘善知方便修七覺分如是樂住正受如是苦住正受復問云何比丘善知方便修七覺分優波摩答言比丘方便修念覺分時知思惟彼心不善解脫不害睡眠不善調伏掉悔不害睡眠如我念覺處法思惟精進方便不得平等如是擇法精進喜猗定捨覺分亦如是説若比丘念覺分方便時先思惟心善解脫正害睡眠調伏掉悔如我於此念覺處法思惟已不勤方便而得平等如是阿提目多比丘知方便修七覺分如是樂住正受如是不樂住正受時二正士共論義已各從座起而去七二如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者阿那律亦住舍衛國松林精舍時有衆多比丘詣阿那律所共相問訊慰勞問訊慰勞已退坐一面語尊者阿那律尊者知方便修七覺分時生樂住不尊者阿那律語諸比丘言我知比丘方便修七覺分時生樂住諸比丘問尊者阿那律云何知比丘方便修七覺分時生樂住尊者阿那律語諸比丘比丘方便修念覺分善知思惟我心善解脫善害睡眠善調伏掉悔如此念覺分處法思惟已精勤方便心不懈怠身猗息不動亂繫心令住不起亂念一心正受如是擇法精進喜猗定捨覺分亦如是説是名知比丘方便修七覺分時生樂住時衆多比丘聞尊者阿那律所説歡喜隨喜從座起而去七二一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘轉輪聖王出世之時有七寶現於世間金輪寶象寶馬寶神珠寶玉女寶主藏臣寶主兵臣寶如是如來出世亦有七覺分寶現齋戒處樓觀上大臣圍繞有金輪寶從東方出輪有千輻齊轂圓輞輪相具足有此吉瑞必是轉輪聖王我今決定為轉輪王即以兩手承金輪寶著左手中右手旋轉而説是言若是轉輪聖王金輪寶者當復轉輪聖王古道而去於是輪寶即發王蕃前隨而於東方乘虛而逝向於東方遊古聖王正直之道王隨輪寶四兵亦從若所至方輪寶住者王於彼住四兵亦住東方諸國處處小王見聖王來悉皆歸伏如來出興於世有七覺分現於世間所謂念覺分擇法覺分精進覺分喜覺分猗覺分定覺分捨覺分佛説此經已諸比丘聞佛所説歡喜奉行七二二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘轉輪聖王出於世時有七寶現於世間云何轉輪聖王出於世時金輪寶現有時剎利灌頂聖王月十五日沐浴清淨受持齋戒於樓閣上大臣圍繞有金輪寶從東方出輪有千輻齊轂圓輞輪相具足天真金寶古昔傳聞剎利灌頂大王月十五日布薩時沐浴清淨受持福善善來大王此是王國此國安隱人民豐樂願於中止教化國人我則隨從聖王答言諸聚落主汝今但當善化國人有不順者當來白我當如法化莫作非法亦令國人善化非法若如是者則從我化於是聖王從東海度乘古聖王道至于南海至於南海度於南海至西海乘於古昔聖王之道度於西海至於北海南西北方諸小國王奉迎啓請亦如東方廣説於是金輪寶聖王隨從度於北海還至王宮正治殿上住虛空中是為轉輪聖王出興于世金輪寶現於世間云何為轉輪聖王出興于世白象寶現於世間若剎利灌頂大王純色之象其色鮮好七支拄地聖王見已心則欣悅今此寶象來應於我告善調象師令速調此寶象調已送來象師受命不盈一日象即調伏一切調伏相悉皆具足猶如餘象經年調者今此象寶一日調伏亦復如是調已送詣王所上白大王此象已調唯王自知時爾時聖王觀察此象調相已備即乘寶象於晨旦時周行四海至日中時還歸王宮是名轉輪聖王出興于世如此象寶現於世間何等為轉輪聖王出興于世馬寶現於世間轉輪聖王所有馬寶純一青色烏頭澤尾聖王見馬心生欣悅今此神馬來應我故付調馬師令速調之調已送來馬師奉教不盈一日其馬即調猶如餘馬經年調者馬寶調伏亦復如是知馬調已還送奉王白言大王此馬已調爾時聖王觀察寶馬調相已備於晨旦時乘此寶馬周行四海至日中時還歸王宮是名轉輪聖王出興于世馬寶現於世間何等為轉輪聖王出興于世摩尼珠寶現於世間若轉輪聖王所有寶珠其形八楞光澤明照無諸類隙於王宮內常為燈明轉輪聖王察試寶珠陰雨之夜將四種兵入於園林持珠前導光明照耀面一由旬是為轉輪聖王出興于世摩尼寶珠現於世間何等為轉輪聖王出興于世賢玉女寶現於世間轉輪聖王所有玉女不黑不白不長不短不麁不細不肥不瘦支體端正寒時體暖熱時體涼身體柔軟如迦陵伽衣身諸毛孔出栴檀香口鼻出息作優鉢羅香後臥先起瞻王意色隨宜奉事軟言愛語端心正念發王道意心無違越況復身口是為轉輪聖王寶女云何為轉輪聖王主藏臣寶現於世間謂轉輪聖王主藏大臣本行施故生得天眼能見伏藏有主無主若水若陸若遠若近悉能見之轉輪聖王須珍寶即便告敕隨王所須輒以奉上於是聖王有時試彼大臣觀其所能乘船遊海告彼大臣我須寶物臣白王言小住岸邊當以奉上王告彼臣我今不須岸邊之寶且盡與我於是大臣即於水中出四金甕金寶滿中以奉聖王王所須即取用之若取足已餘則還歸水中聖王出世則有如此主藏之臣現於世間云何聖王出興於世有主兵之臣現於世間謂有主兵臣聰明智辨譬如世間善思量成就者聖王所宜彼則悉從宜去宜住宜出宜入聖王四種兵行道里頓止不令疲倦悉知聖王宜所應作現法後世功德之事以白聖王轉輪聖王出興于世有如是主兵之臣如是如來應等正覺出興於世有七覺分現於世間何等為七謂念覺分擇法覺分精進覺分喜覺分猗覺分定覺分捨覺分佛説此經已諸比丘聞佛所説歡喜奉行七二三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘善哉比丘僧人聞法諸年少比丘供養奉事諸尊長老所以者何年少比丘供養奉事長老比丘者時時得聞深妙之法聞深法已二正事成就身正及心正爾時修念覺分修念覺分已念覺分滿足念覺滿足已於法選擇分別於法思量於法爾時方便修擇法覺分乃至捨覺分修習滿足佛説此經已諸比丘聞佛所説歡喜奉行七二四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若比丘持戒修德慚愧成真實法見此人者多得果報若復聞者若隨憶念者隨出家者多得功德況復親近恭敬奉事所以者何親近奉事如是人者時時得聞深妙之法得聞深法已成就二正身正及心正方便修習定覺分修習已修習滿足乃至捨覺分修習滿足佛説此經已諸比丘聞佛所説歡喜奉行七二五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘説不善積聚者所謂五蓋是為正説所以者何純一不善聚者謂五蓋故何等為五謂貪欲蓋瞋恚蓋睡眠蓋掉悔蓋疑蓋説善積聚者謂七覺分是為正説所以者何純一滿淨者是七覺分故何等為七謂念覺分擇法覺分精進覺分喜覺分猗覺分定覺分捨覺分佛説此經已諸比丘聞佛所説歡喜奉行七二六如是我聞一時佛住王舍城夾谷精舍爾時尊者阿難亦在彼住時尊者阿難獨一靜處禪思思惟作如是念半梵行者所謂善知識善伴黨善隨從非惡知識惡伴黨惡隨從時尊者阿難從禪覺往詣佛所稽首禮足退坐一面白佛言世尊我獨一靜處禪思思惟作是念半梵行者所謂善知識善伴黨善隨從非惡知識惡伴黨惡隨從佛告阿難莫作是言半梵行者謂善知識善伴黨善隨從非惡知識惡伴黨惡隨從所以者何純一滿靜梵行清白所謂善知識善伴黨善隨從非惡知識惡伴黨惡隨從我為善知識故有衆生於我所取念覺分依遠離依無欲依滅向於捨如是擇法覺分精進喜猗定捨覺分依遠離依無欲依滅向於捨以是故當知阿難純一滿靜梵行清白謂善知識善伴黨善隨從非惡知識非惡伴黨非惡隨從佛説此經已諸比丘聞佛所説歡喜奉行七二七如是我聞一時佛在力士聚落人間遊行於拘夷那竭城希連河中間住於聚落側告尊者阿難令四重襞疊敷世尊鬱多羅僧我今背疾欲小臥息尊者阿難即受教敕四重襞疊敷鬱多羅僧已白佛言世尊已四重襞疊敷鬱多羅僧唯世尊知時爾時世尊厚襞僧伽梨枕頭右脅而臥足足相纍繫念明相正念正智作起覺想告尊者阿難汝説七覺分時尊者阿難即白佛言世尊所謂念覺分世尊自覺成等正覺説依遠離依無欲依滅向於捨擇法精進喜猗定捨覺分世尊自覺成等正覺説依遠離依無欲依滅向於捨佛告阿難汝説精進耶阿難白佛我説精進世尊説精進善逝佛告阿難唯精進修習多修習得阿耨多羅三藐三菩提説是語已正坐端身繫念時有異比丘即説偈言樂聞美妙法忍疾告人説比丘即説法轉於七覺分善哉尊阿難明解巧便説有勝白淨法離垢微妙説念擇法精進喜猗定捨覺此則七覺分微妙之善説聞説七覺分深達正覺味身嬰大苦患忍疾端坐聽觀為正法王常為人演説猶樂聞所説況餘未聞者第一大智慧十力所禮者彼亦應疾疾來聽説正法諸多聞通達契經阿毗曇善通法律者應聽況餘者聞説如實法專心𭶑慧聽於佛所説法得離欲歡喜歡喜身猗息心自樂亦然心樂得正受正觀有事行厭惡三趣者離欲心解脫厭惡諸有趣不集於人天無餘猶燈滅究竟般涅槃聞法多福利最勝之所説是故當專思聽大師所説異比丘説此偈已從座起而去七二八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有七覺分何等為七謂念覺分乃至捨覺分佛説此經已諸比丘聞佛所説歡喜奉行七二九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘當修七覺分何等為修七覺分謂念覺分乃至捨覺分若比丘修念覺分依遠離依無欲依滅向於捨如是修擇法精進喜猗定捨覺分依遠離依無欲依滅向於捨佛説此經已諸比丘聞佛所説歡喜奉行七三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上説差別者諸比丘過去已如是修七覺分未來亦當如是修七覺分佛説此經已諸比丘聞佛所説歡喜奉行七三一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若比丘念覺分清淨鮮白無有支節離諸煩惱未起不起除佛調伏教授乃至捨覺分亦如是説諸比丘念覺分清淨鮮白無有支節離諸煩惱未起而起佛所調伏教授非餘乃至捨覺分亦如是説佛説此經已諸比丘聞佛所説歡喜奉行七三二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上説差別者未起不起除善逝調伏教授未起而起是則善逝調伏教授非餘佛説此經已諸比丘聞佛所説歡喜奉行七三三如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘來詣佛所稽首禮足退坐一面白佛言世尊謂覺分世尊云何為覺分佛告比丘所謂覺分者謂七道品法然諸比丘七覺分漸次而起修習滿足異比丘白佛世尊云何覺分漸次而起修習滿足佛告比丘若比丘內身身觀住彼內身身觀住時攝心繫念不忘彼當爾時念覺分方便修習方便修習念覺分已修習滿足滿足念覺分已於法選擇分別思量當於爾時修擇法覺分方便修方便已修習滿足如是乃至捨覺分修習滿足如內身身觀念住如是外身內外身受心法法觀念住當於爾時專心繫念不忘乃至捨覺分亦如是説如是住者漸次覺分起漸次起已修習滿足佛説此經已諸比丘聞佛所説歡喜奉行七三四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告彼比丘如上差別者若比丘如是修習七覺分已當得二種果現法得漏盡無餘涅槃或得阿那含果佛説此經已諸比丘聞佛所説歡喜奉行七三五如是我聞一時佛住舍衛國祇樹給孤獨園如上説差別者如是比丘修習七覺分已多修習已得四種果四種福利何等為四謂須陀洹果斯陀含果阿那含果阿羅漢果佛説此經已異比丘聞佛所説歡喜奉行七三六如是我聞一時佛住舍衛國祇樹給孤獨園如上説差別者若比丘修習七覺分多修習已當得七種果七種福利何等為七是比丘得現法智證樂若命終時若不得現法智證樂及命終時而得五下分結盡中般涅槃若不得中般涅槃而得生般涅槃若不得生般涅槃而得無行般涅槃若不得無行般涅槃而得有行般涅槃若不得有行般涅槃而得上流般涅槃佛説此經已異比丘聞佛所説歡喜奉行七三七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘所謂覺分何等為覺分諸比丘白佛世尊是法根法眼法依唯願為説諸比丘聞已當受奉行佛告諸比丘比丘尼七覺分者謂七道品法諸比丘此七覺分漸次起漸次起已修習滿足諸比丘白佛云何七覺分漸次起漸次起已修習滿足若比丘身身觀念住彼身身觀念住已專心繫念不忘當於爾時方便修念覺分方便修念覺分已修習滿足謂修念覺分已於法選擇當於爾時修擇法覺分方便修擇法覺分方便已修習滿足如是精進喜猗定捨覺分亦如是説如內身如是外身內外身受心法法觀念住專心繫念不忘當於爾時方便修念覺分方便修念覺分已修習滿足乃至捨覺分亦如是説是名比丘七覺分漸次起漸次起已修習滿足佛説此經已諸比丘聞佛所説歡喜奉行七三八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上説差別者此七覺分修習多修習當得二果得現法智有餘涅槃及阿那含果佛説此經已諸比丘聞佛所説歡喜奉行七三九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上説差別者若比丘修習七覺分多修習已當得四果何等為四謂須陀洹果斯陀含果阿那含果阿羅漢果佛説此經已諸比丘聞佛所説歡喜奉行七四如是我聞一時佛住舍衛國祇樹給孤獨園如上説差別者若比丘修習此七覺分多修習已當得七果何等為七謂現法智有餘涅槃及命終時若不爾者五下分結盡得中般涅槃若不爾者得生般涅槃若不爾者得無行般涅槃若不爾者得有行般涅槃若不爾者得上流般涅槃佛説此經已諸比丘聞佛所説歡喜奉行七四一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘當修不淨觀多修習已當得大果大福利云何修不淨觀多修習已得大果大福利是比丘不淨觀俱念覺分依遠離依無欲依滅向於捨修擇法精進喜猗定捨覺分依遠離依無欲依滅向於捨佛説此經已諸比丘聞佛所説歡喜奉行七四二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若比丘修習隨死念多修習已得大果大福利云何比丘修習隨死念多修習已得大果大福利是比丘修隨死念俱念覺分依遠離依無欲依滅向於捨乃至捨覺分亦如是説佛説此經已諸比丘聞佛所説歡喜奉行七四三如是我聞一時佛住釋氏黃枕邑時衆多比丘晨朝著衣持鉢入黃枕邑乞食時衆多比丘作是念今日太早乞食時未至我等可過外道精舍爾時衆多比丘即入外道精舍與諸外道出家共相問訊慰勞已於一面坐諸外道出家言沙門瞿曇為諸弟子説如是法不斷五蓋惱心慧力羸為障礙分不趣涅槃盡攝其心住四念處心與慈俱無怨無嫉亦無瞋恚廣大無量善修充滿四方四維上下一切世間心與慈俱無怨無嫉亦無瞋恚廣大無量善修習充滿如是修習悲喜捨心俱亦如是説我等亦復為諸弟子作如是説我等與彼沙門瞿曇有何等異所謂俱能説法時衆多比丘聞諸外道出家所説心不喜悅默然不呵從座起去入黃枕邑乞食已還精舍舉衣鉢洗足已詣佛所稽首禮足退坐一面以彼外道出家所説廣白世尊爾時世尊告諸比丘如彼外道出家所説汝等應問修習慈心為何所勝修習悲喜捨心為何所勝如是問時彼諸外道出家心則駭散或説外異事或瞋慢毀呰違背不忍或默然萎熟低頭失辨思惟而住所以者何我不見諸天魔梵沙門婆羅門天人衆中聞我所説隨順樂者唯除如來及聲聞衆者比丘心與慈俱多修習於淨最勝悲心修習多修習空入處最勝喜心修習多修習識入處最勝捨心修習多修習無所有入處最勝佛説此經已諸比丘聞佛所説歡喜奉行七四四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若比丘修習慈心多修習已得大果大福利云何比丘修習慈心得大果大福利是比丘心與慈俱修念覺分依遠離依無欲依滅向於捨乃至修習捨覺分依遠離依無欲依滅向於捨佛説此經已諸比丘聞佛所説歡喜奉行七四五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若比丘修空入處多修習已得大果大福利云何比丘修空入處多修習已得大果大福利是比丘心與空入處俱修念覺分依遠離依無欲依滅向於捨乃至修捨覺分依遠離依無欲依滅向於捨佛説此經已諸比丘聞佛所説歡喜奉行如修空入處如是識入處無所有入處非想非非想入處三經亦如上説七四六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若比丘修習安那般那念多修習已得大果大福利云何修習安那般那念多修習已得大果大福利是比丘心與安那般那念俱修念覺分依遠離依無欲依滅向於捨乃至修捨覺分依遠離依無欲依滅向於捨佛説此經已諸比丘聞佛所説歡喜奉行七四七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若比丘修無常想多修習已得大果大福利云何比丘修無常想多修習已得大果大福利是比丘心口與無常想俱修念覺分依遠離依無欲依滅向於捨乃至得捨覺分依遠離依無欲依滅向於捨佛説此經已諸比丘聞佛所説歡喜奉行如無常想如是無常苦想苦無我想觀食想一切世間不可樂想盡想斷想無欲想滅想患想不淨想青瘀想膿潰想膖脹想壞想食不盡想血想分離想骨想空想一一經如上説
