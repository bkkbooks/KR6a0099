  - {type: variant, offset: 8164, length: 106, content: 此經此卷，國、宋二本文義全同，皆有十九經，總二十五紙。丹本有十五經，若依宋藏式【CB】【麗-CB】，或【大】式K18n0650_p0746b08或寫之，可成二十七紙。又其文義與國、宋二本全別，未知去取。今撿國、宋本經，則下流函中，此經第四十二卷耳。宋藏錯將彼卷重刊于此，為初四卷，國亦仍之者，錯也！故令去彼，取此丹本經焉, 宋: '', 元: '', 明: ''}
