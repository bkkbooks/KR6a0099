body:
  text: 宋天竺三藏求那跋陀羅譯一六二如是我聞一時佛住舍衛國祇樹給孤獨園時有尊者善生新剃鬚髮著袈裟衣正信非家出家學道來詣佛所稽首佛足退坐一面爾時世尊告諸比丘諸比丘當知此善生善男子有二處端嚴一者剃除鬚髮著袈裟衣正信非家出家學道二者盡諸有漏無漏心解脫慧解脫現法自知作證我生已盡梵行已立所作已作自知不受後有爾時世尊即説偈言寂靜盡諸漏比丘莊嚴好離欲斷諸結涅槃不復生持此最後身摧伏魔怨敵佛説此經已諸比丘聞佛所説歡喜奉行一六三如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘形色醜陋難可觀視為諸比丘之所輕慢來詣佛所爾時世尊四衆圍繞見彼比丘來皆起輕想更相謂言彼何等比丘隨路而來形貌醜陋難可觀視為人所慢爾時世尊知諸比丘心之所念告諸比丘汝等見彼比丘來形狀甚醜難可視見令人起慢不諸比丘白佛唯然已見佛告諸比丘汝等勿於彼比丘起於輕想所以者何彼比丘已盡諸漏所作已作離諸重擔斷諸有結正智心善解脫諸比丘汝等莫妄量於人唯有如來能量於人彼比丘詣佛所稽首佛足退坐一面爾時世尊復告諸比丘汝等見此比丘稽首作禮退坐一面不比丘白佛唯然已見佛告諸比丘汝等勿於是比丘起於輕想乃至汝等莫量於人唯有如來能知人耳爾時世尊即説偈言飛鳥及走獸莫不畏師子唯師子獸王無有與等者如是智慧人雖小則為大莫取其身相而生輕慢心何用巨大身多肉而無慧此賢勝智慧則為上士夫離欲斷諸結涅槃永不生持此最後身摧伏衆魔軍佛説此經已諸比丘聞佛所説歡喜奉行一六四如是我聞一時佛住王舍城迦蘭陀竹園爾時提婆達多有利養起摩竭陀王阿闍世毗提希子日日侍從五百乘車來詣提婆達多所日日持五百釜食供養提婆達多提婆達多將五百人別衆受其供養時有衆多比丘晨朝著衣持鉢入王舍城乞食聞提婆達多有如是利養起乃至五百人別衆受其供養乞食已還精舍舉衣鉢洗足畢往詣佛所稽首佛足退坐一面白佛言世尊我等晨朝著衣持鉢入王舍城乞食聞提婆達多有如是利養起乃至五百人別衆受其供養佛告諸比丘汝等莫稱是提婆達多所得利養所以者何彼提婆達多別受利養今則自壞他世亦壞譬如芭蕉竹蘆生果即死來年亦壞提婆達多亦復如是受其利養今世則壞他世亦壞譬如駏驉受胎必死提婆達多亦復如是受諸利養今世亦壞他世亦壞彼愚癡提婆達多隨幾時受其利養當得長夜不饒益苦是故諸比丘當如是學我設有利養起莫生染著爾時世尊即説偈言芭蕉生果死竹蘆實亦然駏驉坐妊死士以貪自喪常行非義行多知不免愚善法日損減莖枯根亦傷佛説此經已諸比丘聞佛所説歡喜奉行一六五如是我聞一時佛住舍衛國祇樹給孤獨園爾時舍衛國有手比丘是釋氏子在舍衛國命終時有衆多比丘晨朝著衣持鉢入舍衛城乞食聞手比丘釋子於舍衛國命終聞已入舍衛城乞食還舉衣鉢洗足畢詣佛所稽首佛足退坐一面白佛言世尊今日晨朝衆多比丘著衣持鉢入舍衛城乞食聞釋氏子手比丘於舍衛國命終云何世尊手比丘命終當生何處云何受生後世云何佛告諸比丘是手比丘成就三不善法彼命終當生惡趣泥犁中何等三不善法謂貪欲瞋恚愚癡此三不善法結縛於心釋種子手比丘生惡趣泥犁中爾時世尊即説偈言貪欲瞋恚癡結縛士夫心內發還自傷猶如竹蘆實無貪恚癡心是説為黠慧內發不自傷是名為勝出是故當離貪瞋恚癡冥心比丘智慧明苦盡般涅槃佛説此經已諸比丘聞佛所説歡喜奉行一六六如手比丘難陀修多羅亦如是説一六七如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者難陀是佛姨母子好著好衣染色搗治光澤執持好鉢好作嬉戲調笑而行時有衆多比丘來詣佛所稽首佛足退坐一面白佛言世尊尊者難陀是佛姨母子好著好衣搗治光澤執持好鉢好作嬉戲調笑而行爾時世尊告一比丘汝往詣難陀比丘所語言難陀大師語汝時彼比丘受世尊教往語難陀言世尊語汝難陀聞已即詣佛所稽首佛足退住一面佛告難陀汝實好著好衣搗治光澤好作嬉戲調笑而行不難陀白佛實爾世尊佛告難陀汝佛姨母子貴姓出家不應著好衣服搗令光澤執持好鉢好作嬉戲調笑而行汝應作是念我是佛姨母子貴姓出家應作阿練若乞食著糞掃衣常應讚歎著糞掃衣常處山澤不顧五欲爾時難陀受佛教已修阿蘭若行乞食著糞掃衣亦常讚歎著糞掃衣者樂處山澤不顧愛欲爾時世尊即説偈言難陀何見汝修習阿蘭若家家行乞食身著糞掃衣樂處於山澤不顧於五欲佛説此經已尊者難陀聞佛所説歡喜奉行一六八如是我聞一時佛在舍衛國祇樹給孤獨園爾時尊者低沙自念我是世尊姑子兄弟故不修恭敬無所顧録亦不畏懼不堪諫止時有衆多比丘往詣佛所稽首佛足退坐一面白佛言世尊尊者低沙自念是世尊姑子兄弟故不修恭敬無所顧録亦不畏懼不堪諫止爾時世尊告一比丘汝往詣低沙比丘所語言低沙大師語汝時彼比丘受世尊教往語低沙比丘言世尊語汝低沙比丘即詣佛所稽首佛足退住一面佛告低沙汝實作是念我是世尊姑子兄弟不修恭敬無所顧録亦不畏懼不堪忍諫不低沙白佛實爾世尊佛告低沙汝不應爾汝應念言我是世尊姑子兄弟故應修恭敬畏懼堪忍諫止爾時世尊即説偈言善哉汝低沙離瞋恚為善莫生瞋恚心瞋恚者非善若能離瞋慢修行軟下心然後於我所修行於梵行佛説此經已低沙比丘聞佛所説歡喜隨喜作禮而去一六九如是我聞一時佛住舍衛國祇樹給孤獨園時有尊者毗舍佉般闍梨子集供養堂為衆多比丘説法言辭滿足妙音清徹句味辨正隨智慧説聽者樂聞無所依説顯現深義令諸比丘一心專聽爾時世尊入晝正受以淨天耳過於人耳聞説法聲從三昧起往詣講堂於大衆前坐告毗舍佉般闍梨子善哉善哉毗舍佉汝能為諸比丘於此供養堂為衆多比丘説法言辭滿足乃至顯現深義令諸比丘專精敬重一心樂聽汝當數數為諸比丘如是説法令諸比丘專精敬重一心樂聽當得長夜以義饒益安隱樂住爾時世尊即説偈言若不説法者愚智雜難分此愚此智慧無由自顯現善説清涼法因説智乃彰説法為明照光顯大仙幢善説為仙幢法為羅漢幢佛説此經已尊者毗舍佉般闍梨子聞佛所説歡喜隨喜作禮而去一七如是我聞一時佛住舍衛國祇樹給孤獨園時有衆多比丘集供養堂悉共作衣時有一年少比丘出家未久初入法律不欲營助諸比丘作衣時衆多比丘詣世尊所稽首禮足退坐一面白佛言世尊時有衆多比丘集供養堂為作衣故有一年少比丘出家未久始入法律不欲營助諸比丘作衣爾時世尊問彼比丘汝實不欲營助諸比丘作衣耶彼比丘白佛言世尊隨我所能當力營助爾時世尊知彼比丘心之所念告諸比丘汝等莫與是年少比丘語所以者何是比丘得四增心法正受現法安樂住不勤而得若彼本心所為剃鬚髮著袈裟衣出家學道增進修學現法自知作證我生已盡梵行已立所作已作自知不受後有爾時世尊即説偈言非下劣方便薄德少智慧正向於涅槃免脫煩惱鎖此賢年少者逮得上士處離欲心解脫涅槃不復生持此最後身摧伏衆魔軍佛説此經已諸比丘聞佛所説歡喜奉行一七一如是我聞一時佛住舍衛國祇樹給孤獨園時有比丘名曰上坐獨住一處亦常讚歎獨一住者獨行乞食食已獨還獨坐禪思時有衆多比丘詣佛所稽首佛足退坐一面白佛言世尊有尊者名曰上坐樂一獨處亦常讚歎獨一住者獨入聚落乞食獨出聚落還至住處獨坐禪思爾時世尊語一比丘汝往詣彼上坐比丘所語上坐比丘言大師告汝比丘受教詣上坐比丘所白言尊者大師告汝時上坐比丘即時奉命詣世尊所稽首禮足退住一面爾時世尊告上坐比丘汝實獨一靜處讚歎獨處者獨行乞食獨出聚落獨坐禪思耶上坐比丘白佛實爾世尊佛告上坐比丘汝云何獨一處讚歎獨住者獨行乞食獨還住處獨坐禪思上坐比丘白佛我唯獨一靜處讚歎獨住者獨行乞食獨出聚落獨坐禪思佛告上坐比丘汝是一住者我不言非一住然更有勝妙一住何等為勝妙一住謂比丘前者枯乾後者滅盡中無貪喜是婆羅門心不猶豫已捨憂悔離諸有愛群聚使斷是名一住無有勝住過於此者爾時世尊即説偈言悉映於一切悉知諸世間不著一切法悉離一切愛如是樂住者我説為一住佛説此經已尊者上坐聞佛所説歡喜隨喜作禮而去一七二如是我聞一時佛在舍衛國祇樹給孤獨園時有尊者僧迦藍於拘薩羅人間遊行至舍衛國祇樹給孤獨園彼僧迦藍比丘有本二在舍衛國中聞僧迦藍比丘於拘薩羅人間遊行至舍衛國祇樹給孤獨園聞已著好衣服莊嚴華瓔抱其兒來詣祇洹至僧迦藍比丘房前爾時尊者僧迦藍出房露地經行時彼本二來到其前作是言此兒幼小汝捨出家誰當養活時僧迦藍比丘不共語如是再三亦不共語時彼本二作如是言我再三告不與我語不見顧視我今置兒著經行道頭而去言沙門此是汝子汝自養活我今捨去尊者僧迦藍亦不顧視其子彼本二復言是沙門今於此兒都不顧視彼必得仙人難得之處善哉沙門必得解脫情願不遂抱子而去爾時世尊入晝正受以天耳過人之耳聞尊者僧迦藍本二所説即説偈言來者不歡喜去亦不憂戚於世間和合解脫不染著我説彼比丘為真婆羅門來者不歡喜去亦不憂戚不染亦無憂二心俱寂靜我説是比丘是真婆羅門佛説此經已尊者僧迦藍聞佛所説歡喜隨喜作禮而去一七三如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者阿難獨一靜處作是思惟有三種香順風而熏不能逆風何等為三謂根香莖香華香或復有香順風熏亦逆風熏亦順風逆風熏耶作是念已晡時從禪覺往詣佛所稽首佛足退住一面白佛言世尊我獨一靜處作是思惟有三種香順風而熏不能逆風何等為三謂根香莖香華香或復有香順風熏逆風熏亦順風逆風熏耶佛告阿難如是如是有三種香順風熏不能逆風謂根香莖香華香阿難亦有香順風熏逆風熏順風逆風熏阿難順風熏逆風熏順風逆風熏者阿難有善男子善女人在所城邑聚落成就真實法盡形壽不殺生不偷盜不邪淫不妄語不飲酒如是善男子善女人八方上下崇善士夫無不稱歎言某方某聚落善男子善女人持戒清淨成真實法盡形壽不殺乃至不飲酒阿難是名有香順風熏逆風熏順風逆風熏爾時世尊即説偈言非根莖華香能逆風而熏唯有善士女持戒清淨香逆順滿諸方無不普聞知多迦羅栴檀優鉢羅末利如是比諸香戒香最為上栴檀等諸香所熏少分限唯有戒德香流熏上升天斯等淨戒香不放逸正受正智等解脫魔道莫能入是名安隱道是道則清淨正向妙禪定斷諸魔結縛佛説此經已尊者阿難聞佛所説歡喜隨喜作禮而去一七四如是我聞一時佛在摩竭提國人間遊行與千比丘俱皆是古昔縈髮出家皆得阿羅漢諸漏已盡所作已作捨諸重擔逮得己利盡諸有結正智善解脫到善建立支提杖林中住摩竭提王瓶沙聞世尊摩竭提國人間遊行至善建立支提杖林中住與諸小王群臣羽從車萬二千乘馬萬八千步逐衆無數摩竭提婆羅門長者悉皆從王出王舍城詣世尊所恭敬供養到於道口下車步進及於內門除去五飾脫冠却蓋除扇去劍刀脫革屣到於佛前整衣服偏露右肩為佛作禮右繞三匝自稱姓名白佛言世尊我是摩竭提王瓶沙佛告瓶沙如是大王汝是瓶沙可就此坐隨其所安時瓶沙王重禮佛足退坐一面諸王大臣婆羅門居士悉禮佛足次第而坐時鬱鞞羅迦葉亦在座中時摩竭提婆羅門長者作是念為大沙門從鬱鞞羅迦葉所修梵行耶為鬱鞞羅迦葉於大沙門所修梵行耶爾時世尊知摩竭提婆羅門長者心之所念即説偈而問言鬱鞞羅迦葉於此見何利棄汝先所奉事火等衆事今可説其義捨事火之由鬱鞞迦葉説偈白佛錢財等滋味女色五欲果觀察未來受斯皆大垢穢是故悉棄捨先諸奉火事爾時世尊復説偈問言汝不著世間錢財五色味復何捨天人迦葉隨義説迦葉復以偈答世尊言見道離有餘寂滅無餘迹無所有不著無異趣異道是故悉棄捨先修奉火事大會等受持奉事於水火愚癡沒於中志求解脫道盲無智慧目向生老病死不見於正路永離生死道今始因世尊得見無為道大龍所説力得度於彼岸牟尼廣濟度安慰無量衆今始知瞿曇真諦超出者佛復説偈歎迦葉言善哉汝迦葉先非惡思量次第分別求遂至於勝處汝今迦葉當安慰汝徒衆之心時鬱鞞羅迦葉即入正受以神足力向於東方上升虛空作四種神變行住坐臥入火三昧舉身洞然青黃赤白頗梨紅色身上出水身下出火還燒其身身上出水以灌其身或身上出火以燒其身身下出水以灌其身如是種種現化神通息已稽首佛足白佛言世尊佛是我師我是弟子佛告迦葉我是汝師汝是弟子隨汝所安復座而坐時鬱鞞羅迦葉還復故坐爾時摩竭提婆羅門長者作是念鬱鞞羅迦葉定於大沙門所修行梵行佛説此經已摩竭提王瓶沙及諸婆羅門長者聞佛所説歡喜隨喜作禮而去一七五如是我聞一時佛住王舍城迦蘭陀竹園時有陀驃摩羅子舊住王舍城典知衆僧飲食床座隨次差請不令越次時有慈地比丘頻三過次得粗食處食時辛苦作是念怪哉大苦陀驃摩羅子比丘有情故以粗食惱我令我食時極苦我當云何為其作不饒益事時慈地比丘有姊妹比丘尼名蜜多羅住王舍城王園比丘尼衆中蜜多羅比丘尼來詣慈地比丘稽首禮足於一面住慈地比丘不顧眄不與語蜜多羅比丘尼語慈地比丘阿梨何故不見顧眄不共言語慈地比丘言陀驃摩羅子比丘數以粗食惱我令我食時極苦汝復棄我比丘尼言當如何慈地比丘言汝可至世尊所白言世尊陀驃摩羅子比丘非法不類共我作非梵行波羅夷罪我當證言如是世尊如妹所説比丘尼言阿梨我當云何於梵行比丘所以波羅夷謗慈地比丘言汝若不如是者我與汝絶不復來往言語共相瞻視時比丘尼須臾默念而作是言阿梨欲令我爾當從其教慈地比丘言汝且待我先至世尊所汝隨後來時慈地比丘即往稽首禮世尊足退住一面蜜多羅比丘尼即隨後至稽首佛足退住一面白佛言世尊一何不善不類陀驃摩羅子於我所作非梵行波羅夷罪慈地比丘復白佛言如妹所説我先亦知爾時陀驃摩羅子比丘即在彼大衆中爾時世尊告陀驃摩羅子比丘汝聞此語不陀驃摩羅子比丘言已聞世尊佛告陀驃摩羅子比丘汝今云何陀驃摩羅子白佛如世尊所知如善逝所知佛告陀驃摩羅子汝言如世尊所知今非是時汝今憶念當言憶念不憶念當言不憶念陀驃摩羅子言我不自憶念爾時尊者羅睺羅住於佛後執扇扇佛白佛言世尊不善不類是比丘尼言尊者陀驃摩羅子共我作非梵行慈地比丘言如是世尊我先已知如妹所説佛告羅睺羅我今問汝隨意答我若蜜多羅比丘尼來語我言世尊不善不類羅睺羅共我作非梵行波羅夷罪慈地比丘復白我言如是世尊如妹所説我先亦知者汝當云何羅睺羅白佛世尊我若憶念當言憶念不憶念當言不憶念佛言羅睺羅愚癡人汝尚得作此語陀驃摩羅子清淨比丘何以不得作如是語爾時世尊告諸比丘於陀驃摩羅子比丘當憶念蜜多羅比丘尼當以自言滅慈地比丘僧當極善呵諫教誡汝云何見何處見汝何因往見世尊如是教已從座起入室坐禪爾時諸比丘於陀驃摩羅子比丘憶念蜜多羅比丘尼與自言滅慈地比丘極善呵諫教誡言汝云何見何處見何因往見如是諫時彼作是言彼陀驃摩羅子不作非梵行不犯波羅夷然陀驃摩羅子比丘三以粗惡食恐怖令我食時辛苦我於陀驃摩羅子比丘愛恚癡怖故作是説然陀驃摩羅子清淨無罪爾時世尊晡時從禪覺至大衆前敷座而坐諸比丘白佛言世尊我等於陀驃摩羅子比丘所憶念持蜜多羅比丘尼與自言滅慈地比丘極善呵諫乃至彼言陀驃摩羅子清淨無罪爾時世尊告諸比丘云何愚癡以因飲食故知而妄語爾時世尊即説偈言若能捨一法知而故妄語不計於後世無惡而不為寧食熱鐵丸如熾然炭火不以犯禁戒而食僧信施佛説此經已諸比丘聞佛所説歡喜奉行一七六如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者陀驃摩羅子詣佛所稽首佛足退住一面白佛言世尊我願於佛前取般涅槃世尊默然如是三啓佛告陀驃摩羅子此有為諸行法應如是爾時尊者陀驃摩羅子即於佛前入於三昧如其正受向於東方升虛空行現四威儀行住坐臥入火三昧身下出火舉身洞然光焰四布青黃赤白頗梨紅色身下出火還燒其身身上出水以灑其身或身上出火下燒其身身下出水上灑其身周向十方種種現化已即於空中內身出火還自焚其身取無餘涅槃消盡寂滅令無遺塵譬如空中然燈油炷俱盡陀驃摩羅子空中涅槃身心俱盡亦復如是爾時世尊即説偈言譬如燒鐵丸其焰洞熾然熱勢漸息滅莫知其所歸如是等解脫度煩惱淤泥諸流永已斷莫知其所之逮得不動迹入無餘涅槃佛説此經已諸比丘聞佛所説歡喜奉行一七七如是我聞一時佛在央瞿多羅國人間遊行經陀婆闍梨迦林中見有牧牛者牧羊者採柴草者及餘種種作人見世尊行路見已皆白佛言世尊莫從此道去前有央瞿利摩羅賊脫恐怖人佛告諸人我不畏懼作此語已從道而去彼再三告世尊猶去遙見央瞿利摩羅手執刀楯走向世尊以神力現身徐行令央瞿利摩羅駃走不及走極疲乏已遙語世尊住住勿去世尊並行而答我常住耳汝自不住爾時央瞿利摩羅即説偈言沙門尚駃行而言我常住我今疲倦住説言汝不住沙門説云何我住汝不住爾時世尊以偈答言央瞿利摩羅我説常住者於一切衆生謂息於刀杖汝恐怖衆生惡業不休息我於一切蟲止息於刀杖汝於一切蟲常逼迫恐怖造作凶惡業終無休息時我於一切神止息於刀杖汝於一切神長夜苦逼迫造作黑惡業于今不止息我住於息法一切不放逸汝不見四諦故不息放逸央瞿利摩羅説偈白佛久乃見牟尼故隨路而逐今聞真妙説當捨久遠惡作如是説已即放捨刀楯投身世尊足願聽我出家佛以慈悲心大仙多哀愍告比丘善來出家受具足爾時央瞿利摩羅出家已獨一靜處專精思惟所以族姓子剃除鬚髮著袈裟衣正信非家出家學道增修梵行現法自知作證我生已盡梵行已立所作已作自知不受後有時央瞿利摩羅得阿羅漢覺解脫喜樂即説偈言本受不害名而中多殺害今得見諦名永離於傷殺身行不殺害口意俱亦然當知真不殺不迫於衆生洗手常血色名央瞿摩羅浚流之所漂三歸制令息歸依三寶已出家得具足成就於三明佛教作已作調牛以捶杖伏象以鐵鈎不以刀捶杖正度調天人利刀以水石直箭以熅火治材以斧斤自調以黠慧人前行放逸隨後能自斂是則照世間如雲解月現人前放逸行隨後能自斂於世恩愛流正念而超出少壯年出家精勤修佛教是則照世間如雲解月現少壯年出家精勤修佛教於世恩愛流正念以超出若度諸惡業正善能令滅是則照世間如雲解月現人前造惡業正善能令滅於世恩愛流正念能超出我已作惡業必向於惡趣已受於惡報宿責食已食若彼我怨憎聞此正法者得清淨法眼於我修行忍不復興鬪訟蒙佛恩力故我怨行忍辱亦常讚歎忍隨時聞正法聞已隨修行佛説此經已央瞿利摩羅聞佛所説歡喜奉行一七八如是我聞一時佛住王舍城迦蘭陀竹園時有異比丘於夜明相出時出拓補河邊脫衣著岸邊入水洗浴浴已上岸被一衣待身乾時有一天子放身光明普照拓補河側語比丘言汝少出家鮮白髮黑年始盛美應習五欲莊嚴瓔珞塗香華鬘五樂自娛而於是時違親背俗悲泣別離剃除鬚髮著袈裟衣正信非家出家學道如何捨現前樂而求非時之利比丘答言我不捨現前樂求非時樂我今乃是捨非時樂得現前樂天問比丘云何捨非時樂得現前樂比丘答言如世尊説非時之欲少味多苦少利多難我今於現法中已離熾然不待時節能自通達現前觀察緣自知覺如是天子是名捨非時樂得現前樂天復問比丘云何復是如來所説非時之欲少樂多苦云何復是如來所説現法利樂乃至緣自覺知比丘答言我年少出家不能廣宣如來所説正法律儀世尊近在迦蘭陀竹園汝可往詣如來問其所疑如世尊説隨憶受持天子復言比丘於如來所有諸力天衆多圍繞我先無問未易可詣比丘汝若能為先白世尊者我可隨往比丘答言當為汝去天白比丘唯然尊者我隨後來時彼比丘往詣佛所稽首禮足退住一面以向天子往反問答具白世尊今者世尊彼天子誠實言者須臾應至不誠實者自當不來時彼天子遙語比丘我已在此我已在此爾時世尊即説偈言衆生隨愛想以愛想而住以不知愛故則為死方便佛告天子汝解此偈者便可發問天子白佛不解世尊不解善逝佛復説偈而告天子曰若知所愛者不於彼生愛彼此無所有他人莫能説佛告天子汝解此義者便可發問天子白佛不解世尊不解善逝佛復説偈言見等勝劣者則有言論生三事不傾動則無軟中上佛告天子解此義者則可發問天子白佛不解世尊不解善逝佛復説偈言斷愛及名色除慢無所繫寂滅息瞋恚離結絶悕望不見於人天此世及他世佛告天子解此義者乃可發問天子白佛已解世尊已解善逝佛説此經已彼天子聞佛所説歡喜隨喜即沒不現一七九如是我聞一時佛在王舍城迦蘭陀竹園時有異比丘於後夜時至拓補河邊脫衣置岸邊入水洗浴浴已還上岸著一衣待身乾時有一天子放身光明普照拓補河側問比丘言比丘比丘此是丘冢夜則起煙晝則火然彼婆羅門見已而作是言壞此丘冢發掘者智持以刀劍又見大龜婆羅門見已作是言除此大龜發掘者智持以刀劍見有氍氀婆羅門見已作此言却此氍氀發掘者智持以刀劍見有肉段彼婆羅門見已作是言除此肉段發掘者智持以刀劍見有屠殺婆羅門見已作是言壞是屠殺處發掘者智持以刀劍見有楞耆彼婆羅門見已作是言却此楞耆發掘者智持以刀劍見有二道彼婆羅門見已作是言除此二道發掘者智持以刀劍見有門扇婆羅門見已作是言却此門扇發掘者智持以刀劍見有大龍婆羅門見已作是言止勿却大龍應當恭敬比丘汝來受此論往問世尊如佛所説汝隨受持所以者何除如來我不見世間諸天魔梵沙門婆羅門於此論心悅樂者若諸弟子從我所聞然後能説爾時比丘從彼天所聞此論已往詣世尊稽首禮足退坐一面以彼天子所問諸論廣問世尊云何為丘冢云何為夜則起煙云何為晝則火然云何是婆羅門云何發掘云何智者云何刀劍云何為大龜云何氍氀云何為肉段云何為屠殺處云何為楞耆云何為二道云何為門扇云何為大龍佛告比丘丘冢者謂衆生身粗四大色父母遺體摶食衣服覆蓋澡浴摩飾長養皆是變壞磨滅之法夜起煙者謂有人於夜時起隨覺隨觀晝行其教身業口業婆羅門者謂如來應等正覺發掘者謂精勤方便智士者謂多聞聖弟子刀劍者謂智慧刀劍大龜者謂五蓋氍氀者謂忿恨肉段者謂慳愱屠殺者謂五欲功德楞耆者謂無明二道謂疑惑門扇者謂我慢大龍者謂漏盡羅漢如是比丘若大師為聲聞所作哀愍悲念以義安慰於汝已作汝等當作所作當於曝露林中空舍山澤巖窟敷草樹葉思惟禪思不起放逸莫令後悔是則為我隨順之教即説偈言説身為丘冢覺觀夜起煙晝業為火然婆羅門正覺精進勤發掘黠慧明智士以智慧利劍厭離勝進者五蓋為巨龜忿恨為氍氀慳愱為肉段五欲屠殺處無明為楞耆疑惑於二道門扇現我慢漏盡羅漢龍究竟斷諸論故我如是説佛説此經已彼比丘聞佛所説歡喜奉行一八如是我聞一時佛住波羅㮈國仙人住處鹿野苑中爾時世尊晨朝著衣持鉢入波羅㮈城乞食時有異比丘以不住心其心惑亂不攝諸根晨朝著衣持鉢入波羅㮈城乞食是比丘遙見世尊見已攝持諸根端視而行世尊見是比丘攝持諸根端視而行見已入城乞食畢還精舍舉衣鉢洗足已入室坐禪晡時從禪覺入僧中敷坐具於大衆前坐告諸比丘我今晨朝著衣持鉢入波羅㮈城乞食見有比丘以不住心惑亂心諸根放散亦持衣鉢入城乞食彼遙見我即自斂攝竟為是誰時彼比丘從座起整衣服到於佛前偏袒右肩合掌白佛世尊我於晨朝入城乞食其心惑亂不攝諸根行遙見世尊即自斂心攝持諸根佛告比丘善哉善哉汝見我已能自斂心攝持諸根比丘是法應當如是若見比丘亦應自攝持若復見比丘尼優婆塞優婆夷亦當如是攝持諸根當得長夜以義饒益安隱快樂爾時衆中復有異比丘説偈歎曰以其心迷亂不專繫念住晨朝持衣鉢入城邑乞食中路見大師威德容儀備欣悅生慚愧即攝持諸根佛説此經已諸比丘聞佛所説歡喜奉行
