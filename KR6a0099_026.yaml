如來所起信心深入堅固諸天魔梵沙門婆羅門及餘同法所不能壞是名信力何等為精進力謂四正斷如上廣說何等為慚力謂恥惡不善法如上說何等為愧力於可愧事愧愧起惡不善法如上說何等為念力謂四念處如上說何等為定力謂四禪如上說何等為慧力謂四聖諦如上說佛說此經已諸比丘聞佛所說歡喜奉行六九二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有八力何等為八謂自在王者力斷事大臣力結恨女人力啼泣嬰兒力毀呰愚人力審諦𭶑慧力忍辱出家力計數多聞力佛說此經已諸比丘聞佛所說歡喜奉行六九三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者謂自在王力者王者現自在威力斷事大臣力者大臣現斷事之力結恨女人力者女人之法現結恨力啼泣嬰兒力者嬰兒之法現啼泣力毀呰愚人力者愚人之法觸事毀呰審諦𭶑慧力者智慧之人常現審諦忍辱出家力者出家之人常現忍辱計數多聞力者多聞之人常現思惟計數佛說此經已諸比丘聞佛所說歡喜奉行六九四如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者舍利弗詣世尊所稽首禮足退坐一面白佛言世尊漏盡比丘有幾力佛告舍利弗漏盡比丘有八力何等為八謂漏盡比丘心順趣於離流注於離浚輸於離順趣於出流注於出浚輸於出順趣涅槃流注涅槃浚輸涅槃若見五欲猶見火坑如是見已於欲念欲受欲著心不永住修四念處四正斷四如意足五根五力七覺分八聖道分佛說此經已尊者舍利弗聞佛所說歡喜奉行六九五如尊者舍利弗問經如是異比丘問佛六九六問諸比丘經亦如上說六九七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有九力何等為九力謂信力精進力慚力愧力念力定力慧力數力修力佛說此經已諸比丘聞佛所說歡喜奉行六九八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有九力何等為九謂信力精進力慚力愧力念力定力慧力數力修力何等為信力於如來所起正信心深入堅固如上說何等為精進力謂四正斷如上說何等為慚力如上說何等為愧力如上說何等為念力謂內身身觀住如上說何等為定力謂四禪何等為慧力謂四聖諦何等為數力謂聖弟子若於間房樹下作如是學身口惡行者於現法後世當受惡報如上廣說何等為修力謂修四念處如前說佛說此經已諸比丘聞佛所說歡喜奉行六九九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有十力何等為十自在王者力斷事大臣力機關工巧力刀劍賊盜力怨恨女人力啼泣嬰兒力毀呰愚人力審諦𭶑慧力忍辱出家力計數多聞力佛說此經已諸比丘聞佛所說歡喜奉行七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者謂自在王力者王者現自在威力斷事大臣力者大臣現斷事之功力機關工巧力造機關者現其工巧力刀劍盜賊力盜賊必現刀劍力計數多聞力者凡思惟計數現多聞之力佛說此經已諸比丘聞佛所說歡喜奉行七一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有十種如來力若此力成就如來應等正覺得先佛最勝處能轉梵輪於大衆中師子吼而吼何等為十謂如來處非處如實知是名初力乃至漏盡如上說佛說此經已諸比丘聞佛所說歡喜奉行七二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者若有來問如來處非處智力如如來處非處智力所知所見所覺成等正覺為彼記說如是乃至漏盡智力廣說如上佛說此經已諸比丘聞佛所說歡喜奉行七三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若所有法彼彼意解作證悉皆如來無畏智所生若比丘來為我聲聞不諂不僞質直心生我則教誡教授為其說法晨朝為彼教誡教授說法至日中時得勝進處若日暮時為彼教誡教授說法至晨朝時得勝進處如是教授已彼生正直心實則知實不實知不實上則知上無上則知無上當知當見當得當覺者皆悉了知斯有是處謂五學力十種如來力何等為五學力謂信力精進力念力定力慧力如來十種力何等為十謂是處如實知非處如上十力廣說若有來問處非處智力者如如來處非處智等正覺所知所見所覺為彼記說乃至漏盡智力亦如是說諸比丘處非處智力者我說是定非不定乃至漏盡智者我說是定非不定定者正道非定者邪道佛說此經已諸比丘聞佛所說歡喜奉行七四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若不正思惟者未起貪欲蓋則起已起貪欲蓋重生令增廣未起瞋恚睡眠掉悔疑蓋則起已起瞋恚睡眠掉悔疑蓋重生令增廣未起念覺支不起已起念覺支則退未起擇法精進猗喜定捨覺支不起已起擇法精進猗喜定捨覺支則退若比丘正思惟者未起貪欲蓋不起已起貪欲蓋令滅未起瞋恚睡眠掉悔疑蓋不起已起瞋恚睡眠掉悔疑蓋則斷未起念覺支則起已起者重生令增廣未起擇法精進猗喜定捨覺支則起已起者重生令增廣佛說此經已諸比丘聞佛所說歡喜奉行七五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五退法何等為五謂貪欲瞋恚睡眠掉悔疑蓋是則退法若修習七覺支多修習令增廣是則不退法何等為七謂念覺支擇法覺支精進覺支猗覺支喜覺支定覺支捨覺支是名不退法佛說此經已諸比丘聞佛所說歡喜奉行七六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五法能為黑暗能為無目能為無智能羸智慧非明非等覺不轉趣涅槃何等為五謂貪欲瞋恚睡眠掉悔疑如此五法能為黑暗能為無目能為無智非明非正覺不轉趣涅槃若有七覺支能作大明能為目增長智慧為明為正覺轉趣涅槃何等為七謂念覺支擇法覺支精進覺支猗覺支喜覺支定覺支捨覺支為明為目增長智慧為明為正覺轉趣涅槃佛說此經已諸比丘聞佛所說歡喜奉行七七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五障五蓋煩惱於心能羸智慧障閡之分非明非正覺不轉趣涅槃何等為五謂貪欲蓋瞋恚蓋睡眠蓋掉悔蓋疑蓋如此五蓋為覆為蓋煩惱於心令智慧羸為障閡分非明非等覺不轉趣涅槃若七覺支非覆非蓋不惱於心增長智慧為明為正覺轉趣涅槃何等為七謂念覺支等如上說乃至捨覺支如此七覺支非翳非蓋不惱於心增長智慧為明為正覺轉趣涅槃爾時世尊即說偈曰貪欲瞋恚蓋睡眠掉悔疑如此五種蓋增長諸煩惱此五覆世間深著難可度障蔽於衆生令不見正道若得七覺支則能為照明唯此真諦言等正覺所說念覺支為首擇法正思惟精進猗喜覺三昧捨覺支如此七覺支牟尼之正道隨順大仙人脫生死怖畏佛說此經已諸比丘聞佛所說歡喜奉行七八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若族姓子捨諸世務出家學道剃除鬚髮著袈裟正信非家出家學道如是出家而於其中有愚癡士夫依止聚落城邑晨朝著衣持鉢入村乞食不善護身不守根門不攝其念觀察女人少壯好色而生染著不正思惟心馳取相趣色欲想為欲心熾盛燒心燒身返俗還戒而自退沒厭離俗務出家學道而反染著增諸罪業而自破壞沈翳沒溺有五種大樹其種至微而樹生長巨大而能映障衆雜小樹蔭翳萎悴不得生長何等五謂揵遮耶樹迦捭多羅樹阿濕波他樹優曇鉢羅樹尼拘留他樹如是五種心樹種子至微而漸漸長大蔭覆諸節能令諸節蔭覆墮臥何等為五謂貪欲蓋漸漸增長睡眠掉悔疑蓋漸漸增長以增長故令善心蔭覆墮臥若修習七覺支多修習已轉成不退何等為七謂念覺支擇法精進猗喜定捨覺支如是七覺支修習多修習已轉成不退轉佛說此經已諸比丘聞佛所說歡喜奉行七九如是我聞一時佛住舍衛國祇樹給孤獨園若比丘專一其心側聽正法能斷五法修習七法令其轉進滿足何等為斷五法謂貪欲蓋瞋恚蓋睡眠蓋掉悔蓋疑蓋是名五法斷何等修習七法謂念覺支擇法覺支精進覺支猗覺支喜覺支定覺支捨覺支修此七法轉進滿足佛說此經已諸比丘聞佛所說歡喜奉行七一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘聖弟子清淨信心專精聽法者能斷五法修習七法令其滿足何等為五謂貪欲蓋瞋恚睡眠掉悔疑此蓋則斷何等七法謂念覺支擇法精進猗喜定捨覺支此七法修習滿足淨信者謂心解脫智者謂慧解脫貪欲染心者不得不樂無明染心者慧不清淨是故比丘離貪欲者心解脫離無明者慧解脫若彼比丘離貪欲心解脫得身作證離無明慧解脫是名比丘斷愛縛結慢無間等究竟苦邊佛說此經已諸比丘聞佛所說歡喜奉行七一一如是我聞一時佛住王舍城耆闍崛山中時有無畏王子日日步涉仿佯遊行來詣佛所與世尊面相問訊慰勞已退坐一面白佛言世尊有沙門婆羅門作如是見作如是說無因無緣衆生煩惱無因無緣衆生清淨世尊復云何佛告無畏沙門婆羅門為其說不思而說愚癡不辨不善非知思不知量作如是說無因無緣衆生煩惱無因無緣衆生清淨所以者何有因有緣衆生煩惱有因有緣衆生清淨故何因何緣衆生煩惱何因何緣衆生清淨謂衆生貪欲增上於他財物他衆具而起貪言此物於我有者好不離愛樂於他衆生而起恨心凶心計挍欲打欲縛欲伏加諸不道為造衆難不捨瞋恚身睡眠心懈怠心掉動內不寂靜心常疑惑過去疑未來疑現在疑無畏如是因如是緣衆生煩惱如是因如是緣衆生清淨無畏白佛瞿曇一分之蓋足煩惱心況復一切無畏白佛瞿曇何因何緣衆生清淨佛告無畏若婆羅門有一勝念決定成就久時所作久時所說能隨憶念當於爾時習念覺支修念覺已念覺滿足念覺滿足已則於選擇分別思惟爾時擇法覺支修習修擇法覺支已擇法覺支滿足彼選擇分別思量法已則精進方便精進覺支於此修習修精進覺支已精進覺支滿足彼精進方便已則歡喜生離諸食想修喜覺支修喜覺支已則喜覺支滿足喜覺支滿足已身心猗息則修猗覺支修猗覺支已猗覺滿足身猗息已則愛樂愛樂已心定則修定覺支修定覺支已定覺滿足定覺滿足已貪憂滅則捨心生修捨覺支修捨覺支已捨覺支滿足如是無畏此因此緣衆生清淨無畏白瞿曇若一分滿足令衆生清淨況復一切無畏白佛瞿曇當何名此經云何奉持佛告無畏王子當名此為覺支經無畏白佛瞿曇此為最勝覺分瞿曇我是王子安樂亦常求安樂而希出入今來上山四體疲極得聞瞿曇說覺支經悉忘疲勞佛說此已王子無畏聞佛所說歡喜隨喜從座起稽首禮佛足而去
