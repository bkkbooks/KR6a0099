body:
  text: 宋天竺三藏求那跋陀羅譯六四二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有三根未知當知根知根無知根爾時世尊即說偈言覺知學地時隨順直道進精進勤方便善自護其心如自知生盡無礙道已知以知解脫已最後得無知不動意解脫一切有能盡諸根悉具足樂於根寂靜持於最後身降伏衆魔怨佛說此經已諸比丘聞佛所說歡喜奉行六四三如是我聞一時佛在舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根何謂為五謂信根精進根念根定根慧根佛說此經已諸比丘聞佛所說歡喜奉行六四四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根何等為五謂信根精進根念根定根慧根若比丘於此五根如實善觀察如實善觀察者於三結斷知謂身見戒取疑是名須陀洹不墮惡趣法決定正向於正覺七有天人往生究竟苦邊佛說此經已諸比丘聞佛所說歡喜奉行六四五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於此五根如實觀察者不起諸漏心得離欲解脫是名阿羅漢諸漏已盡所作已作離諸重擔逮得己利盡諸有結正智心善解脫佛說此經已諸比丘聞佛所說歡喜奉行六四六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根何等為五謂信根精進根念根定根慧根信根者當知是四不壞淨精進根者當知是四正斷念根者當知是四念處定根者當知是四禪慧根者當知是四聖諦佛說此經已諸比丘聞佛所說歡喜奉行六四七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根何等為五謂信根精進根念根定根慧根何等為信根若比丘於如來所起淨信心根本堅固餘沙門婆羅門諸天魔梵沙門婆羅門及餘世間無能沮壞其心者是名信根何等為精進根已生惡不善法令斷生欲方便攝心增進未生惡不善法不起生欲方便攝心增進未生善法令起生欲方便攝心增進已生善法住不忘修習增廣生欲方便攝心增進是名精進根何等為念根若比丘內身身觀住殷勤方便正念正智調伏世間貪憂外身內外身受心法法觀念住亦如是說是名念根何等為定根若比丘離欲惡不善法有覺有觀離生喜樂乃至第四禪具足住是名定根何等為慧根若比丘苦聖諦如實知苦集聖諦苦滅聖諦苦滅道跡聖諦如實知是名慧根佛說此經已諸比丘聞佛所說歡喜奉行六四八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者若比丘於此五根如實觀察已於三結斷知何等為三謂身見戒取疑是名須陀洹不墮惡趣決定正向三菩提七有天人往生究竟苦邊佛說此經已諸比丘聞佛所說歡喜奉行六四九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者若比丘於此五根如實觀察已得盡諸漏離欲解脫是名阿羅漢諸漏已盡所作已作離諸重擔逮得己利盡諸有結正智心得解脫佛說此經已諸比丘聞佛所說歡喜奉行六五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者諸比丘若我於此信根信根集信根滅信根滅道跡不如實知者我終不得於諸天魔梵沙門婆羅門中為出為離心離顛倒亦不得成阿耨多羅三藐三菩提如信根精進根念根定根慧根亦如是說諸比丘我於此信根正智如實觀察故信根集信根滅信根滅道跡正智如實觀察故我於諸天魔梵沙門婆羅門衆中為出為離心離顛倒成阿耨多羅三藐三菩提如信根精進念定慧根亦如是說佛說此經已諸比丘聞佛所說歡喜奉行六五一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者諸比丘我此信根集信根沒信根味信根患信根離不如實知者我不得於諸天魔梵沙門婆羅門衆中為解脫為出為離心離顛倒成阿耨多羅三藐三菩提如是精進根念根定根慧根亦如是說諸比丘我於信根信根集信根沒信根味信根患信根離如實知故於諸天魔梵沙門婆羅門衆中為解脫為出為離心離顛倒得成阿耨多羅三藐三菩提佛說此經已諸比丘聞佛所說歡喜奉行六五二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者若比丘於此五根若利若滿足得阿羅漢若軟若劣得阿那含若軟若劣得斯陀含若軟若劣得須陀洹滿足者成滿足事不滿足者成不滿足事於此五根不空無果若於此五根一切無者我說彼為外道凡夫之數佛說此經已諸比丘聞佛所說歡喜奉行六五三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者若比丘於彼五根增上明利滿足者得阿羅漢俱分解脫若軟若劣者得身證於彼若軟若劣得見到於彼若軟若劣得信解脫於彼若軟若劣得一種於彼若軟若劣得斯陀含於彼若軟若劣得家家於彼若軟若劣得七有於彼若軟若劣得法行於彼若軟若劣得信行是名比丘根波羅蜜因緣知果波羅蜜果波羅蜜因緣知人波羅蜜如是滿足者作滿足事減少者作減少事彼諸根則不空無果若無此諸根者我說彼為作凡夫數佛說此經已諸比丘聞佛所說歡喜奉行六五四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根何等為五謂信根精進根念根定根慧根此五根一切皆為慧根所攝受譬如堂閣衆材棟為其首皆依於棟以攝持故如是五根慧為其首以攝持故佛說此經已諸比丘聞佛所說歡喜奉行六五五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根何等為五謂信根精進根念根定根慧根信根者當知是四不壞淨精進根者當知是四正斷念根者當知是四念處定根者當知是四禪慧根者當知是四聖諦此諸功德一切皆是慧為其首以攝持故乃至佛說此經已諸比丘聞佛所說歡喜奉行六五六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根何等為五信根精進根念根定根慧根若聖弟子成就慧根者能修信根依離依無欲依滅向於捨是名信根成就信根成就即是慧根如信根如是精進根念根定根慧根亦如是說是故就此五根慧根為其首以攝持故譬如堂閣棟為其首衆材所依以攝持故如是五根慧為其首以攝持故佛說此經已諸比丘聞佛所說歡喜奉行六五七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根何等為五信根精進根念根定根慧根若聖弟子成就信根者作如是學聖弟子無始生死無明所著愛所繫衆生長夜生死往來流馳不知本際有因故有生死因永盡者則無生死無明大暗聚障礙誰般涅槃唯苦滅苦息清涼沒如信根如是精進根念根定根慧根亦如是說此五根慧為首慧所攝持譬如堂閣棟為首棟所攝持佛說此經已諸比丘聞佛所說歡喜奉行六五八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根信根精進根念根定根慧根何等為信根謂聖弟子於如來所起信心根本堅固諸天魔梵沙門婆羅門及諸世間法所不能壞是名信根何等為精進根謂四正斷何等為念根謂四念處何等為定根謂四禪何等為慧根謂四聖諦此諸功德皆以慧為首譬如堂閣棟為其首佛說此經已諸比丘聞佛所說歡喜奉行六五九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根何等為五謂信根精進根念根定根慧根何等為信根若聖弟子於如來發菩提心所得淨信心是名信根何等為精進根於如來發菩提心所起精進方便是名精進根何等念根於如來初發菩提心所起念根何等為定根於如來初發菩提心所起三昧是名定根何等為慧根於如來初發菩提心所起智慧是名慧根所餘堂閣譬如上說佛說此經已諸比丘聞佛所說歡喜奉行六六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五根何等為五謂信根精進根念根定根慧根於此五根修習多修習過去未來現在一切苦斷佛說此經已諸比丘聞佛所說歡喜奉行如苦斷如是究竟苦邊苦盡苦息苦沒度苦流於縛得解害諸色過去未來現在一切漏盡亦如是說六六一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有二種力何等為二謂數力及修力何等為數力謂聖弟子空間林中樹下作如是思惟身惡行現法後世受於惡報我若行身惡行者我當自悔教他亦悔我大師亦當悔我大德梵行亦當悔我以法責我惡名流布身壞命終當生惡趣泥犁中如是現法後報身惡行斷修身善行如身惡行口意惡行亦如是說是名數力何等為修力若比丘學於數力聖弟子數力成就已隨得修力得修力已修力滿足佛說此經已諸比丘聞佛所說歡喜奉行六六二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者聖弟子學數力成就已貪恚癡若節若盡如是聖弟子依於數力盡立數力隨得修力得修力已修力滿足佛說此經已諸比丘聞佛所說歡喜奉行六六三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者何等為修力謂修四念處佛說此經已諸比丘聞佛所說歡喜奉行如四念處如是修四正斷四如意足五根五力七覺分八聖道分四道四法句止觀亦如是說六六四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有三種力何等為三謂信力精進力慧力復次三力何等為三謂信力念力慧力復次三力何等為三謂信力定力慧力佛說此經已諸比丘聞佛所說歡喜奉行六六五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有三力謂信力精進力慧力如是比丘當作是學我當成就信力精進力慧力佛說此經已諸比丘聞佛所說歡喜奉行如精進力念力定力亦如是說六六六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有三力信力念力慧力何等為信力謂聖弟子於如來所入於淨信根本堅固諸天魔梵沙門婆羅門及諸同法所不能壞是名信力何等為精進力謂修四正斷何等為慧力謂四聖諦佛說此經已諸比丘聞佛所說歡喜奉行餘二力如上說六六七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有四力何等為四謂信力精進力念力慧力復次四力信力念力定力慧力復次四力覺力精進力無罪力攝力此諸經如上三力說差別者何等為覺力於善不善法如實知有罪無罪習近不習近卑法勝法黑法白法有分別法無分別法緣起法非緣起法如實知是名覺力何等為精進力謂四正斷如前廣說何等為無罪力謂無罪身口意是名無罪力何等為攝力謂四攝事惠施愛語行利同利佛說此經已諸比丘聞佛所說歡喜奉行六六八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者若最勝施者謂法施最勝愛語者謂善男子樂聞應時說法行利最勝者諸不信者能令入信建立於信立戒者以淨戒慳者以施惡智者以正智令入建立同利最勝者謂阿羅漢以阿羅漢阿那含以阿那含斯陀含以斯陀含須陀洹以須陀洹淨戒者以淨而授於彼佛說此經已諸比丘聞佛所說歡喜奉行六六九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘如上說差別者若所有法是衆之所取一切皆是四攝事或有一取施者或一取愛語者或一取行利者或一取同利者過去世時過去世衆以有所取者亦是四攝事未來世衆當有所取者亦是四攝事或一取施者或一取愛語或一取行利者或一取同利爾時世尊即說偈言布施及愛語或有行利者同利諸行生各隨其所應以此攝世